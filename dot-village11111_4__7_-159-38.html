<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Group Ironman</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=Cinzel:wght@400;500;600;700;800;900&family=Crimson+Text:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1b1f23;color:#ddd8cc;font-family:'DM Sans',sans-serif;overflow:hidden;height:100vh;width:100vw;position:fixed;-webkit-user-select:none;user-select:none;font-size:16px;}
canvas{position:absolute;inset:0;width:100%;height:100%;cursor:grab;}
canvas.dragging{cursor:grabbing;}

  .pp-frame{width:360px!important;}
  .bank{width:300px!important;}
  .nlog{width:100%!important;}
  .gc{width:120px!important;}
  .gc-dot{width:50px!important;height:50px!important;}
  .gc-portrait{width:50px!important;height:50px!important;}
  .gc-name{font-size:14px!important;}
  .gc-hp{height:7px!important;}
  .gc-task{font-size:11px!important;}
  .gbar{padding:8px 12px!important;gap:5px!important;}
}
@media(min-width:2400px){
  .pp-frame{width:400px!important;}
  .bank{width:360px!important;}
  .nlog{width:100%!important;font-size:14px!important;}
  .gc{width:130px!important;padding:10px 10px 8px!important;}
  .gc-dot{width:56px!important;height:56px!important;}
  .gc-portrait{width:56px!important;height:56px!important;}
  .gc-name{font-size:15px!important;}
  .gc-hp{height:8px!important;}
  .gc-action{height:5px!important;}
  .gc-task{font-size:12px!important;}
  .gc-badge-lvl{font-size:13px!important;}
  .gc-badge-icon{font-size:14px!important;}
  .gbar{padding:10px 14px!important;gap:6px!important;border-radius:14px!important;}
  .pp-hdr{padding:24px 28px 20px!important;}
  .pp-nm{font-size:28px!important;}
  .pp-sub{font-size:17px!important;}
  .pp-tab{font-size:15px!important;padding:16px 6px!important;}
  .pp-lv{font-size:14px!important;}
  .pp-lv-val{font-size:18px!important;}
  .st-lb{font-size:14px!important;}
  .st-task{font-size:20px!important;}
  .sd-selected{font-size:19px!important;padding:14px 44px 14px 18px!important;}
  .sd-opt{font-size:18px!important;padding:11px 14px!important;}
  .sd-cat-text{font-size:11px!important;}
  .sk-lvl{font-size:20px!important;}
  .sk-name{font-size:12px!important;}
  .sk-ico{font-size:20px!important;}
  .sk-hdr{font-size:17px!important;}
  .inv-slot{font-size:30px!important;}
  .inv-label{font-size:9px!important;}
  .inv-qty{font-size:14px!important;}
  .inv-count{font-size:14px!important;}
  .eq-slot{width:76px!important;height:76px!important;font-size:28px!important;}
  .eq-lbl{font-size:8px!important;}
  .cs-btn{font-size:13px!important;padding:9px 8px!important;}
  .ae-pct-btn{font-size:13px!important;padding:8px 12px!important;}
  .ae-food{font-size:16px!important;padding:10px 14px!important;}
  .ae-food-heal{font-size:15px!important;}
  .eq-bonus-row{padding:10px 14px!important;}
  .eq-bonus-stats{font-size:15px!important;}
  .act-item{padding:14px 18px!important;}
  .act-name{font-size:19px!important;}
  .act-req{font-size:16px!important;}
  .act-lvl{font-size:15px!important;}
  .act-ico{font-size:26px!important;}
  .bank-title{font-size:17px!important;}
  .bank-slot{font-size:28px!important;min-height:56px!important;}
  .bank-tab{font-size:16px!important;padding:10px 4px!important;}
  .bank-search{font-size:15px!important;padding:10px 14px!important;}
  .bank-qty{font-size:12px!important;}
  .bank-item-name{font-size:9px!important;}
  .nlog-item{font-size:14px!important;padding:5px 12px!important;}
  .speed-btn{font-size:14px!important;padding:8px 14px!important;}
}

/* ═══ GROUP BAR — Dark Fantasy Party HUD ═══ */
.gbar{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:25;
  display:flex;align-items:stretch;gap:0;
  background:linear-gradient(180deg,#0d1018 0%,#0a0c14 50%,#0e1018 100%);
  border:1px solid rgba(194,158,62,0.3);
  border-radius:12px;
  padding:8px 10px;
  pointer-events:auto;
  box-shadow:
    0 8px 32px rgba(0,0,0,0.7),
    0 0 1px rgba(194,158,62,0.2),
    inset 0 1px 0 rgba(255,255,255,0.03),
    inset 0 -1px 0 rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);
}
.gbar::before{
  content:'';position:absolute;top:0;left:12%;right:12%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(194,158,62,0.25),transparent);
}
.gc+.gc{border-left:1px solid rgba(194,158,62,0.07);}

.gc{
  width:92px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  gap:4px;padding:7px 7px 6px;
  border:1.5px solid transparent;border-radius:7px;
  transition:all .2s ease;position:relative;
  background:transparent;
}
.gc:hover{
  background:rgba(194,158,62,0.04);
  border-color:rgba(194,158,62,0.12);
  transform:translateY(-1px);
}
.gc.active{
  background:linear-gradient(180deg,rgba(194,158,62,0.1) 0%,rgba(140,100,30,0.07) 100%);
  border-color:rgba(214,168,72,0.55);
  box-shadow:
    0 0 12px rgba(194,158,62,0.14),
    inset 0 0 10px rgba(194,158,62,0.06),
    0 0 24px rgba(194,158,62,0.07);
  transform:translateY(-1px);
}

/* Portrait */
.gc-portrait{position:relative;width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.gc-dot{
  width:36px;height:36px;border-radius:50%;
  box-shadow:0 3px 8px rgba(0,0,0,0.6),inset 0 2px 3px rgba(255,255,255,0.08);
  border:2px solid rgba(40,35,50,0.8);
  transition:border-color .2s,box-shadow .2s;
}
.gc:hover .gc-dot{border-color:rgba(100,90,70,0.5);}
.gc-tool-badge{position:absolute;top:-2px;left:-2px;font-size:12px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;background:rgba(10,12,20,0.85);border:1px solid rgba(201,156,74,0.3);border-radius:4px;z-index:3;line-height:1;}
.gc.active .gc-dot{
  border-color:rgba(194,158,62,0.5);
  box-shadow:0 3px 10px rgba(0,0,0,0.6),0 0 8px rgba(194,158,62,0.18);
}
/* Best skill badge */
.gc-badge{
  position:absolute;bottom:-3px;right:-6px;
  display:flex;align-items:center;gap:2px;
  background:linear-gradient(135deg,#1a1420,#12101a);
  border:1px solid rgba(194,158,62,0.3);
  border-radius:9px;padding:2px 5px 2px 3px;
  box-shadow:0 2px 6px rgba(0,0,0,0.7);
}
.gc-badge-icon{font-size:12px;line-height:1;filter:drop-shadow(0 1px 1px rgba(0,0,0,0.8));}
.gc-badge-img{width:14px;height:14px;object-fit:contain;display:block;filter:drop-shadow(0 1px 1px rgba(0,0,0,0.8));}
.gc-tool-badge-img{width:14px;height:14px;object-fit:contain;display:block;}
.gc-badge-lvl{font-family:'Cinzel',serif;font-size:11px;font-weight:800;color:rgba(194,158,62,0.65);line-height:1;}
.gc.active .gc-badge-lvl{color:rgba(232,200,94,0.95);}
/* ── Locked hero slot ── */
.gc.gc-locked{cursor:pointer;opacity:0.85;background:rgba(20,18,30,0.4);border:1.5px dashed rgba(194,158,62,0.18)!important;border-radius:7px;animation:lockedPulse 3s ease-in-out infinite;}
.gc.gc-locked:hover{opacity:1;background:rgba(40,32,60,0.5);border-color:rgba(232,200,94,0.45)!important;transform:translateY(-2px);box-shadow:0 4px 16px rgba(232,200,94,0.18);animation:none;}
.gc-locked-circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;background:radial-gradient(circle,rgba(40,32,60,0.85),rgba(20,16,32,0.95));border:1.5px dashed rgba(194,158,62,0.35);color:rgba(232,200,94,0.55);text-shadow:0 0 8px rgba(232,200,94,0.4);animation:lockSpin 4s ease-in-out infinite;}
.gc-locked .gc-locked-name{color:rgba(180,165,135,0.45)!important;font-style:italic;letter-spacing:1.5px!important;}
.gc-locked-quest{font-family:'Crimson Text',serif;font-size:9px;color:rgba(232,200,94,0.55);letter-spacing:0.3px;text-align:center;margin-top:1px;font-style:italic;text-shadow:0 1px 2px rgba(0,0,0,0.7);max-width:84px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gc-locked:hover .gc-locked-quest{color:rgba(232,200,94,0.85);}
@keyframes lockedPulse{0%,100%{box-shadow:0 0 0 rgba(232,200,94,0);}50%{box-shadow:0 0 14px rgba(232,200,94,0.13);}}
@keyframes lockSpin{0%,100%{transform:rotate(-3deg) scale(1);}50%{transform:rotate(3deg) scale(1.05);}}
.gc.active .gc-badge{border-color:rgba(194,158,62,0.45);}

/* Name */
.gc-name{
  font-family:'Cinzel',serif;font-size:11px;font-weight:700;
  color:rgba(180,160,120,0.55);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:85px;text-align:center;
  transition:color .2s,text-shadow .2s;
  letter-spacing:0.8px;
  text-transform:uppercase;
}
.gc:hover .gc-name{color:rgba(200,180,140,0.75);}
.gc.active .gc-name{
  color:rgba(232,200,94,0.95);
  text-shadow:0 0 10px rgba(194,158,62,0.25),0 1px 3px rgba(0,0,0,0.7);
}

/* Bars */
.gc-bars{width:100%;display:flex;flex-direction:column;gap:3px;}
.gc-hp{
  width:100%;height:10px;position:relative;
  background:rgba(8,6,12,0.9);
  border-radius:5px;overflow:visible;
  box-shadow:inset 0 1px 3px rgba(0,0,0,0.6);
  border:1px solid rgba(60,20,20,0.4);
}
.gc-hp-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:8px;font-weight:700;color:rgba(255,255,255,0.85);text-shadow:0 1px 2px rgba(0,0,0,0.9);line-height:1;pointer-events:none;z-index:1;}
.gc-hp-fill{
  height:100%;border-radius:5px;
  background:linear-gradient(180deg,#ee4444 0%,#cc2828 40%,#aa2020 100%);
  box-shadow:0 0 8px rgba(220,50,50,0.45);
  transition:width .3s;position:relative;
}
.gc-hp-fill::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 5%,rgba(255,160,160,0.2) 50%,transparent 95%);
}
.gc-action{
  width:100%;height:4px;
  background:rgba(8,6,12,0.6);
  border-radius:2px;overflow:hidden;
  box-shadow:inset 0 1px 2px rgba(0,0,0,0.4);
}
.gc-action-fill{height:100%;border-radius:2px;transition:width .2s;box-shadow:0 0 4px currentColor;}

/* Status */
.gc-task{
  font-size:9px;font-weight:500;
  color:rgba(130,120,100,0.45);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:85px;text-align:center;
  letter-spacing:0.3px;
}
.gc.active .gc-task{color:rgba(170,150,110,0.6);}

/* ═══ BANK PANEL ═══ */
.bank{
  position:absolute;top:10px;left:10px;z-index:20;width:260px;
  display:flex;flex-direction:column;
  background:linear-gradient(180deg,#0d1018,#0a0c14,#0e1018);
  border:1px solid rgba(194,158,62,0.25);border-radius:10px;
  box-shadow:0 8px 32px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.02);
  overflow:hidden;pointer-events:auto;
  max-height:calc(100vh - 20px);
  font-size:14px;
}
.bank::before{
  content:'';position:absolute;top:0;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(194,158,62,0.2),transparent);z-index:1;
}
.bank-hdr{
  padding:12px 16px 10px;
  display:flex;align-items:center;gap:8px;
  border-bottom:1px solid #1a1c28;
  position:sticky;top:0;z-index:2;
  background:linear-gradient(180deg,#0d1018,#0a0c14);
}
.bank-title{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:rgba(232,200,94,0.8);letter-spacing:1px;}
.bank-count{font-size:12px;color:rgba(130,120,100,0.5);font-family:'Crimson Text',serif;}
.bank-expand-btn{
  margin-left:auto;width:26px;height:26px;display:flex;align-items:center;justify-content:center;
  font-size:14px;cursor:pointer;border-radius:5px;
  background:rgba(194,158,62,0.06);border:1px solid rgba(194,158,62,0.12);color:rgba(194,158,62,0.35);transition:all .15s;
}
.bank-expand-btn:hover{border-color:rgba(194,158,62,0.4);color:rgba(232,200,94,0.8);background:rgba(194,158,62,0.12);}

/* Bank Modal */
#bank-modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;}
#bank-modal-overlay.open{display:flex;}
#bank-modal{
  width:780px;max-width:92vw;max-height:82vh;overflow-y:auto;position:relative;
  background:linear-gradient(180deg,#0b1020 0%,#060b16 100%);
  border:1px solid rgba(201,156,74,0.4);border-radius:14px;
  box-shadow:0 0 0 1px rgba(201,156,74,0.2),0 0 25px rgba(201,156,74,0.1),0 20px 60px rgba(0,0,0,0.8),inset 0 1px 0 rgba(255,220,140,0.06);
  scrollbar-width:thin;scrollbar-color:rgba(194,158,62,0.15) transparent;
}
.bm-hdr{display:flex;align-items:center;gap:10px;padding:14px 22px 12px;border-bottom:1px solid rgba(201,156,74,0.08);}
.bm-title{font-family:'Cinzel',serif;font-size:18px;font-weight:900;color:#efc76a;letter-spacing:1.5px;text-shadow:0 0 8px rgba(240,200,120,0.2);}
.bm-count{font-size:11px;color:rgba(130,120,100,0.4);font-family:'Crimson Text',serif;}
.bm-gold{display:flex;align-items:center;gap:5px;margin-left:auto;font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:#e8c85e;}
.bm-close{font-size:18px;color:rgba(194,158,62,0.3);cursor:pointer;margin-left:12px;transition:color .15s;line-height:1;}
.bm-close:hover{color:rgba(232,200,94,0.8);}
.bm-search{padding:10px 22px 6px;}
.bm-search input{width:100%;padding:6px 12px;border-radius:5px;border:1px solid rgba(194,158,62,0.1);background:rgba(6,8,16,0.8);color:#d4c4a0;font-family:'Crimson Text',serif;font-size:13px;outline:none;}
.bm-search input:focus{border-color:rgba(194,158,62,0.25);}
.bm-body{padding:6px 18px 18px;}
.bm-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;}
@media(max-width:800px){.bm-grid{grid-template-columns:repeat(6,1fr);}}
.bm-cat{grid-column:1/-1;padding:8px 4px 3px;font-family:'Cinzel',serif;font-size:10px;font-weight:700;color:rgba(194,158,62,0.35);letter-spacing:1.2px;text-transform:uppercase;border-bottom:1px solid rgba(194,158,62,0.05);margin-top:2px;}
.bm-cat:first-child{margin-top:0;}
.bm-sub{grid-column:1/-1;padding:1px 4px;font-family:'Crimson Text',serif;font-size:9px;font-weight:600;color:rgba(194,158,62,0.15);}
.bm-slot{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 2px;aspect-ratio:1;background:rgba(14,16,26,0.5);border:1px solid rgba(30,28,40,0.4);border-radius:4px;cursor:default;transition:all .12s;position:relative;}
.bm-slot:hover{border-color:rgba(194,158,62,0.2);background:rgba(194,158,62,0.03);}
.bm-slot.gear{cursor:pointer;}.bm-slot.gear:hover{border-color:rgba(127,174,93,0.3);background:rgba(127,174,93,0.04);}
.bm-slot.potion{cursor:pointer;}.bm-slot.potion:hover{border-color:rgba(68,170,100,0.35);background:rgba(68,170,100,0.04);}
.bm-icon{font-size:20px;line-height:1;}
.bm-qty{position:absolute;top:2px;right:3px;font-size:9px;font-weight:700;color:rgba(232,200,94,0.7);font-family:'Cinzel',serif;line-height:1;text-shadow:0 1px 2px rgba(0,0,0,0.8);}
.bm-name{font-size:7px;color:rgba(160,140,110,0.4);font-family:'Crimson Text',serif;text-align:center;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2;}

/* Ammo quantity menu */
/* Item action popup (equip/sell) */
#item-action-popup{
  display:none;position:fixed;z-index:300;min-width:220px;
  background:linear-gradient(180deg,#0d1224 0%,#080c18 100%);
  border:1px solid rgba(201,156,74,0.45);border-radius:10px;
  box-shadow:0 8px 30px rgba(0,0,0,0.8),0 0 15px rgba(201,156,74,0.08);
  overflow:hidden;
}
.iap-hdr{padding:12px 16px 10px;border-bottom:1px solid rgba(201,156,74,0.1);display:flex;align-items:center;gap:8px;}
.iap-icon{font-size:22px;display:flex;align-items:center;justify-content:center;min-width:36px;min-height:36px;}
.iap-info{flex:1;}
.iap-name{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:#efc76a;}
.iap-sub{font-family:'Crimson Text',serif;font-size:11px;color:rgba(200,180,140,0.4);}
.iap-body{padding:10px 16px 14px;}
.iap-row{display:flex;gap:6px;margin-bottom:8px;}
.iap-btn{flex:1;padding:8px 0;border-radius:5px;text-align:center;font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .15s;border:1px solid;}
.iap-btn.equip{background:linear-gradient(180deg,rgba(80,140,60,0.2),rgba(50,100,35,0.1));border-color:rgba(80,160,60,0.4);color:rgba(120,200,90,0.85);}
.iap-btn.equip:hover{background:rgba(80,160,60,0.15);border-color:rgba(120,200,90,0.6);}
.iap-btn.sell{background:linear-gradient(180deg,rgba(160,60,60,0.2),rgba(120,40,40,0.1));border-color:rgba(180,70,70,0.4);color:rgba(220,100,100,0.85);}
.iap-btn.sell:hover{background:rgba(180,70,70,0.15);border-color:rgba(220,100,100,0.6);}
.iap-slider-wrap{padding:4px 0;}
.iap-slider-label{display:flex;justify-content:space-between;font-family:'Crimson Text',serif;font-size:12px;color:rgba(200,180,140,0.5);margin-bottom:4px;}
.iap-slider{width:100%;accent-color:#cc5555;cursor:pointer;}
.iap-sell-info{text-align:center;font-family:'Cinzel',serif;font-size:12px;color:rgba(220,100,100,0.6);margin-top:4px;}

#ammo-menu{
  position:fixed;z-index:300;min-width:170px;
  background:linear-gradient(180deg,#0d1224 0%,#080c18 100%);
  border:1px solid rgba(201,156,74,0.45);border-radius:8px;
  box-shadow:0 8px 30px rgba(0,0,0,0.8),0 0 15px rgba(201,156,74,0.08);
  overflow:hidden;
}

.sv-tiers{margin-top:8px;}
.sv-group-label{font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:rgba(194,158,62,0.25);letter-spacing:1px;text-transform:uppercase;padding:8px 0 3px;border-top:1px solid rgba(194,158,62,0.04);margin-top:4px;}
.sv-tier-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:4px;cursor:pointer;transition:all .12s;font-family:'Crimson Text',serif;font-size:13px;color:rgba(200,180,140,0.65);}
.sv-tier-row:hover{background:rgba(194,158,62,0.05);color:rgba(232,200,94,0.8);}
.sv-tier-row.sv-all{font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:rgba(194,158,62,0.5);padding:7px 8px;margin-bottom:4px;border-bottom:1px solid rgba(194,158,62,0.06);}
.sv-check{font-size:14px;width:18px;text-align:center;}
.sv-tier-name{flex:1;}
.sv-tier-info{font-size:10px;color:rgba(194,158,62,0.25);}
.sv-tier-cnt{font-family:'Cinzel',serif;font-size:10px;font-weight:700;color:rgba(170,119,51,0.7);background:rgba(170,119,51,0.08);padding:2px 6px;border-radius:3px;}
.am-title{padding:10px 14px 8px;font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:#efc76a;border-bottom:1px solid rgba(201,156,74,0.1);letter-spacing:.5px;}
.am-opt{padding:8px 14px;font-family:'Crimson Text',serif;font-size:13px;color:rgba(200,180,140,0.75);cursor:pointer;transition:all .1s;}
.am-opt:hover{background:rgba(194,158,62,0.08);color:#e8c85e;}

.bank-gold{

/* Grid */
.bank-body{flex:1;overflow-y:auto;padding:8px;}

}
.bank-slot{

.bank-slot .bank-icon{font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;}
.bank-slot.filled{border-color:rgba(50,45,60,0.8);cursor:pointer;}
.bank-slot.filled:hover{background:rgba(194,158,62,0.04);border-color:rgba(194,158,62,0.15);}
.bank-slot.filled:hover{background:rgba(194,158,62,0.06);border-color:rgba(194,158,62,0.2);}
.bank-slot[data-item='toolkit']{cursor:pointer;}
.bank-slot.potion{cursor:pointer;border-color:rgba(68,170,100,0.15);}
.bank-slot.potion:hover{border-color:rgba(68,170,100,0.4);background:rgba(68,170,100,0.06);box-shadow:0 0 8px rgba(68,170,100,0.08);}
.bank-slot.super-pot{border-color:rgba(232,200,94,0.2);}
.bank-slot.super-pot::before{content:'✦';position:absolute;top:1px;left:2px;font-size:8px;color:rgba(232,200,94,0.8);z-index:2;text-shadow:0 0 4px rgba(232,200,94,0.6);animation:superPotGlow 2s infinite;}
.bank-slot.super-pot:hover{border-color:rgba(232,200,94,0.4);box-shadow:0 0 10px rgba(232,200,94,0.12);}
@keyframes superPotGlow{0%,100%{opacity:0.6;}50%{opacity:1;}}
.bank-slot.filled[data-gear]{cursor:pointer;}
.bank-slot.filled[data-gear]:hover{border-color:rgba(127,174,93,0.3);background:rgba(127,174,93,0.04);}
/* Bank gear tooltip */
.bank-slot{position:relative;}

/* ═══ RIGHT PROFILE PANEL — Dark Fantasy RPG ═══ */
.pp-frame{position:fixed;right:10px;top:10px;z-index:30;width:320px;max-height:calc(100vh - 24px);border-radius:6px;padding:2px;pointer-events:auto;
  background:linear-gradient(170deg,#5a4a20 0%,#c8a44e 15%,#e8c85e 25%,#c8a44e 35%,#6a5a28 50%,#c8a44e 65%,#e8c85e 75%,#c8a44e 85%,#5a4a20 100%);
  box-shadow:0 0 30px #d4943a18,0 0 60px #d4943a08,0 4px 24px #000000aa,inset 0 0 1px #e8c85e44;
  animation:ppBreathe 4s ease-in-out infinite;}
@keyframes ppBreathe{0%,100%{box-shadow:0 0 30px #d4943a18,0 0 60px #d4943a08,0 4px 24px #000000aa;}50%{box-shadow:0 0 40px #d4943a22,0 0 80px #d4943a10,0 4px 24px #000000aa;}}
.pp-frame::before,.pp-frame::after{content:'';position:absolute;width:20px;height:20px;border:2px solid #c8a44e;z-index:5;pointer-events:none;}
.pp-frame::before{top:-1px;left:-1px;border-right:none;border-bottom:none;border-radius:6px 0 0 0;box-shadow:-2px -2px 8px #d4943a22;}
.pp-frame::after{bottom:-1px;right:-1px;border-left:none;border-top:none;border-radius:0 0 6px 0;box-shadow:2px 2px 8px #d4943a22;}

.pp{position:relative;background:linear-gradient(180deg,#12151e 0%,#0c0e16 40%,#0e1018 100%);border-radius:4px;overflow:hidden;display:flex;flex-direction:column;max-height:calc(100vh - 28px);}
.pp::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");background-size:128px;pointer-events:none;z-index:1;mix-blend-mode:overlay;}
.pp::after{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:60%;height:2px;background:radial-gradient(ellipse,#d4943a,transparent 70%);box-shadow:0 0 20px #d4943a,0 0 40px #d4943a44;z-index:3;}
.pp-glow{position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:40%;height:2px;background:radial-gradient(ellipse,#c8a44e,transparent 70%);box-shadow:0 0 15px #8a6e2a;z-index:3;pointer-events:none;}

.pp-hdr{position:relative;z-index:2;padding:14px 20px 12px;border-bottom:1px solid #1a1c28;display:flex;align-items:center;gap:12px;flex-shrink:0;background:linear-gradient(180deg,#16192408,transparent);}
.pp-av{position:relative;width:48px;height:48px;border-radius:50%;flex-shrink:0;
  background:conic-gradient(from 0deg,#5a4a1e,#c8a44e,#e8c85e,#c8a44e,#5a4a1e,#c8a44e,#e8c85e,#c8a44e,#5a4a1e);
  padding:3px;box-shadow:0 0 12px #d4943a22,0 2px 8px #00000066,inset 0 0 4px #e8c85e18;}
.pp-avi{width:100%;height:100%;border-radius:50%;box-shadow:inset 0 2px 6px #000000aa;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.pp-avi svg{width:100%;height:100%;display:block;}
.pp-nm{font-family:'Cinzel',serif;font-size:20px;font-weight:700;text-shadow:0 1px 3px #00000088,0 0 12px #d4943a22;letter-spacing:1px;}
.pp-sub{font-family:'Crimson Text',serif;font-size:13px;color:#6a6050;margin-top:2px;letter-spacing:.5px;}
.pp-levels{display:flex;flex-direction:column;align-items:flex-end;gap:2px;margin-left:auto;flex-shrink:0;}
.pp-lv{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:rgba(194,158,62,0.5);letter-spacing:.5px;line-height:1.3;}
.pp-lv-val{color:rgba(232,200,94,0.85);font-size:16px;font-weight:800;}

.pp-tabs{position:relative;z-index:2;display:flex;border-top:1px solid #1a1c28;border-bottom:1px solid #1a1c28;background:linear-gradient(180deg,#0e1018,#0c0e14);flex-shrink:0;}
.pp-tab{flex:1;padding:14px 6px;text-align:center;font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:#8a6e2a;cursor:pointer;position:relative;transition:color .2s,text-shadow .2s;letter-spacing:.5px;border-right:1px solid #14161e;}

.pp-tab::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#ffffff06,transparent);}

.pp-sec{display:none;}.pp-sec.active{display:block;}

/* ═══ Custom Skill Dropdown ═══ */
.sd-wrap{position:relative;width:100%;}

  border:1px solid rgba(194,158,62,0.3);

.sd-ico{font-size:18px;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.6));}

.sd-list{

/* ═══ Combat Modal — Premium Fantasy RPG ═══ */
.cb-overlay{position:fixed;inset:0;z-index:200;background:rgba(2,3,8,0.82);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;}
.cb-overlay.open{display:flex;}
.cb-modal{
  width:1100px;max-width:96vw;max-height:88vh;overflow-y:auto;position:relative;
  background:
    radial-gradient(ellipse at 50% 20%,rgba(20,24,40,0.95),transparent 70%),
    radial-gradient(ellipse at 50% 80%,rgba(12,10,6,0.4),transparent 60%),
    linear-gradient(180deg,#080b14,#060910,#0a0d16);
  border:1.5px solid rgba(201,160,74,0.4);
  border-radius:18px;
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.6),
    0 25px 80px rgba(0,0,0,0.85),
    0 0 40px rgba(194,158,62,0.06),
    inset 0 0 0 1px rgba(255,220,140,0.06),
    inset 0 1px 0 rgba(255,220,140,0.08);
  scrollbar-width:thin;scrollbar-color:rgba(194,158,62,0.2) transparent;

.eq-wrap{padding:18px;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative;z-index:2;}
.eq-row{display:flex;gap:5px;justify-content:center;}
.eq-slot{width:64px;height:64px;background:linear-gradient(180deg,rgba(10,12,18,0.6),rgba(14,16,24,0.6));border:1px solid rgba(30,28,40,0.6);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:24px;position:relative;box-shadow:inset 0 1px 3px #00000044;transition:all .15s;overflow:hidden;}
.eq-slot .eq-icon{opacity:1;font-size:20px;}
.eq-slot .eq-icon img{display:block;}
.eq-slot.equipped .eq-icon{opacity:1;filter:none;font-size:24px;}
.eq-slot.equipped{border-color:rgba(127,174,93,0.25);background:linear-gradient(180deg,rgba(127,174,93,0.06),rgba(90,130,65,0.03));cursor:pointer;}
.eq-slot.equipped:hover{border-color:rgba(200,100,100,0.4);background:rgba(200,100,100,0.06);}
.eq-slot-stats{position:absolute;bottom:11px;left:2px;right:2px;font-size:7px;color:rgba(127,174,93,0.5);font-family:'Crimson Text',serif;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.eq-slot:hover{border-color:#352e22;background:rgba(194,158,62,0.04);}
.eq-avail{padding:14px 24px;border-top:1px solid #1a1c28;}
.eq-avail-grid{display:flex;flex-direction:column;gap:5px;margin-top:8px;max-height:200px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(194,158,62,0.15) transparent;}
.eq-avail-item{display:flex;align-items:center;gap:10px;padding:7px 12px;background:linear-gradient(180deg,rgba(10,12,18,0.6),rgba(14,16,24,0.6));border:1px solid rgba(201,156,74,0.1);border-radius:6px;cursor:pointer;transition:all .15s;}
.eq-avail-item:hover{border-color:rgba(127,174,93,0.35);background:rgba(127,174,93,0.04);}
.eq-avail-icon{font-size:18px;flex-shrink:0;}
.eq-avail-name{font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:#d4c4a0;}
.eq-avail-qty{font-weight:400;color:rgba(201,156,74,0.3);font-size:10px;}
.eq-avail-stats{font-family:'Crimson Text',serif;font-size:10px;color:rgba(127,174,93,0.5);}
.eq-lbl{position:absolute;bottom:2px;font-family:'Cinzel',serif;font-size:7px;color:rgba(100,90,70,0.35);letter-spacing:.5px;text-transform:uppercase;}
.eq-spacer{width:64px;height:64px;}
.eq-stats{position:relative;z-index:2;padding:14px 24px;border-top:1px solid #1a1c28;}
.eq-row2{display:flex;justify-content:space-between;font-family:'Crimson Text',serif;font-size:15px;padding:4px 0;color:#6a6050;}
.eq-val{color:#d4c4a0;font-weight:700;font-variant-numeric:tabular-nums;text-shadow:0 1px 2px #00000066;}
/* Combat style selector */
.cs-wrap{position:relative;z-index:2;padding:14px 24px;border-bottom:1px solid #1a1c28;}
.cs-row{display:flex;gap:4px;}
.cs-btn{
  flex:1;padding:8px 6px;border-radius:5px;cursor:pointer;text-align:center;
  font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:.3px;
  background:linear-gradient(180deg,rgba(10,12,18,0.6),rgba(14,16,24,0.6));
  border:1px solid rgba(30,28,40,0.6);color:rgba(130,120,100,0.5);
  transition:all .15s;box-shadow:inset 0 1px 2px rgba(0,0,0,0.3);
}
.cs-btn:hover{border-color:rgba(194,158,62,0.2);color:rgba(180,160,120,0.7);}
.cs-btn.active{
  background:linear-gradient(180deg,rgba(194,158,62,0.12),rgba(140,100,30,0.08));
  border-color:rgba(194,158,62,0.4);color:rgba(232,200,94,0.9);
  box-shadow:0 0 6px rgba(194,158,62,0.1);
}

/* Equipment bonus bars */
.eq-bonus{position:relative;z-index:2;padding:14px 24px;border-top:1px solid #1a1c28;}
.eq-bonus-row{display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:6px;background:linear-gradient(180deg,rgba(10,12,18,0.6),rgba(14,16,24,0.6));border:1px solid rgba(30,28,40,0.6);border-radius:6px;box-shadow:inset 0 1px 2px rgba(0,0,0,0.3);}
.eq-bonus-row:last-child{margin-bottom:0;}
.eq-bonus-icon{font-size:20px;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.6));flex-shrink:0;}
.eq-bonus-stats{flex:1;font-family:'Crimson Text',serif;font-size:13px;color:rgba(160,150,130,0.6);}
.eq-bonus-stats span{margin-right:4px;}
.eq-bonus-val{color:rgba(212,196,160,0.8);font-weight:700;}
/* Auto-eat settings */
.ae-wrap{position:relative;z-index:2;padding:14px 24px;border-top:1px solid #1a1c28;}
.ae-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
.ae-pct-btn{
  padding:6px 10px;border-radius:4px;cursor:pointer;text-align:center;
  font-family:'Cinzel',serif;font-size:11px;font-weight:700;
  background:linear-gradient(180deg,rgba(10,12,18,0.6),rgba(14,16,24,0.6));
  border:1px solid rgba(30,28,40,0.6);color:rgba(130,120,100,0.5);
  transition:all .15s;
}
.ae-pct-btn:hover{border-color:rgba(194,158,62,0.2);color:rgba(180,160,120,0.7);}
.ae-pct-btn.active{background:linear-gradient(180deg,rgba(44,160,44,0.12),rgba(30,100,30,0.08));border-color:rgba(44,160,44,0.4);color:rgba(120,220,120,0.9);}
.ae-food{
  display:flex;align-items:center;gap:8px;margin-top:8px;padding:8px 12px;
  background:linear-gradient(180deg,rgba(10,12,18,0.6),rgba(14,16,24,0.6));
  border:1px solid rgba(30,28,40,0.6);border-radius:6px;
  font-family:'Crimson Text',serif;font-size:14px;color:rgba(160,150,130,0.6);cursor:pointer;
  transition:all .15s;
}
.ae-food:hover{border-color:rgba(194,158,62,0.2);}
.ae-food.active{border-color:rgba(44,160,44,0.3);}
.ae-food-icon{font-size:18px;}
.ae-food-name{flex:1;color:rgba(212,196,160,0.8);font-weight:600;}
.ae-food-heal{color:rgba(44,160,44,0.7);font-weight:700;font-size:13px;}

.tl{position:absolute;top:14px;left:250px;z-index:20;font-size:17px;font-weight:800;color:#ddd8cc;opacity:.2;}
.hotkey-hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:24;margin-top:82px;display:flex;gap:6px;align-items:center;pointer-events:none;}
.hotkey-hint span{font-family:'Cinzel',serif;font-size:10px;font-weight:700;color:rgba(194,158,62,0.3);letter-spacing:0.5px;}
.hotkey-key{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;background:rgba(194,158,62,0.06);border:1px solid rgba(194,158,62,0.15);font-family:'Cinzel',serif;font-size:10px;font-weight:800;color:rgba(194,158,62,0.35);}
.bhud{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:calc(100vw - 680px);}
.bh-chip{display:flex;align-items:center;gap:5px;background:#131619dd;border:1px solid #2a2f34;border-radius:8px;padding:5px 11px;backdrop-filter:blur(8px);font-size:14px;font-weight:600;}
.bh-dot{width:9px;height:9px;border-radius:50%;}

/* ═══ NOTIFICATION LOG ═══ */
.nlog-wrap{position:absolute;top:10px;left:284px;z-index:21;width:320px;pointer-events:auto;}
/* When viewport is too narrow for nlog + gbar side-by-side, shift nlog lower */
@media (max-width:1500px){.nlog-wrap{top:108px;}}
@media (max-width:1280px){.nlog-wrap{width:280px;top:108px;}}
.nlog-minimize{width:28px;flex:none;display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(194,158,62,0.4);cursor:pointer;background:rgba(10,12,18,0.85);border:1px solid rgba(194,158,62,0.08);border-bottom:none;border-radius:0 6px 0 0;transition:all .15s;user-select:none;}
.nlog-minimize:hover{color:rgba(194,158,62,0.8);background:rgba(10,12,18,0.95);}
.nlog-body{transition:max-height .25s ease,opacity .2s ease;max-height:calc(100vh - 120px);opacity:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:rgba(194,158,62,0.1) transparent;}
.nlog-wrap.minimized .nlog-body{max-height:0;opacity:0;}
.nlog-wrap.minimized .nlog-minimize{border-radius:0 6px 6px 0;border-bottom:1px solid rgba(194,158,62,0.08);}
@media(min-width:1800px){.nlog-wrap{left:316px!important;width:340px!important;}}
@media(min-width:2400px){.nlog-wrap{left:380px!important;width:400px!important;}}
.nlog-tabs{display:flex;gap:0;margin-bottom:0;}
.nlog-tab{flex:1;padding:6px 6px;text-align:center;font-family:'Cinzel',serif;font-size:10px;font-weight:700;color:rgba(194,158,62,0.3);letter-spacing:0.5px;cursor:pointer;background:rgba(10,12,18,0.85);border:1px solid rgba(194,158,62,0.08);border-bottom:none;border-radius:6px 6px 0 0;transition:all .15s;position:relative;white-space:nowrap;}
.nlog-tab:hover{color:rgba(194,158,62,0.5);background:rgba(10,12,18,0.9);}
.nlog-tab.active{color:rgba(232,200,94,0.8);background:rgba(10,12,18,0.95);border-color:rgba(194,158,62,0.15);}
.nlog-badge{position:absolute;top:2px;right:6px;background:#cc3333;color:#fff;font-family:'DM Sans',sans-serif;font-size:9px;font-weight:800;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;animation:badgePulse 1.5s ease infinite;box-shadow:0 0 6px rgba(200,50,50,0.5);}
@keyframes badgePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.nlog{position:relative;width:100%;display:flex;flex-direction:column;overflow:hidden;pointer-events:none;background:rgba(10,12,18,0.85);border-radius:0 0 8px 8px;}
.nlog:empty{display:none;}
.nlog:not(:empty){border:1px solid rgba(194,158,62,0.06);border-top:none;padding:4px 0;}
.nlog-clues{width:100%;overflow:visible;background:rgba(10,12,18,0.9);border:1px solid rgba(194,158,62,0.1);border-top:none;border-radius:0 0 8px 8px;padding:6px;}
.nlog-clue-card{padding:7px 10px;margin-bottom:4px;border-radius:6px;background:rgba(14,16,26,0.6);border:1px solid rgba(194,158,62,0.1);cursor:pointer;transition:all .15s;}
.nlog-clue-card:hover{background:rgba(194,158,62,0.04);border-color:rgba(194,158,62,0.2);}
.nlog-clue-card:last-child{margin-bottom:0;}
.nlog-clue-card.done{opacity:0.5;}
.nlog-clue-hdr{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.nlog-clue-icon{font-size:14px;}
.nlog-clue-name{font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:0.5px;}
.nlog-clue-status{margin-left:auto;font-family:'Crimson Text',serif;font-size:9px;color:rgba(150,130,110,0.4);}
.nlog-clue-step{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:5px;background:rgba(194,158,62,0.03);}
.nlog-clue-step-check{font-size:12px;}
.nlog-clue-step-text{font-family:'Crimson Text',serif;font-size:11px;color:rgba(200,180,150,0.6);flex:1;}
.nlog-clue-step-prog{font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:rgba(194,158,62,0.5);}
.nlog-clue-step.done .nlog-clue-step-text{color:rgba(80,200,100,0.6);text-decoration:line-through;}
.nlog-clue-empty{text-align:center;padding:12px 8px;font-family:'Crimson Text',serif;font-size:12px;color:rgba(150,130,110,0.3);}
.nlog-casket-row{display:flex;align-items:center;gap:6px;padding:6px 10px;margin-bottom:4px;border-radius:6px;background:rgba(194,158,62,0.04);border:1px solid rgba(194,158,62,0.12);cursor:pointer;transition:all .15s;}
.nlog-casket-row:hover{background:rgba(194,158,62,0.08);border-color:rgba(194,158,62,0.25);}
@media(max-width:1200px){
  .nlog-wrap{left:260px!important;width:210px!important;}

}

/* ═══ Town Hall Modal — Premium Fantasy Design with Gold Lighting ═══ */
.th-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;}
.th-overlay.open{display:flex;}
.th-modal{
  width:1100px;max-width:95vw;max-height:85vh;overflow-y:auto;position:relative;
  background:linear-gradient(180deg,#0b1020 0%,#060b16 100%);
  border:1px solid rgba(201,156,74,0.45);border-radius:18px;
  box-shadow:
    0 0 0 1px rgba(201,156,74,0.25),
    0 0 30px rgba(201,156,74,0.12),
    0 0 80px rgba(201,156,74,0.06),
    0 30px 80px rgba(0,0,0,0.8),
    inset 0 1px 0 rgba(255,220,140,0.08),
    inset 0 -10px 40px rgba(0,0,0,0.6);
  scrollbar-width:thin;scrollbar-color:rgba(194,158,62,0.15) transparent;
}
.th-modal::-webkit-scrollbar{width:6px;}
.th-modal::-webkit-scrollbar-track{background:transparent;}
.th-modal::-webkit-scrollbar-thumb{background:rgba(194,158,62,0.15);border-radius:3px;}
.th-modal::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,rgba(239,199,106,0.5),transparent);z-index:3;}
.th-modal::after{content:'';position:absolute;inset:0;border-radius:18px;pointer-events:none;z-index:0;opacity:0.6;
  background:
    radial-gradient(circle at 20% 0%,rgba(255,210,120,0.12),transparent 40%),
    radial-gradient(circle at 80% 0%,rgba(255,210,120,0.08),transparent 40%),
    linear-gradient(180deg,rgba(255,220,140,0.04) 0%,transparent 20%);
}
/* Header — luminous title */
.th-hdr{position:relative;z-index:2;padding:28px 32px 24px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(194,158,62,0.06),rgba(194,158,62,0.015),transparent);border-bottom:1px solid rgba(201,156,74,0.2);}
.th-hdr::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 30% 50%,rgba(201,156,74,0.04),transparent 60%);pointer-events:none;}
.th-hdr::after{content:'';position:absolute;bottom:-1px;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,rgba(239,199,106,0.3),rgba(239,199,106,0.4),rgba(239,199,106,0.3),transparent);filter:blur(0.5px);}
.th-hdr-left{display:flex;align-items:center;gap:16px;}
.th-hdr-icon{font-size:34px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5)) drop-shadow(0 0 12px rgba(194,158,62,0.15));}
.th-title{font-family:'Cinzel',serif;font-size:32px;font-weight:900;color:#efc76a;letter-spacing:3px;text-transform:uppercase;text-shadow:0 0 10px rgba(240,200,120,0.4),0 0 20px rgba(240,200,120,0.2),0 2px 4px rgba(0,0,0,0.5);}
.th-close{font-size:26px;cursor:pointer;color:rgba(201,156,74,0.35);transition:all .25s;padding:8px 12px;border-radius:8px;line-height:1;}
.th-close:hover{color:rgba(239,199,106,0.95);background:rgba(194,158,62,0.1);text-shadow:0 0 12px rgba(194,158,62,0.4);box-shadow:0 0 15px rgba(194,158,62,0.08);}
.th-sub{position:relative;z-index:2;padding:14px 32px 18px;font-family:'Crimson Text',serif;font-size:16px;color:rgba(231,215,162,0.5);border-bottom:1px solid rgba(20,22,30,0.8);}
/* Active buffs */
.th-buffs{position:relative;z-index:2;padding:14px 32px;background:rgba(127,174,93,0.02);border-bottom:1px solid rgba(127,174,93,0.08);}
.th-buffs-title{font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:rgba(127,174,93,0.45);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.th-buff-item{display:flex;align-items:center;gap:6px;padding:3px 0;font-family:'Crimson Text',serif;font-size:14px;color:rgba(127,174,93,0.65);}
/* Section headers */
.th-section{padding:24px 32px 8px;position:relative;z-index:2;}
.th-sec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.th-sec-icon{font-size:20px;opacity:0.6;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.4));}
.th-sec-name{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:rgba(231,215,162,0.7);letter-spacing:2px;text-transform:uppercase;white-space:nowrap;}
.th-sec-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(201,156,74,0.3),rgba(201,156,74,0.05));margin-left:8px;}
.th-sec-diamond{width:6px;height:6px;background:rgba(201,156,74,0.4);transform:rotate(45deg);flex-shrink:0;box-shadow:0 0 6px rgba(201,156,74,0.15);}
/* Card grid */
.th-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:0 32px 24px;}
@media(max-width:900px){.th-grid{grid-template-columns:1fr;}}
/* Upgrade cards */
.th-card{
  background:linear-gradient(180deg,rgba(14,18,30,0.95),rgba(8,10,20,0.98));
  border:1.5px solid rgba(201,156,74,0.2);border-radius:12px;
  padding:20px;position:relative;overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,0.4),0 0 1px rgba(201,156,74,0.15),inset 0 1px 0 rgba(255,220,140,0.04);
  transition:all .25s ease;
}
.th-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 10%,rgba(239,199,106,0.15) 50%,transparent 90%);}
.th-card:hover{transform:translateY(-2px);border-color:rgba(201,156,74,0.45);box-shadow:0 8px 28px rgba(0,0,0,0.5),0 0 20px rgba(194,158,62,0.08),inset 0 1px 0 rgba(255,220,140,0.06);}
.th-card.locked{opacity:0.5;}
.th-card.purchased{border-color:rgba(127,174,93,0.25);}
.th-card.ready{border-color:rgba(201,156,74,0.5);box-shadow:0 4px 16px rgba(0,0,0,0.4),0 0 18px rgba(194,158,62,0.08);}
/* Card top */
.th-card-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;}
.th-card-icon-wrap{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,rgba(201,156,74,0.12),rgba(139,106,45,0.06));
  border:1px solid rgba(201,156,74,0.25);
  display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:inset 0 1px 0 rgba(255,220,140,0.06),0 0 10px rgba(201,156,74,0.05);
}
.th-card-info{flex:1;min-width:0;}
.th-card-name{font-family:'Cinzel',serif;font-size:17px;font-weight:700;color:#e7d7a2;letter-spacing:.3px;margin-bottom:3px;}
.th-card-desc{font-family:'Crimson Text',serif;font-size:14px;color:rgba(231,215,162,0.5);line-height:1.4;}
.th-card-lock{color:rgba(201,156,74,0.25);font-size:16px;flex-shrink:0;margin-top:2px;}
.th-card.purchased .th-card-lock{color:rgba(127,174,93,0.6);}
/* Requirements */
.th-reqs{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.th-req-row{display:flex;align-items:center;gap:8px;}
.th-req-icon{font-size:16px;flex-shrink:0;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.4));}
.th-req-info{flex:1;min-width:0;}
.th-req-label{font-family:'Crimson Text',serif;font-size:13px;color:rgba(231,215,162,0.45);margin-bottom:2px;}
.th-req-bar{width:100%;height:6px;background:rgba(10,12,20,0.8);border-radius:3px;border:1px solid rgba(30,30,50,0.8);overflow:hidden;position:relative;}
.th-req-fill{height:100%;border-radius:2px;transition:width .3s ease;position:relative;}
.th-req-fill.has{background:linear-gradient(90deg,rgba(90,140,60,0.7),rgba(127,174,93,0.6));}
.th-req-fill.partial{background:linear-gradient(90deg,rgba(201,156,74,0.5),rgba(201,156,74,0.4));}
.th-req-fill.none{background:linear-gradient(90deg,rgba(140,50,40,0.5),rgba(140,50,40,0.4));}
