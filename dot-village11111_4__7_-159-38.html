function checkQuestProgress(itemId,qty){
  QUESTS.forEach(q=>{
    if(q.complete||!q.unlocked)return;
    const step=q.steps.find(s=>s.progress<s.qty&&s.item===itemId);
    if(step){
      const wasIncomplete=step.progress<step.qty;
      step.progress=Math.min(step.qty,step.progress+qty);
      const justCompletedStep=wasIncomplete&&step.progress>=step.qty;
      if(q.steps.every(s=>s.progress>=s.qty)&&!q.complete){
        q.complete=true;
        q.rewards.forEach(r=>{
          if(r.id==='hero_slot'){unlockHeroSlot();}
          else{storage[r.id]=(storage[r.id]||0)+r.qty;}
        });
        bankDirty=true;
        QUESTS.forEach(nq=>{if(nq.requires===q.id)nq.unlocked=true;});
        addLog(`📜 Quest Complete: ${q.name}!`,'📜','levelup');
        showQuestComplete(q);
      } else if(justCompletedStep){
        // Single step done — small inline celebration, no modal
        addLog(`✓ ${q.name}: ${step.label}`,'✓','info');
        // Schedule a checkmark pulse on this step row after re-render
        window._questStepFlash={questId:q.id,stepIdx:q.steps.indexOf(step)};
      }
      if(_nlogTab==='quests')renderQuestPanel();
    }
  });
}
window.toggleQuest=(qid)=>{_expandedQuest=_expandedQuest===qid?null:qid;renderQuestPanel();};
window.toggleQuestChapter=(ch)=>{
  if(!window._questChapterOpen)window._questChapterOpen={};
  window._questChapterOpen[ch]=!window._questChapterOpen[ch];
  renderQuestPanel();
};

function getGroupMaxSkill(skillId){
  return Math.max(...dots.map(d=>d.skills[skillId]||1));
}

function renderQuestPanel(){
  const el=document.getElementById('nlog-quests');if(!el)return;
  let h='';
  const available=QUESTS.filter(q=>q.unlocked);
  const locked=QUESTS.filter(q=>!q.unlocked);
  if(!available.length&&!locked.length){
    h='<div style="text-align:center;padding:12px;font-family:\'Crimson Text\',serif;font-size:12px;color:rgba(150,130,110,0.3)">No quests available yet.</div>';
    el.innerHTML=h;return;
  }

  // ── MAIN STORY HEADER ──
  const totalQ=QUESTS.length;
  const completeQ=QUESTS.filter(q=>q.complete).length;
  const finalDone=QUESTS.find(q=>q.finale&&q.complete);
  const storyPct=Math.floor(completeQ/totalQ*100);
  if(finalDone){
    h+=`<div style="margin:0 0 6px;padding:8px 10px;border-radius:6px;background:linear-gradient(180deg,rgba(60,40,20,0.85),rgba(40,20,10,0.85));border:1px solid rgba(232,200,94,0.7);box-shadow:0 0 14px rgba(232,200,94,0.25),inset 0 1px 0 rgba(232,200,94,0.15);text-align:center;">`;

function renderCluePanel(){
  const el=document.getElementById('nlog-clues');if(!el)return;
  const tiers=['easy','medium','hard'];
  let h='';

  // Show active clues — only current step with progress bar
  let hasAny=false;
  tiers.forEach(t=>{
    const def=CLUE_TIERS[t];
    const clue=activeClues[t];
    const scrolls=storage['clue_'+t]||0;
    if(clue){
      hasAny=true;
      const done=clue.steps.filter(s=>s.progress>=s.qty).length;
      const currentStep=clue.steps.find(s=>s.progress<s.qty);
      h+=`<div class="nlog-clue-card" onclick="openClueModal('${t}')">`;
      h+=`<div class="nlog-clue-hdr"><span class="nlog-clue-icon">${ITEM_IMGS['clue_'+t]?'<img src="'+ITEM_IMGS['clue_'+t]+'" style="width:18px;height:18px;object-fit:contain;vertical-align:middle;'+(ITEM_FILTERS['clue_'+t]?'filter:'+ITEM_FILTERS['clue_'+t]:'')+'">'  :def.icon}</span><span class="nlog-clue-name" style="color:${def.color}">${def.label} Clue</span><span class="nlog-clue-status">Step ${done+1}/${clue.steps.length}</span></div>`;
      if(currentStep){
        const pct=Math.min(100,Math.floor(currentStep.progress/currentStep.qty*100));
        h+=`<div style="font-family:'Crimson Text',serif;font-size:12px;color:rgba(200,180,150,0.65);margin:4px 0 6px;line-height:1.3">${currentStep.label}</div>`;
        h+=`<div style="position:relative;height:14px;background:rgba(8,6,12,0.8);border-radius:7px;overflow:hidden;border:1px solid rgba(194,158,62,0.1)">`;
        h+=`<div style="height:100%;width:${pct}%;border-radius:7px;background:linear-gradient(90deg,${def.color}88,${def.color});transition:width .3s;box-shadow:0 0 6px ${def.color}44"></div>`;
        h+=`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:9px;font-weight:800;color:rgba(255,255,255,0.75);text-shadow:0 1px 2px rgba(0,0,0,0.9)">${currentStep.progress}/${currentStep.qty}</div>`;
        h+=`</div>`;
      }
      h+=`<div style="text-align:right;margin-top:4px"><span onclick="event.stopPropagation();abandonClue('${t}')" style="font-family:'Cinzel',serif;font-size:9px;color:${_abandonConfirm===t?'rgba(255,80,80,0.95)':'rgba(200,100,100,0.5)'};cursor:pointer;letter-spacing:0.5px;transition:color .15s" onmouseover="this.style.color='rgba(255,100,100,0.9)'" onmouseout="this.style.color='${_abandonConfirm===t?'rgba(255,80,80,0.95)':'rgba(200,100,100,0.5)'}'">${_abandonConfirm===t?'⚠ Click again to confirm':'✕ Abandon'}</span></div>`;
      h+=`</div>`;
    }
  });
  if(!hasAny&&tiers.every(t=>(storage['casket_'+t]||0)===0)){
    h+=`<div class="nlog-clue-empty">No clue scrolls yet.<br>Keep gathering and fighting — they'll drop!</div>`;
  }
  el.innerHTML=h;
}
let _abandonConfirm=null;
function abandonClue(tier){
  if(!activeClues[tier])return;
  if(_abandonConfirm===tier){
    delete activeClues[tier];
    _abandonConfirm=null;
    renderCluePanel();
    addLog(`Abandoned ${tier} clue scroll.`,'📜','error');
  } else {
    _abandonConfirm=tier;
    renderCluePanel();
    setTimeout(()=>{if(_abandonConfirm===tier){_abandonConfirm=null;renderCluePanel();}},3000);
  }
}
window.abandonClue=abandonClue;

// ── RESTED XP SYSTEM ──
// While offline (tab backgrounded, or eventually loaded from a save), each hero accumulates
// per-skill rested XP. When training, rested XP is consumed to grant 2× XP per action.
// Cap per skill: 1.5 levels worth of XP at the hero's CURRENT level.
// Fill rate: 1 level worth of XP per 8 hours offline, per skill (so 8 hours = +1 lvl rested,
// 12 hours = capped at 1.5 lvls).
const RESTED_FILL_HOURS_PER_LEVEL=8;
const RESTED_CAP_LEVELS=1.5;

// Track offline accumulation for the welcome-back modal
let _restedAccumThisSession=0;

function tickRestedXp(realDeltaSec){
  // Cap any single tick to 24 hours of accumulation (prevents absurd results from clock drift / sleep)
  const sec=Math.min(realDeltaSec,24*3600);
  const hours=sec/3600;
  if(hours<=0)return;
  // For each hero × each non-combat-substat skill, add proportional XP
  // Combat substats (melee_str, range_str, mage_str) train alongside melee/ranged/magic so
  // we exclude them to avoid double-dipping.
  const _skipSkills={melee_str:1,range_str:1,mage_str:1,hitpoints:1};
  let totalGained=0;
  dots.forEach(d=>{
    if(!d.restedXp)d.restedXp={};
    SKILLS.forEach(s=>{
      if(_skipSkills[s.id])return;
      const lvl=d.skills[s.id]||1;
      if(lvl>=99)return; // already maxed, no rested XP needed
      const oneLevel=xpNext(lvl);
      const cap=Math.floor(oneLevel*RESTED_CAP_LEVELS);
      const fillRate=oneLevel/RESTED_FILL_HOURS_PER_LEVEL; // XP per hour
      const cur=d.restedXp[s.id]||0;
      const add=fillRate*hours;
      const next=Math.min(cap,cur+add);
      const actuallyAdded=next-cur;
      if(actuallyAdded>0){d.restedXp[s.id]=next;totalGained+=actuallyAdded;}
    });
  });
  if(totalGained>0){
    _restedAccumThisSession+=totalGained;
    // Show a toast when a meaningful amount accumulates while away (>= 5 minutes worth)
    if(realDeltaSec>=300&&!window._restedToastShown){
      window._restedToastShown=true;
      showRestedWelcomeBack(realDeltaSec);
      // Re-arm the toast for the next backgrounding session
      setTimeout(()=>{window._restedToastShown=false;},10000);
    }
  }
}

  const hours=Math.floor(awaySec/3600);

  t.innerHTML=`<div class="qc-toast-mark" style="background:rgba(140,180,230,0.18);border-color:rgba(140,180,230,0.55);color:#a8c8ee;">💤</div>`+

function rrect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

// Check if a world point is inside any rect of a zone
function ptInZone(z,px,py){
  if(z.rects&&z.rects.length){return z.rects.some(r=>px>=r.x&&px<=r.x+r.w&&py>=r.y&&py<=r.y+r.h);}
  return px>=z.x&&px<=z.x+z.w&&py>=z.y&&py<=z.y+z.h;
}

// Adjacency list with edge distances
const _adj=[];
const _raidAdj=[];
function buildAdj(){
  for(let i=0;i<NODES.length;i++)_adj[i]=[];
  EDGES.forEach(e=>{
    if(!NODES[e.a]||!NODES[e.b])return;
    const d=Math.sqrt((NODES[e.a].x-NODES[e.b].x)**2+(NODES[e.a].y-NODES[e.b].y)**2);
    _adj[e.a].push({to:e.b,w:d});
    _adj[e.b].push({to:e.a,w:d});
  });
}
function buildRaidAdj(){
  for(let i=0;i<RAID_NODES.length;i++)_raidAdj[i]=[];
  RAID_EDGES.forEach(e=>{
    if(!RAID_NODES[e.a]||!RAID_NODES[e.b])return;
    const d=Math.sqrt((RAID_NODES[e.a].x-RAID_NODES[e.b].x)**2+(RAID_NODES[e.a].y-RAID_NODES[e.b].y)**2);
    _raidAdj[e.a].push({to:e.b,w:d});
    _raidAdj[e.b].push({to:e.a,w:d});
  });
}
buildAdj();

let _raidAdjBuilt=false;
function ensureRaidAdj(){if(!_raidAdjBuilt&&typeof RAID_NODES!=='undefined'){buildRaidAdj();_raidAdjBuilt=true;}}

function activeNodes(){if(_mapMode==='raid'){ensureRaidAdj();return RAID_NODES;}return NODES;}

// Find nearest node of any type (or with a specific tag filter)
function nearestNode(wx,wy,requireTag){
  const nodes=activeNodes();
  let best=-1,bd=Infinity;
  for(let i=0;i<nodes.length;i++){
    const n=nodes[i];
    if(requireTag&&!n.t.includes(requireTag))continue;
    const d=(n.x-wx)**2+(n.y-wy)**2;
    if(d<bd){bd=d;best=i;}
  }
  return best;
}

// A* pathfinding between two node indices
function findPath(startIdx,endIdx){
  const nodes=activeNodes();const adj=activeAdj();
  if(startIdx<0||endIdx<0||startIdx>=nodes.length||endIdx>=nodes.length)return[];
  if(startIdx===endIdx)return[startIdx];
  const n=nodes.length;
  const g=new Float64Array(n).fill(Infinity);
  const f=new Float64Array(n).fill(Infinity);
  const prev=new Int32Array(n).fill(-1);
  const closed=new Uint8Array(n);
  g[startIdx]=0;
  const ex=nodes[endIdx].x,ey=nodes[endIdx].y;
  f[startIdx]=Math.sqrt((nodes[startIdx].x-ex)**2+(nodes[startIdx].y-ey)**2);
  const open=new Set([startIdx]);
  while(open.size){
    let cur=-1,cf=Infinity;
    open.forEach(i=>{if(f[i]<cf){cf=f[i];cur=i;}});
    if(cur===endIdx){
      const p=[];let c=endIdx;while(c!==-1){p.unshift(c);c=prev[c];}return p;
    }
    open.delete(cur);closed[cur]=1;
    (adj[cur]||[]).forEach(edge=>{
      if(closed[edge.to])return;
      const ng=g[cur]+edge.w;
      if(ng<g[edge.to]){
        g[edge.to]=ng;prev[edge.to]=cur;
        f[edge.to]=ng+Math.sqrt((nodes[edge.to].x-ex)**2+(nodes[edge.to].y-ey)**2);
        open.add(edge.to);
      }
    });
  }
  return[];
}

// Pick a random node with given tag (preferably reachable from a start position)
function pickTaggedNode(tag,fromX,fromY){
  const nodes=activeNodes();const adj=activeAdj();
  const candidates=[];
  for(let i=0;i<nodes.length;i++)if(nodes[i].t.includes(tag))candidates.push(i);
  if(!candidates.length)return-1;
  if(fromX!==undefined){
    const startN=nearestNode(fromX,fromY);
    if(startN>=0){
      const reach=new Set([startN]);const q=[startN];
      while(q.length){const c=q.shift();(adj[c]||[]).forEach(e=>{if(!reach.has(e.to)){reach.add(e.to);q.push(e.to);}});}
      const reachable=candidates.filter(i=>reach.has(i));
      if(reachable.length)return reachable[Math.floor(Math.random()*reachable.length)];
    }
  }
  return candidates[Math.floor(Math.random()*candidates.length)];
}

// Get waypoints from world (fromX,fromY) to a random tagged node
function getWaypointsToTag(fromX,fromY,tag){
  const nodes=activeNodes();
  const startN=nearestNode(fromX,fromY);
  const endN=pickTaggedNode(tag,fromX,fromY);
  if(startN<0||endN<0)return null;
  const path=findPath(startN,endN);
  if(!path.length)return null;
  return{
    waypoints:path.map(i=>({x:nodes[i].x,y:nodes[i].y})),
    targetNode:endN,
    targetPos:{x:nodes[endN].x,y:nodes[endN].y}
  };
}

// Get waypoints to a specific world position (pathfind to nearest node then walk)
function getWaypointsToPos(fromX,fromY,toX,toY){
  const nodes=activeNodes();
  const startN=nearestNode(fromX,fromY);
  const endN=nearestNode(toX,toY);
  if(startN<0||endN<0)return[{x:toX,y:toY}];
  const path=findPath(startN,endN);
  if(!path.length)return[{x:toX,y:toY}];
  const wps=path.map(i=>({x:nodes[i].x,y:nodes[i].y}));
  wps.push({x:toX,y:toY});
  return wps;
}

// Find next tagged node in chain traversal. Given current tagged node index, find the next
// reachable tagged node with the given tag, excluding the 'cameFrom' node (to avoid immediate backtrack).
// Returns {nextIdx, waypoints} or null if no valid next node (chain ended — caller should reverse).
function findNextTaggedInChain(currentIdx,tag,cameFromIdx){
  const nodes=activeNodes();const adj=activeAdj();
  if(currentIdx<0||!nodes[currentIdx])return null;
  const visited=new Uint8Array(nodes.length);
  visited[currentIdx]=1;
  const queue=[{idx:currentIdx,path:[currentIdx]}];
  while(queue.length){
    const {idx,path}=queue.shift();
    for(const edge of adj[idx]||[]){
      if(visited[edge.to])continue;
      visited[edge.to]=1;
      const newPath=[...path,edge.to];
      if(edge.to!==cameFromIdx&&nodes[edge.to].t.includes(tag)){
        return{
          nextIdx:edge.to,
          waypoints:newPath.map(i=>({x:nodes[i].x,y:nodes[i].y}))
        };
      }
      queue.push({idx:edge.to,path:newPath});
    }
  }
  return null;
}

        hpGrad.addColorStop(1,bhPct>0.5?'#dd4444':bhPct>0.25?'#dd7733':'#aa2222');
        ctx.fillStyle=hpGrad;ctx.fillRect(bhX,bhY,bhW*bhPct,bhH);
      }
      if(camZ>0.3){ctx.fillStyle='#ffffffdd';ctx.font='800 '+Math.max(8,11*camZ)+'px "DM Sans"';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText((window._bossHP||0)+'/'+(window._bossMaxHP||0),bs2.x,bhY+bhH/2);}
    }
  }
  // drawPets(); — disabled (pet system removed)
  // Green line VFX for clue step completion
  for(let i=_greenLines.length-1;i>=0;i--){
    const gl=_greenLines[i];gl.age+=0.016;
    if(gl.age>=gl.life){_greenLines.splice(i,1);continue;}
    const s=w2s(gl.x,gl.y);const t=gl.age/gl.life;
    const alpha=t<0.3?t/0.3:1-(t-0.3)/0.7;
    const h=120*camZ*(1-t*0.3);
    ctx.save();ctx.globalAlpha=alpha*0.7;
    const grad=ctx.createLinearGradient(s.x,s.y,s.x,s.y-h);
    grad.addColorStop(0,'rgba(60,220,90,0.8)');grad.addColorStop(0.5,'rgba(60,220,90,0.3)');grad.addColorStop(1,'transparent');
    ctx.strokeStyle=grad;ctx.lineWidth=3*camZ;
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x,s.y-h);ctx.stroke();
    // Bright core
    const grad2=ctx.createLinearGradient(s.x,s.y,s.x,s.y-h*0.6);
    grad2.addColorStop(0,'rgba(150,255,160,0.9)');grad2.addColorStop(1,'transparent');
    ctx.strokeStyle=grad2;ctx.lineWidth=1.5*camZ;
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x,s.y-h*0.6);ctx.stroke();
    ctx.restore();
  }
  drawProjectiles();
  ctx.textAlign='center';ctx.textBaseline='middle';floats.forEach(f=>{
    const t=f.age/f.life;const s=w2s(f.x,f.sy-t*25);if(s.x<-50||s.x>W+50)return;
    ctx.globalAlpha=Math.max(0,1-t*t);
    // OSRS-style hitsplats for combat numbers
    const isHit=f.color==='#cc3333';
    const isBlock=f.color==='#2255cc';
    const isHeal=f.color==='#44cc44';
    if((isHit||isBlock||isHeal)&&!isNaN(parseInt(f.text))){
      const sz=Math.max(9,12*camZ);
      // Draw splat shape
      function drawSplat(cx,cy,r,col,darkCol,points){
        ctx.fillStyle=col;ctx.beginPath();
        const seed=f.id*137;
        for(let i=0;i<points;i++){
          const ang=(i/points)*Math.PI*2;
          const spike=(i%2===0)?r*1.35:r*0.75;
          const wobble=((Math.sin(seed+i*3)*0.15)+1);
          const px=cx+Math.cos(ang)*spike*wobble;
          const py=cy+Math.sin(ang)*spike*wobble;
          if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
        }
        ctx.closePath();ctx.fill();
        // Dark inner
        ctx.fillStyle=darkCol;ctx.beginPath();ctx.arc(cx,cy,r*0.55,0,Math.PI*2);ctx.fill();
        // Bright center
        ctx.fillStyle=col;ctx.beginPath();ctx.arc(cx,cy,r*0.35,0,Math.PI*2);ctx.fill();
      }
      if(isHit){
        drawSplat(s.x,s.y,sz,'#cc2222','#881111',12);
      } else if(isBlock){
        drawSplat(s.x,s.y,sz,'#2244cc','#1a2288',10);
      } else {
        drawSplat(s.x,s.y,sz,'#22bb44','#117722',10);
      }
      // White number
      ctx.fillStyle='#ffffff';ctx.font=`900 ${Math.max(8,11*camZ)}px "DM Sans"`;
      ctx.shadowColor='#000000';ctx.shadowBlur=2;
      ctx.fillText(f.text,s.x,s.y+1);
      ctx.shadowBlur=0;
    } else {
      // Normal float text (XP, loot, etc)
      ctx.fillStyle=f.color;ctx.font=`800 ${Math.max(10,14*camZ)}px "DM Sans"`;ctx.fillText(f.text,s.x,s.y);
    }
    ctx.globalAlpha=1;
  });
}

function showGearTT(el,itemId,qty){
  const tt=document.getElementById('bank-gear-tt');if(!tt)return;

    const eqItemId=d?d.eq[gs.slot]:null;
    const isEquipped=eqItemId===itemId;
    const eqGs=eqItemId&&!isEquipped?GEAR_STATS[eqItemId]:null;
    const eqIt=eqItemId&&!isEquipped?ITEMS[eqItemId]:null;
    const imgSrc=ITEM_IMGS&&ITEM_IMGS[itemId]?`<img src="${ITEM_IMGS[itemId]}" style="width:${ITEM_SCALES&&ITEM_SCALES[itemId]||'100%'};height:${ITEM_SCALES&&ITEM_SCALES[itemId]||'100%'};object-fit:contain;${ITEM_FILTERS&&ITEM_FILTERS[itemId]?'filter:'+ITEM_FILTERS[itemId]:''}">`:it.icon;

      const diff=nv-ov;
      if(diff>0)return`<span class="tt-pos">+${diff}</span>`;
      if(diff<0)return`<span class="tt-neg">${diff}</span>`;
      return nv>0?`<span class="tt-zero">+${nv}</span>`:`<span class="tt-zero">—</span>`;
    }
    
    let h=`<div class="bank-tt-top"><div class="bank-tt-icon-wrap">${imgSrc}</div><div class="bank-tt-right"><div class="bank-tt-name">${it.label}</div><div class="bank-tt-sub" style="color:rgba(200,180,150,0.35)">${slotNames[gs.slot]||gs.slot}</div></div></div>`;
    // Stats in equipment bonus format
    h+=`<div style="padding:6px 0 2px">`;

    h+=`<div style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px;color:rgba(160,150,130,0.6)"><span style="font-size:14px;width:18px;text-align:center">🔮</span><span>Str:${fmtV('mage_str')}</span><span style="margin-left:4px">Acc:${fmtV('mage_acc')}</span><span style="margin-left:4px">Def:${fmtV('defence')}</span></div>`;
    h+=`</div>`;
    // Special passives (ammoSave from quivers/tomes)
    if(gs.ammoSave){
      const eqAmmoSave=eqGs?(eqGs.ammoSave||0):0;
      const diff=gs.ammoSave-eqAmmoSave;
      const cls=eqGs?(diff>0?'tt-pos':diff<0?'tt-neg':'tt-zero'):'tt-neutral';
      const sign=eqGs?(diff>=0?'+':''):'';
      const showVal=eqGs?Math.round(diff*100):Math.round(gs.ammoSave*100);
      h+=`<div style="margin-top:4px;padding:5px 8px;background:rgba(127,174,93,0.06);border-left:2px solid rgba(127,174,93,0.3);border-radius:3px;font-size:11px;color:rgba(180,200,160,0.75)">🎯 <strong>${Math.round(gs.ammoSave*100)}% chance</strong> to not consume ammo${eqGs&&diff!==0?` <span class="${cls}">(${sign}${showVal}%)</span>`:''}</div>`;
    }
    if(gs.req){
      const reqParts=Object.entries(gs.req).map(([sk,lv])=>{const skObj=SKILLS.find(s=>s.id===sk);const met=d&&(d.skills[sk]||1)>=lv;return`<span style="color:${met?'rgba(127,174,93,0.8)':'rgba(220,80,80,0.85)'}">Lv ${lv} ${skObj?.label||sk}</span>`;}).join(' · ');

    tt.innerHTML=h;

      desc=typeLabel;
    }

            usedRecipes.push({label:outLabel,need:a.recipe[itemId],lvl:a.lvl,skill:skillKey});

          }

function openCombatModal(d,zone,selectedAct,skillKey){
  window._lastCombatModalArgs={d,zone,selectedAct,skillKey};
  window._combatTierIdx=window._combatTierIdx||0;
  const modal=document.getElementById('cb-modal');
  const acts=ACTIVITIES[skillKey]||[];
  const tiers=acts.filter(a=>a.tier&&a.mobs);
  const playerLvl=d.skills[skillKey]||1;
  const styleLabel=zone==='combat'?'Melee':zone==='ranged_combat'?'Ranged':'Magic';

  if(window._combatTierIdx>=tiers.length)window._combatTierIdx=0;

function buildStatsChart(stats){
  if(!stats)return'';
  const entries=Object.values(stats);
  const maxDealt=Math.max(1,...entries.map(e=>e.dmgDealt));
  const maxTaken=Math.max(1,...entries.map(e=>e.dmgTaken));
  const totalDealt=entries.reduce((s,e)=>s+e.dmgDealt,0);
  const totalTaken=entries.reduce((s,e)=>s+e.dmgTaken,0);
  const mvpId=entries.reduce((best,e)=>e.dmgDealt>best.dmgDealt?e:best,entries[0]);
  let h='<div class="bs-chart"><div class="bs-chart-title">Damage Dealt</div>';
  entries.sort((a,b)=>b.dmgDealt-a.dmgDealt).forEach(e=>{
    const pct=Math.round(e.dmgDealt/maxDealt*100);
    const isMvp=e===mvpId;
    h+=`<div class="bs-row"><div class="bs-name" style="color:${e.color}">${isMvp?'<span class="bs-mvp-badge">👑</span>':''}${e.name}</div><div class="bs-bar-wrap"><div class="bs-bar${isMvp?' mvp':''}" style="width:${pct}%;background:linear-gradient(90deg,${e.color}cc,${e.color}66)"></div><div class="bs-bar-text">${e.dmgDealt} dmg (${e.hits} hits)</div></div></div>`;
  });
  h+='<div class="bs-chart-title" style="margin-top:16px">Damage Taken</div>';
  entries.sort((a,b)=>b.dmgTaken-a.dmgTaken).forEach(e=>{
    const pct=Math.round(e.dmgTaken/maxTaken*100);
    h+=`<div class="bs-row"><div class="bs-name" style="color:${e.color}">${e.name}</div><div class="bs-bar-wrap"><div class="bs-bar" style="width:${pct}%;background:linear-gradient(90deg,#cc4444aa,#88222266)"></div><div class="bs-bar-text">${e.dmgTaken} dmg</div></div></div>`;
  });
  h+=`<div class="bs-totals">Total Dealt: <span>${totalDealt}</span> · Total Taken: <span>${totalTaken}</span></div>`;
  h+='</div>';
  return h;
}

// ═══ BOSS KEY SYSTEM ═══
const BOSS_KEYS={'🔑 Goblin King':'boss_key_t1','🔑 Skeleton Lord':'boss_key_t2','🔑 Moss Emperor':'boss_key_t3','🔑 Troll Warlord':'boss_key_t4','🔑 Demon Prince':'boss_key_t5','🔑 Harvest King':'boss_key_t6','🔑 Shadow Warden':'boss_key_t7','🔑 Void Sovereign':'boss_key_t8','🔑 Elder Wyrm':'boss_key_t9'};
window.startBossFight=(dotId,zone,actId,mobLabel)=>{
  const keyId=BOSS_KEYS[mobLabel];if(!keyId)return;
  if((storage[keyId]||0)<=0){addLog('You need a '+ITEMS[keyId].label+'!','','info');return;}
  storage[keyId]--;bankDirty=true;
  addLog('Used '+ITEMS[keyId].label+'! All fighters to the Key Arena!','','levelup');
  let boss=null;
  ['melee','ranged','magic'].forEach(sk=>{if(boss)return;(ACTIVITIES[sk]||[]).forEach(a=>{if(a.id===actId){const b=a.mobs.find(m=>m.label===mobLabel&&m.boss);if(b)boss=b;}});});
  if(!boss){addLog('Boss not found!','','info');return;}
  closeCombatModal();
  // Save hero positions for return
  window._preBossPositions=dots.map(d=>({x:d.x,y:d.y,profession:d.profession,activity:d.activity,state:d.state}));
  // Switch to boss room map
  _mapMode='boss_room';buildBg();
  const foodPriority=['cooked_giant_meat','swordfish','lobster','salmon','trout','herring','sardine','shrimp','cooked_berries'];
  // Position heroes in boss room - melee close, ranged/mage far
  dots.forEach((d,i)=>{
    // Deposit all current inventory to bank first
    d.inv.forEach((s,si)=>{if(s){bankAdd(s.id,s.qty);d.inv[si]=null;}});
    // Now grab food into empty inventory
    for(let si=0;si<INV_SIZE;si++){
      for(const fid of foodPriority){
        if((storage[fid]||0)>0){
          d.inv[si]={id:fid,qty:1};storage[fid]--;bankDirty=true;break;
        }
      }
    }
    d.profession='key_arena';
    d.activity={id:actId,label:boss.label,tier:true,mobs:[boss],lvl:1,icon:'⚔️'};
    d.currentMob=null;
    d.monsterHp=0;d.monsterMaxHp=0;
    d.state='gathering'; // instant fight, no walking
    d.gatherTimer=0;
    d.dead=false;d.deathTimer=0;
    d.curHp=d.maxHp;
    // Position in boss room - boss north, players south
    const wep=d.eq?d.eq.weapon:null;const gs=wep?GEAR_STATS[wep]:null;
    const isRanged=gs&&(gs.range_acc||gs.range_str);
    const isMage=gs&&(gs.mage_acc||gs.mage_str);
    // Center the hero line based on actual hero count
    const heroCount=dots.length;
    const heroSpacing=50;
    const heroBaseX=BOSS_MW/2-((heroCount-1)*heroSpacing)/2;
    if(isMage){
      // Mage — back row (furthest south)
      d.x=heroBaseX+i*heroSpacing;d.y=BOSS_MH-120;
    } else if(isRanged){
      // Ranged — mid row
      d.x=heroBaseX+i*heroSpacing;d.y=BOSS_MH-200;
    } else {
      // Melee — front row, closest to boss
      d.x=heroBaseX+i*heroSpacing;d.y=280;
    }
    d.tx=d.x;d.ty=d.y;
  });
  window._bossHP=boss.hp;window._bossMaxHP=boss.hp;
  window._bossStats={};dots.forEach(dd=>{window._bossStats[dd.id]={name:dd.name,color:dd.color,dmgDealt:0,dmgTaken:0,hits:0,eats:0};});
  window._bossActive=true;window._bossMob=boss;window._bossActId=actId;
  window._bossX=BOSS_MW/2;window._bossY=160;
  // Pan camera to boss room center
  camX=BOSS_MW/2;camY=BOSS_MH/2;camZ=0.8;
  addLog('The fight begins! All '+dots.length+' heroes vs '+boss.label+'!','','levelup');
  uiDirty=true;buildPanel();buildResPanel();
};
// Return heroes to main map after boss fight
function returnToMainMap(){
  _mapMode='main';buildBg();
  const th=zC(ZONES.townhall);
  dots.forEach((d,i)=>{
    if(d.profession==='key_arena'){
      const saved=window._preBossPositions&&window._preBossPositions[i];
      if(saved&&saved.profession&&saved.profession!=='key_arena'&&saved.profession!=='townhall'&&ZONES[saved.profession]){
        d.profession=saved.profession;d.activity=saved.activity||null;
        d.x=th.x+(Math.random()-.5)*30;d.y=th.y+(Math.random()-.5)*30;
        d.curHp=d.maxHp;d.dead=false;d.deathTimer=0;
        d.currentMob=null;d.monsterHp=0;d.monsterMaxHp=0;
        sendToZone(d,saved.profession);
      } else {
        d.profession='townhall';d.activity=null;d.currentMob=null;
        d.monsterHp=0;d.monsterMaxHp=0;
        d.x=th.x+(Math.random()-.5)*30;d.y=th.y+(Math.random()-.5)*30;
        d.state='idle';d.dead=false;d.deathTimer=0;d.curHp=d.maxHp;
      }
    }
  });
  camX=th.x;camY=th.y;camZ=0.45;
  uiDirty=true;buildPanel();
  // Process any deferred hero unlocks earned during the boss fight
  setTimeout(()=>processPendingHeroUnlocks(),800);
}

window.doPickSkill=(id,role)=>{
  if(window._bossActive){addLog('⚔️ Cannot change tasks during a boss fight!','🔒','info');return;}
  // Block combat during raid prep
  if(_raidActive&&_raidPhase==='prep'&&(role==='combat'||role==='ranged_combat'||role==='magic_combat'||role==='key_arena')){addLog('🏟️ No combat during raid prep!','🔒','info');return;}
  skillDropOpen=false;document.getElementById('sd-portal').classList.remove('open');document.getElementById('sd-portal').innerHTML='';
  const d=dots.find(dd=>dd.id===id);if(!d)return;
  combatReqMsg='';
  // Set requirement messages for ranged/mage
  if(role==='ranged_combat'){
    const hasArrows=['bronze_arrow','iron_arrow','steel_arrow','mithril_arrow','obsidian_arrow','titanium_arrow','infernal_arrow'].some(a=>(storage[a]||0)>0||(d.eq&&d.eq.ammo===a&&(d.ammoQty||0)>0));
    const hasBow=['shortbow','oak_shortbow','willow_shortbow','maple_shortbow','yew_bow','magic_bow'].some(b=>(d.eq&&d.eq.weapon===b)||(storage[b]||0)>0);
    if(!hasBow||!hasArrows){combatReqMsg='🏹 Ranged requires a Bow and Arrows. Fletch a bow (4 logs + bowstring) and arrows (feather + log + bar) to begin training.';}
  }
  if(role==='magic_combat'){
    const hasRunes=['infused_rune','magical_rune','enchanted_rune','cursed_rune','arcane_rune','mystic_rune'].some(r=>(storage[r]||0)>0||(d.eq&&d.eq.ammo===r&&(d.ammoQty||0)>0));
    const hasStaff=['infused_staff','magical_staff','enchanted_staff','cursed_staff','arcane_staff','mystic_staff'].some(s=>(d.eq&&d.eq.weapon===s)||(storage[s]||0)>0);
    if(!hasStaff||!hasRunes){combatReqMsg='🔮 Magic requires a Staff and Runes. Craft a staff and runes at the Rune Altar to begin training.';}
  }
  // Block if requirements not met
  if(combatReqMsg){uiDirty=true;ppHovered=false;buildPanel();return;}
  const _cz=['combat','ranged_combat','magic_combat'];
  if(_cz.includes(role)){
    assign(d,role);uiDirty=true;ppHovered=false;buildPanel();
    const _z=ZONES[role];const _sk=_z&&_z.skills&&_z.skills[0]?_z.skills[0]:null;
    if(_sk){const _acts=ACTIVITIES[_sk]||[];const _ft=_acts.find(a=>a.tier&&a.mobs);if(_ft){openCombatModal(d,role,_ft,_sk);return;}}
  }
  if(_raidActive){
    assign(d,role);uiDirty=true;ppHovered=false;buildPanel();
  } else {
    actExpanded=true;assign(d,role);uiDirty=true;ppHovered=false;buildPanel();
  }
};

  portal.style.top=(rect.bottom+4)+'px';

  const d=dots[selIdx];

  const combatZones=['combat','ranged_combat','magic_combat'];
  const utilZones=['thieving','agility'];
  let h=``;
  let catData=[['Combat',combatZones],['Gathering',gatherZones],['Production',prodZones],['Utility',utilZones]];
  // During raid prep, only show skills available in the raid
  if(_raidActive&&_raidPhase==='prep'){
    const raidSkills=['thieving','fishing','foraging_zone','herblore','cooking','smithing','fletching','runecraft'];
    catData=[
      ['Gathering',gatherZones.filter(z=>raidSkills.includes(z))],

      ['Utility',utilZones.filter(z=>raidSkills.includes(z))],
    ].filter(([zones])=>zones.length>0);
  }
  catData.forEach(([label,zones])=>{
    h+=`<div class="sd-cat"><div class="sd-cat-line"></div><span class="sd-cat-text">${label}</span><div class="sd-cat-line r"></div></div>`;

      // Resolve the zone's primary skill so icons match the skill panel
      const z=ZONES[zid];
      const skillId=z&&z.skills&&z.skills[0];

    });
  });
  portal.innerHTML=h;
  portal.classList.add('open');
}

function initPets(){

    const th=zC(ZONES.townhall);

function updatePets(dt){
  if(_mapMode==='boss_room'||_mapMode==='raid')return; // Pets frozen during boss/raid
  petEntities.forEach(pet=>{
    const pd=pet.def;
    const zone=ZONES[pd.zone];if(!zone)return;
    
    // Follow waypoints if any are queued
    if(pet._waypoints&&pet._waypoints.length){
      const wp=pet._waypoints[pet._wpIdx||0];
      const dx=wp.x-pet.x,dy=wp.y-pet.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<8){
        pet._wpIdx=(pet._wpIdx||0)+1;
        if(pet._wpIdx>=pet._waypoints.length){
          // Reached final destination — run state's arrival logic
          pet._waypoints=null;pet._wpIdx=0;
          pet._arrived=true;
        }
      } else {
        const s=pet.speed*dt;pet.x+=(dx/dist)*Math.min(s,dist);pet.y+=(dy/dist)*Math.min(s,dist);
        return; // still walking
      }
    }
    
    switch(pet.state){
      case'idle':{
        // Find a character in our zone with full inventory
        const target=dots.find(d=>d.profession===pd.zone&&invSlots(d)>=INV_SIZE-2&&d.state==='gathering');
        if(target){
          pet.targetDot=target;
          // Pathfind to the worker (worker is inside their zone)
          
          pet._waypoints=getWaypointsToPos(pet.x,pet.y,target.x,target.y);
          pet._wpIdx=0;pet._arrived=false;
          pet.state='walk_to_worker';
        } else {
          // Wander near zone
          const zc=zC(zone);
          if(Math.abs(pet.x-zc.x)>50||Math.abs(pet.y-zc.y)>50){
            
            pet._waypoints=getWaypointsToPos(pet.x,pet.y,zc.x+(Math.random()-.5)*30,zc.y+(Math.random()-.5)*30);
            pet._wpIdx=0;pet._arrived=false;
            pet.state='walk_to_zone';
          }
        }
        break;
      }
      case'walk_to_zone':{
        if(pet._arrived){pet.state='idle';pet._arrived=false;}
        break;
      }
      case'walk_to_worker':{
        if(!pet.targetDot){pet.state='idle';pet._waypoints=null;break;}
        // Refresh final waypoint to worker's current position (they might be wandering)
        if(pet._waypoints&&pet._waypoints.length){
          pet._waypoints[pet._waypoints.length-1]={x:pet.targetDot.x,y:pet.targetDot.y};
        }
        if(pet._arrived){
          // Collect items from worker
          const d=pet.targetDot;
          const dx2=d.x-pet.x,dy2=d.y-pet.y;
          if(Math.sqrt(dx2*dx2+dy2*dy2)<20){
            for(let i=0;i<INV_SIZE;i++){
              if(d.inv[i]){pet.carryItems.push({...d.inv[i]});d.inv[i]=null;}
            }
            if(pet.carryItems.length>0){
              addFloat(d.x,d.y-20,`${pd.icon} Collected!`,'#ccaa44',1.5);
              // Pathfind to bank
              const th=zC(ZONES.townhall);
              
              pet._waypoints=getWaypointsToPos(pet.x,pet.y,th.x,th.y);
              pet._wpIdx=0;pet._arrived=false;
              pet.state='walk_to_bank';
            } else {pet.state='idle';pet._arrived=false;}
          } else {
            // Worker moved — restart pathfinding
            
            pet._waypoints=getWaypointsToPos(pet.x,pet.y,d.x,d.y);
            pet._wpIdx=0;pet._arrived=false;
          }
          pet.targetDot=pet.carryItems.length>0?null:pet.targetDot;
        }
        break;
      }
      case'walk_to_bank':{
        if(pet._arrived){
          // Deposit items
          pet.carryItems.forEach(item=>{bankAdd(item.id,item.qty);});
          if(pet.carryItems.length>0){bankDirty=true;uiDirty=true;}
          pet.carryItems=[];
          // Walk back to zone
          const zc=zC(ZONES[pd.zone]);
          pet._waypoints=getWaypointsToPos(pet.x,pet.y,zc.x+(Math.random()-.5)*20,zc.y+(Math.random()-.5)*20);
          pet._wpIdx=0;pet._arrived=false;
          pet.state='walk_to_zone';
        }
        break;
      }
    }
  });
}

// Get the buff category for a potion (melee, range, mage, defence, combat, gather, prod, energy)
function getPotionCategory(potionId){
  const base=potionId.replace('super_','');
  return base; // e.g. 'melee_potion', 'range_potion', etc.
}

function usePotion(potionId){
  if((storage[potionId]||0)<=0)return;
  const def=POTION_DEFS[potionId];if(!def)return;
  storage[potionId]--;bankDirty=true;
  const isSuper=potionId.startsWith('super_');
  const category=getPotionCategory(potionId);
  const regularId=category;
  const superId='super_'+category;
  
  // Same potion used again — stack duration
  if(activeBuffs[potionId]){
    activeBuffs[potionId].remaining+=def.duration;
    addLog(`Stacked ${def.label}! (${Math.floor(activeBuffs[potionId].remaining/60)}m remaining)`,def.icon,'levelup');
  } else if(isSuper){
    // Using super: pause any active regular of same category
    let paused=null;
    if(activeBuffs[regularId]){
      paused={id:regularId,remaining:activeBuffs[regularId].remaining};
      delete activeBuffs[regularId];
    }
    // Combat potion special: pause individual potions it covers

    activeBuffs[potionId]={remaining:def.duration,def,paused};
    addLog(`Used ${def.label}!`,def.icon,'levelup');
  } else {
    // Using regular: if super is active, don't replace it — just set as waiting
    if(activeBuffs[superId]){
      // Super is active — store this regular as the paused backup on the super
      if(!activeBuffs[superId].paused){
        activeBuffs[superId].paused={id:potionId,remaining:def.duration};
      } else {
        activeBuffs[superId].paused.remaining+=def.duration;
      }
      addLog(`${def.label} queued behind Super!`,def.icon,'info');
    } else {
      // No super active — use normally
      activeBuffs[potionId]={remaining:def.duration,def,paused:null};
      addLog(`Used ${def.label}!`,def.icon,'levelup');
    }
  }
  addFloat(dots[0].x,dots[0].y-30,`${def.icon} ${def.label}!`,def.color,2);
  buildBuffBar();buildResPanel();
}
window.usePotion=usePotion;

function updateBuffs(dt){
  let changed=false;
  Object.keys(activeBuffs).forEach(pid=>{
    activeBuffs[pid].remaining-=dt;
    if(activeBuffs[pid].remaining<=0){
      const expired=activeBuffs[pid];
      delete activeBuffs[pid];
      changed=true;
      addLog(`${POTION_DEFS[pid]?.label} wore off`,'🧪','info');
      // If super expired and had a paused regular, restore it
      if(expired.paused&&expired.paused.remaining>0){
        const pausedDef=POTION_DEFS[expired.paused.id];
        if(pausedDef){
          activeBuffs[expired.paused.id]={remaining:expired.paused.remaining,def:pausedDef,paused:null};
          addLog(`${pausedDef.label} resumed!`,'🧪','info');
        }
      }
    }
  });
  if(changed)buildBuffBar();
}

function getPotionBuff(type){
  let total=0;
  Object.values(activeBuffs).forEach(b=>{if(b.def.buffs[type])total+=b.def.buffs[type];});

}

function buildBuffBar(){
  const bar=document.getElementById('buff-bar');if(!bar)return;
  // Position below group bar
  const gbar=document.getElementById('gbar');
  if(gbar){const gr=gbar.getBoundingClientRect();bar.style.top=(gr.bottom+4)+'px';}
  const entries=Object.entries(activeBuffs);
  if(entries.length===0){bar.innerHTML='';bar.style.display='none';return;}
  bar.style.display='flex';
  bar.innerHTML=entries.map(([pid,b])=>{
    const d=b.def;const mins=Math.floor(b.remaining/60);const secs=Math.floor(b.remaining%60);
    const timeStr=mins>0?`${mins}:${secs<10?'0'+secs:secs}`:`${secs}s`;
    const fullMins=Math.floor(b.remaining/60);const fullSecs=Math.ceil(b.remaining%60);
    const buffList=Object.entries(d.buffs).map(([k,v])=>{
      const labels={melee_acc:'Melee Accuracy',range_acc:'Range Accuracy',mage_acc:'Mage Accuracy',defence:'Defence',gather_speed:'Gathering Speed',prod_speed:'Production Speed',walk_speed:'Walk Speed'};
      return`+${Math.round(v*100)}% ${labels[k]||k}`;
    }).join(', ');
    // Use actual potion image if available, fallback to emoji
    const hasImg=typeof ITEM_IMGS!=='undefined'&&ITEM_IMGS[pid];
    const imgF=window.ITEM_FILTERS&&ITEM_FILTERS[pid]?'filter:'+ITEM_FILTERS[pid]:'';
    const iconHtml=hasImg?`<img src="${ITEM_IMGS[pid]}" style="width:18px;height:18px;object-fit:contain;vertical-align:middle;${imgF}">`:d.icon;
    return`<div class="buff-pill" style="border-color:${d.color}55;background:${d.color}18"><span class="buff-icon">${iconHtml}</span><span class="buff-time" style="color:${d.color}">${timeStr}</span><div class="buff-tooltip"><div class="buff-tt-arrow"></div><div class="buff-tt-name" style="color:${d.color}">${d.label}</div><div class="buff-tt-desc">${buffList}</div><div class="buff-tt-time">${fullMins}m ${fullSecs}s remaining</div></div></div>`;
  }).join('');
}

function getAutoTools(){
  // Calculate which characters have tools based on profession and availability
  const toolUse={};// {toolId: count in use}

  // First pass: count demand per tool
  const demand={};
  dots.forEach((d,i)=>{
    const tid=PROF_TOOL[d.profession];
    if(tid){
      demand[tid]=(demand[tid]||0)+1;
      charTools[i]=tid;
    } else {
      charTools[i]=null;
    }
  });
  // Second pass: assign tools up to available stock
  const assigned={};// {toolId: count assigned}
  const result={};// {charIndex: toolId or null}
  dots.forEach((d,i)=>{
    const tid=charTools[i];
    if(tid){
      const available=(storage[tid]||0);
      const used=assigned[tid]||0;
      if(used<available){
        assigned[tid]=used+1;
        result[i]=tid;
      } else {
        result[i]=null;
      }
    } else {
      result[i]=null;
    }
  });
  return result;
}

      if(owned){
        h+=`<div class="th-tool-stats"><div class="th-tool-stats-main" style="color:rgba(127,174,93,0.7)">${stateLabel}</div><div class="th-tool-stats-sub">${workers} worker${workers!==1?'s':''} in zone</div></div>`;
      } else {
        h+=`<div class="th-tool-stats"><div class="th-tool-stats-main" style="color:rgba(201,156,74,0.35)">Not found</div><div class="th-tool-stats-sub">Rare drop from ${SKILLS.find(s=>s.id===pd.skill)?.label||pd.skill}</div></div>`;

      h+=`</article>`;

    h+=`</div>`;
  }// end pets view
  else{
  // Upgrades view
  const activeTHBuffs=TH_UPGRADES.filter(u=>thUpgrades[u.id]);

  catOrder.forEach(catName=>{

    const purchased=upgrades.filter(u=>thUpgrades[u.id]).length;

window.toggleTHTab=(cat)=>{thTabOpen[cat]=!thTabOpen[cat];openTownHall();};
window.closeTownHall=()=>{document.getElementById('th-overlay').classList.remove('open');};
window.toggleToolDetail=(tid)=>{thToolExpanded=thToolExpanded===tid?null:tid;openTownHall();};

window.upgradeTool=(tid)=>{
  if((storage.toolkit||0)<=0)return;
  if(window._toolUpgrades&&window._toolUpgrades[tid])return;
  storage.toolkit--;
  if(!window._toolUpgrades)window._toolUpgrades={};
  window._toolUpgrades[tid]=true;
  const td=TOOL_DEFS[tid];
  addLog('🧰 '+td.name+' upgraded to +10% speed!','🧰','levelup');
  bankDirty=true;uiDirty=true;
  openTownHall();
};
window.buyTHUpgrade=(uid)=>{
  const u=TH_UPGRADES.find(x=>x.id===uid);if(!u)return;
  const canAfford=Object.entries(u.cost).every(([k,v])=>(storage[k]||0)>=v);
  if(!canAfford)return;
  Object.entries(u.cost).forEach(([k,v])=>{storage[k]-=v;});
  thUpgrades[u.id]=true;
  bankDirty=true;
  addLog(`Town Hall upgraded: ${u.name}`,'🏛️','levelup');
  openTownHall(); // refresh modal
};
window.setCombatStyle=(id,style)=>{const d=dots.find(dd=>dd.id===id);if(d){d.combatStyle=style;buildPanel();}};



window.equipItem=(dotId,itemId,qty)=>{
  const d=dots.find(dd=>dd.id===dotId);if(!d)return;
  const gs=GEAR_STATS[itemId];if(!gs)return;
  const available=storage[itemId]||0;
  if(available<=0)return;
  // Check level requirements
  if(gs.req){
    for(const[skill,lvl]of Object.entries(gs.req)){
      if((d.skills[skill]||1)<lvl){
        const sk=SKILLS.find(s=>s.id===skill);
        addFloat(d.x,d.y-20,`Need ${sk?.label||skill} Lv ${lvl}!`,'#cc4444',2);
        return;
      }
    }
  }
  // For ammo slot — show quantity menu if no qty specified
  if(gs.slot==='ammo'&&!qty){
    showAmmoMenu(dotId,itemId,available,event);
    return;
  }
  const slot=gs.slot;
  const equipQty=qty||1;
  // For non-ammo: swap 1 item
  if(slot!=='ammo'){
    if(d.eq[slot]){storage[d.eq[slot]]=(storage[d.eq[slot]]||0)+1;bankDirty=true;}
    d.eq[slot]=itemId;
    storage[itemId]--;
  } else {
    // For ammo: unequip old ammo type, equip qty of new
    if(d.eq[slot]&&d.eq[slot]!==itemId){
      // Return old ammo — stored as eq.ammo_qty
      storage[d.eq[slot]]=(storage[d.eq[slot]]||0)+(d.ammoQty||0);
      d.ammoQty=0;
    }
    const toEquip=Math.min(equipQty,available);
    if(d.eq[slot]===itemId){d.ammoQty=(d.ammoQty||0)+toEquip;}
    else{d.eq[slot]=itemId;d.ammoQty=toEquip;}
    storage[itemId]-=toEquip;
  }
  bankDirty=true;uiDirty=true;activeTab='equipment';
  closeAmmoMenu();buildPanel();buildResPanel();
  if(typeof buildBankModal==='function'&&document.getElementById('bank-modal-overlay')?.classList.contains('open'))buildBankModal();
  // Auto-resume combat if hero has weapon now and is in combat profession but idle/waiting
  if(slot==='weapon'){
    const combatProfs=['combat','ranged_combat','magic_combat'];
    if(combatProfs.includes(d.profession)&&(d.state==='idle'||d.state==='waiting')){
      assign(d,d.profession,d.activity?d.activity.id:null);
    }
  }
};

let lastT=0,uiT=0,logT=0;
function loop(now){
  if(!lastT)lastT=now;
  const realDelta=(now-lastT)/1000; // raw delta in seconds, NOT capped
  // If real delta is large (tab was backgrounded or throttled), accumulate rested XP
  if(realDelta>5)tickRestedXp(realDelta);
  const rawDt=Math.min(realDelta,.1);
  lastT=now;
  const dt=rawDt*gameSpeed;
  try{updateDots(dt);updateFloats(dt);updateBuffs(dt);/* updatePets(dt); — disabled (pet tab removed) */updateProjectiles(dt);updateRaid(dt);updateExpedition(rawDt);}catch(e){console.error('Game error:',e);}
  uiT+=rawDt;logT+=rawDt;
  const selFocused=document.activeElement&&(document.activeElement.tagName==='INPUT')||(skillDropOpen);
  if(uiT>.5&&!selFocused){uiT=0;buildUI();buildBuffBar();renderRaidHUD();updateExpedCountdown();const bf=document.getElementById('boss-forfeit');if(bf)bf.classList.toggle('active',!!window._bossActive&&!_raidActive);}
  if(logT>2){logT=0;if(logDirty){logDirty=false;renderLog();}if(_nlogTab==='clues')renderCluePanel();}
  draw();
  requestAnimationFrame(loop);
}

function startMenuPan(){
  const cv=document.getElementById('mm-canvas');if(!cv)return;
  const cx=cv.getContext('2d');
  const img=_mapBgImg;
  let panT=0;
  function panLoop(){
    if(!document.getElementById('main-menu')||document.getElementById('main-menu').style.display==='none'){_mmAnimId=null;return;}
    const W=window.innerWidth,H=window.innerHeight;
    cv.width=W;cv.height=H;
    panT+=0.00006; // very slow
    const t=(panT%1);
    const pingPong=t<0.5?t*2:(1-t)*2;
    const panX=200+pingPong*2400;
    const panY=850+Math.sin(pingPong*Math.PI)*-80;
    const zoom=Math.max(W/MW,H/MH)*2.5;
    const srcW=W/zoom,srcH=H/zoom;
    const srcX=Math.max(0,Math.min(MW-srcW,panX-srcW/2));
    const srcY=Math.max(0,Math.min(MH-srcH,panY-srcH/2));
    if(img.complete&&img.naturalWidth>0){
      cx.drawImage(img,srcX,srcY,srcW,srcH,0,0,W,H);
    } else {
      cx.fillStyle='#0a0812';cx.fillRect(0,0,W,H);
    }
    _mmAnimId=requestAnimationFrame(panLoop);
  }
  if(_mmAnimId)cancelAnimationFrame(_mmAnimId);
  panLoop();
}

function getBallSVG(col,c2,dsg,size){

  const r=size/2-2;const cx=size/2;const cy=size/2;
  let inner='';
  if(dsg===0)inner=`<rect x="${cx-r}" y="${cy-r}" width="${r*2}" height="${r}" fill="${c2}"/>`;
  else if(dsg===1)inner=`<rect x="${cx-r}" y="${cy-r*0.25}" width="${r*2}" height="${r*0.5}" fill="${c2}"/>`;
  else if(dsg===2)inner=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${c2}"/><circle cx="${cx}" cy="${cy}" r="${r*0.6}" fill="${col}"/>`;
  else if(dsg===3)inner=`<polygon points="${cx},${cy-r*0.7} ${cx+r*0.5},${cy} ${cx},${cy+r*0.7} ${cx-r*0.5},${cy}" fill="${c2}"/>`;

  else if(dsg===5)inner=`<rect x="${cx-r*0.15}" y="${cy-r}" width="${r*0.3}" height="${r*2}" fill="${c2}"/><rect x="${cx-r}" y="${cy-r*0.15}" width="${r*2}" height="${r*0.3}" fill="${c2}"/>`;
  else if(dsg===6)inner=`<path d="M${cx},${cy-r} A${r*0.5},${r*0.5} 0 0,1 ${cx+r},${cy} A${r*0.5},${r*0.5} 0 0,1 ${cx},${cy+r} A${r*0.5},${r*0.5} 0 0,0 ${cx-r},${cy} A${r*0.5},${r*0.5} 0 0,0 ${cx},${cy-r}Z" fill="${c2}"/>`;
  else if(dsg===7)inner=`<rect x="${cx}" y="${cy-r}" width="${r}" height="${r*2}" fill="${c2}"/>`;
  else if(dsg===8)inner=`<polygon points="${cx},${cy-r*0.8} ${cx+r*0.25},${cy-r*0.4} ${cx+r*0.7},${cy-r*0.4} ${cx+r*0.35},${cy-r*0.05} ${cx+r*0.5},${cy+r*0.4} ${cx},${cy+r*0.15} ${cx-r*0.5},${cy+r*0.4} ${cx-r*0.35},${cy-r*0.05} ${cx-r*0.7},${cy-r*0.4} ${cx-r*0.25},${cy-r*0.4}" fill="${c2}"/>`;  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg"><defs><clipPath id="${uid}"><circle cx="${cx}" cy="${cy}" r="${r}"/></clipPath></defs><circle cx="${cx}" cy="${cy}" r="${r+1}" fill="#0a0a0f"/><circle cx="${cx}" cy="${cy}" r="${r}" fill="${col}"/><g clip-path="url(#${uid})">${inner}</g><circle cx="${cx-r*0.25}" cy="${cy-r*0.25}" r="${r*0.25}" fill="rgba(255,255,255,0.2)"/></svg>`;
}

  h+=`<div style="margin-bottom:10px"><div onclick="randomizeNames()" style="display:inline-block;padding:6px 16px;font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:rgba(200,180,150,0.7);background:rgba(194,158,62,0.08);border:1px solid rgba(194,158,62,0.15);border-radius:6px;cursor:pointer;letter-spacing:0.5px;transition:all .15s">🎲 Randomize Names</div></div>`;
  for(let i=0;i<heroesUnlocked;i++){
    const c=COLORS[i];
    h+=`<div>`;
    h+=`<div class="settings-char">`;
    h+=`<div class="settings-char-dot" style="background:${c}" onclick="toggleSettingsColor(${i})"></div>`;
    h+=`<input class="settings-char-input" id="settings-name-${i}" value="${NAMES[i]}" maxlength="12" onchange="updateCharName(${i},this.value)">`;
    h+=`</div>`;
    h+=`<div class="settings-colors${_settingsColorPicker===i?' open':''}" id="settings-colors-${i}">`;
    const taken=COLORS.filter((_,j)=>j!==i);
    COLOR_PALETTE.forEach(pc=>{
      const isTaken=taken.includes(pc);
      const isSelected=COLORS[i]===pc;
      const onclick=isTaken?'':('settingsPickColor('+i+',\''+pc+'\')');
      h+=`<div class="settings-color-opt${isSelected?' selected':''}${isTaken?' taken':''}" style="background:${pc}" onclick="${onclick}"></div>`;
    });
    h+=`</div></div>`;
  }
  
  h+=`<div class="settings-back" onclick="_escPanel='main';renderEscMenu()">← Back</div>`;
  h+=`</div>`;
  el.innerHTML=h;
}

      <p>Relics are permanent passive buffs. Every successful expedition has a chance to grant one, weighted by score.</p>

// Wipe all in-memory progress and bounce back to the main menu so the player can start fresh.
function resetGameProgress(){
  // Wipe storage / bank
  for(const k in storage){delete storage[k];}
  // Reset heroes by recreating them via makeDot() so they get whatever the current
  // base-game settings are (handles future changes to starter stats automatically)
  for(let i=0;i<dots.length;i++){
    dots[i]=makeDot(i);
  }
  // Cap hero count back to starter — any extra unlocked heroes get removed
  while(dots.length>STARTER_HEROES){dots.pop();}
  heroesUnlocked=STARTER_HEROES;
  // Reset quests to initial state
  QUESTS.forEach(q=>{
    q.complete=false;
    q.unlocked=(q.id==='q_first_catch');
    q.steps.forEach(s=>{s.progress=0;});
  });
  _expandedQuest=null;
  if(window._questChapterOpen)window._questChapterOpen={};
  // Reset other game-state objects
  if(window._collectionLog)window._collectionLog={mobs:{}};
  if(window._activeClues)window._activeClues=[];
  if(window._completedClues)window._completedClues={easy:0,medium:0,hard:0};
  if(window._bossKills)window._bossKills={};
  if(window._bossCores)window._bossCores={};
  if(window._expedScoreHistory)window._expedScoreHistory=[];
  if(window._expedFoundRelic)window._expedFoundRelic=null;
  window._expedScore=0;window._expedHighScore=0;
  window._expedRelics={};
  if(window._thBuffs)window._thBuffs={};
  if(window._toolUpgrades)window._toolUpgrades={};
  if(typeof thUpgrades!=='undefined'){for(const k in thUpgrades)delete thUpgrades[k];}
  ownedPets={};
  // Re-roll names back to defaults
  const _defaultNames=['Zara','Kael','Mira','Thane','Lyra'];
  for(let i=0;i<NAMES.length;i++){NAMES[i]=_defaultNames[i]||('Hero '+(i+1));}
  GROUP_NAME='Ironborn';
  bankDirty=true;
  addLog('🗑️ Team deleted — start fresh!','🗑️','info');
  // Bounce to main menu, where the player can re-create their guild
  returnToMainMenu();
}

let _colLogTab='combat'; // 'combat' | 'bosses' | 'raid'
function renderCollectionLog(el){
  if(!window._collectionLog)window._collectionLog={mobs:{}};
  const log=window._collectionLog;
  // Build categorized mob universe from current data
  const allMobs={combat:[],bosses:[],raid:[]};
  // Combat tier mobs (from melee tiers — same as ranged/magic since unified)
  if(typeof ACTIVITIES!=='undefined'&&ACTIVITIES.melee){
    ACTIVITIES.melee.forEach(tier=>{
      if(!tier.mobs)return;
      tier.mobs.forEach(m=>{
        const isBoss=m.boss||m.label.startsWith('🔑');
        const cleanLabel=m.label.replace('🔑 ','');
        const entry={label:cleanLabel,mob:m,tier:tier.label||'',isBoss};
        if(isBoss)allMobs.bosses.push(entry);
        else allMobs.combat.push(entry);
      });
    });
  }
  // Core bosses (3 endgame bosses unlocked via 9 cores)
  if(window.CORE_BOSSES){
    Object.values(window.CORE_BOSSES).forEach(b=>{
      const cleanLabel=b.label.replace('🔑 ','');
      allMobs.bosses.push({label:cleanLabel,mob:b,tier:'Core',isBoss:true});
    });
  } else {
    // CORE_BOSSES not yet built (player hasn't fought one) — show placeholders
    allMobs.bosses.push({label:'Ironclad Colossus',mob:{label:'Ironclad Colossus',hp:25000,weak:'magic',loot:[]},tier:'Core',isBoss:true});
    allMobs.bosses.push({label:'Shadowstrike Hydra',mob:{label:'Shadowstrike Hydra',hp:25000,weak:'melee',loot:[]},tier:'Core',isBoss:true});
    allMobs.bosses.push({label:'Archmage Eternal',mob:{label:'Archmage Eternal',hp:25000,weak:'ranged',loot:[]},tier:'Core',isBoss:true});
  }
  // Raid bosses
  if(typeof RAID_BOSSES!=='undefined'){
    RAID_BOSSES.forEach(b=>allMobs.raid.push({label:b.label,mob:b,tier:'Final',isBoss:true}));
  }
  if(typeof RAID_STAGE1_POOL!=='undefined'){
    RAID_STAGE1_POOL.forEach(b=>allMobs.raid.push({label:b.label+' (Raid)',mob:b,tier:'Stage 1',isBoss:true,raidVariant:true}));
  }
  if(typeof RAID_STAGE2_POOL!=='undefined'){
    RAID_STAGE2_POOL.forEach(b=>allMobs.raid.push({label:b.label+' (Raid)',mob:b,tier:'Stage 2',isBoss:true,raidVariant:true}));
  }
  
  // Compute completion stats for header
  const stat=(arr)=>{
    let killed=0,total=arr.length;
    arr.forEach(e=>{
      const lookupName=e.raidVariant?e.label:e.label;
      if(log.mobs[lookupName]&&log.mobs[lookupName].kills>0)killed++;
    });
    return {killed,total};
  };
  const sCombat=stat(allMobs.combat);
  const sBosses=stat(allMobs.bosses);
  const sRaid=stat(allMobs.raid);
  
  let h=`<div class="collog-box">`;
  h+=`<div class="collog-hdr"><div class="collog-title">📖 COLLECTION LOG</div><div class="collog-close" onclick="_escPanel='main';renderEscMenu()">✕</div></div>`;
  h+=`<div class="collog-tabs">`;
  h+=`<div class="collog-tab${_colLogTab==='combat'?' active':''}" onclick="_colLogTab='combat';renderEscMenu()">Combat Mobs <span class="collog-tab-cnt">${sCombat.killed}/${sCombat.total}</span></div>`;
  h+=`<div class="collog-tab${_colLogTab==='bosses'?' active':''}" onclick="_colLogTab='bosses';renderEscMenu()">Key Bosses <span class="collog-tab-cnt">${sBosses.killed}/${sBosses.total}</span></div>`;
  h+=`<div class="collog-tab${_colLogTab==='raid'?' active':''}" onclick="_colLogTab='raid';renderEscMenu()">Raid Bosses <span class="collog-tab-cnt">${sRaid.killed}/${sRaid.total}</span></div>`;
  h+=`</div>`;
  
  const arr=allMobs[_colLogTab]||[];
  h+=`<div class="collog-list">`;
  arr.forEach(e=>{
    const rec=log.mobs[e.label];
    const kills=rec?rec.kills:0;
    const seen=kills>0;
    const drops=rec?rec.drops:{};
    const expectedDrops=e.mob.loot?e.mob.loot.filter(l=>l.id!=='coins'):[];
    const obtainedCnt=expectedDrops.filter(l=>drops[l.id]).length;
    const totalDrops=expectedDrops.length;
    const completion=totalDrops>0?Math.floor((obtainedCnt/totalDrops)*100):(seen?100:0);
    
    h+=`<div class="collog-row${seen?'':' unseen'}">`;
    h+=`<div class="collog-row-hdr">`;
    h+=`<div class="collog-row-name">${e.label}${e.tier?` <span class="collog-row-tier">${e.tier}</span>`:''}</div>`;
    h+=`<div class="collog-row-stats">`;
    if(seen){
      h+=`<span class="collog-stat">${kills} ${kills===1?'kill':'kills'}</span>`;
      if(totalDrops>0)h+=`<span class="collog-stat">${obtainedCnt}/${totalDrops} drops</span>`;
    } else {
      h+=`<span class="collog-stat collog-unseen">Not yet encountered</span>`;
    }
    h+=`</div>`;
    h+=`</div>`;
    
    if(seen&&expectedDrops.length>0){
      h+=`<div class="collog-drops">`;
      expectedDrops.forEach(l=>{
        const got=drops[l.id]||0;
        const it=typeof ITEMS!=='undefined'?ITEMS[l.id]:null;
        const hasImg=typeof ITEM_IMGS!=='undefined'&&ITEM_IMGS[l.id];
        const imgF=window.ITEM_FILTERS&&ITEM_FILTERS[l.id]?'filter:'+ITEM_FILTERS[l.id]:'';
        const iconHtml=hasImg?`<img src="${ITEM_IMGS[l.id]}" style="width:24px;height:24px;object-fit:contain;${imgF}${got?'':';opacity:0.18;filter:grayscale(1) '+(ITEM_FILTERS&&ITEM_FILTERS[l.id]?ITEM_FILTERS[l.id]:'')}">`:(it?.icon||'?');
        h+=`<div class="collog-drop${got?' got':''}" title="${it?.label||l.id}${got?` — ${got} obtained`:' — not yet obtained'}">`;
        h+=`<div class="collog-drop-icon">${iconHtml}</div>`;
        if(got)h+=`<div class="collog-drop-qty">${got>=1000?Math.floor(got/1000)+'k':got}</div>`;
        h+=`</div>`;
      });
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  h+=`</div>`;
  h+=`<div class="collog-footer"><div class="esc-btn" onclick="_escPanel='main';renderEscMenu()" style="margin-top:0"><span class="esc-ico">←</span>Back</div></div>`;
  h+=`</div>`;
  el.innerHTML=h;
}

// Get best plunder tier for a given level
function getRaidPlunderTier(lvl){
  let best=RAID_PLUNDER_TABLE[0];
  for(const t of RAID_PLUNDER_TABLE){if(lvl>=t.lvl)best=t;else break;}
  return best;
}
// Roll a raid plunder drop
function rollRaidPlunder(d){
  const tier=getRaidPlunderTier(d.skills.plundering||d.skills.thieving||1);
  // Build weighted pool: weapons + ammo + bars + secondaries
  const pool=[];
  tier.weapons.forEach(w=>pool.push({type:'item',id:w.id,qty:1,w:w.w}));
  tier.ammo.forEach(a=>pool.push({type:'item',id:a.id,qty:a.qty,w:a.w}));
  tier.bars.forEach(b=>pool.push({type:'item',id:b.id,qty:b.qty,w:b.w}));
  if(tier.secondaries)tier.secondaries.forEach(s=>pool.push({type:'item',id:s.id,qty:s.qty,w:s.w}));
  const totalW=pool.reduce((s,p)=>s+p.w,0);
  let roll=Math.random()*totalW;
  for(const p of pool){
    roll-=p.w;
    if(roll<=0){
      const qty=Array.isArray(p.qty)?Math.floor(Math.random()*(p.qty[1]-p.qty[0]+1))+p.qty[0]:p.qty;
      return{id:p.id,qty};
    }
  }
  return{id:'coins',qty:10};
}

// Agility trap check — called when hero walks through an 'agile' tagged node during raid
function raidAgilityCheck(d){
  if(!_raidActive)return;
  const agiLvl=d.skills.agility||1;
  const passChance=Math.min(1.0, agiLvl/100);
  if(Math.random()<passChance){
    addFloat(d.x,d.y-20,'Passed!','#44cc66',1.5);
  } else {
    // Doubled damage: below 20=100%, below 50=100%, 60=40%, 70=30%, 80=20%, 90=10%, 99=0%
    let dmgPct;
    if(agiLvl<50) dmgPct=1.0;
    else dmgPct=Math.max(0, (0.25 - Math.max(0, agiLvl - 50) * 0.005) * 2);
    const dmg=Math.max(1,Math.floor(d.maxHp*dmgPct));
    d.curHp=Math.max(1,d.curHp-dmg);
    addFloat(d.x,d.y-8,''+dmg,'#cc3333',1.8); // hitsplat like combat
    addFloat(d.x,d.y-24,'Failed!','#cc4444',1.5);
    addLog(d.name+' failed an agility trap! (-'+dmg+' HP)','\u26a0\ufe0f','info');
    // Auto-eat from bank after trap
    const eatThreshold=d.eatPct||40;
    const hpPct=(d.curHp/d.maxHp)*100;
    if(hpPct<=eatThreshold){
      const foodTypes=['cooked_giant_meat','shark','swordfish','lobster','salmon','trout','herring','sardine','shrimp','cooked_berries'];
      for(const fid of foodTypes){
        if((storage[fid]||0)>0){
          const heal=FOOD_HEAL[fid]||0;
          storage[fid]--;bankDirty=true;
          d.curHp=Math.min(d.maxHp,d.curHp+heal);
          addFloat(d.x,d.y-35,'+'+heal+' HP','#44cc44',1.5);
          break;
        }
      }
    }
  }
}

// Smart raid auto-pick: chooses best activity for the skill
function raidAutoPick(skillKey,playerLvl,acts){
  // Gathering skills: pick highest tier the hero can do
  if(skillKey==='fishing'){
    const available=acts.filter(a=>!a.tier&&playerLvl>=a.lvl);
    return available.length?available[available.length-1]:acts[0]||null;
  }
  if(skillKey==='foraging'){
    const available=acts.filter(a=>!a.tier&&playerLvl>=a.lvl&&(!a.raidOnly||_raidActive));
    if(_raidActive){
      // Raid foraging: pick highest tier hide OR cloth based on what's most needed
      const hides=available.filter(a=>{const p=a.produces;return p&&(p.includes('hide')||p.includes('skin')||p==='dragonhide');});
      const cloths=available.filter(a=>{const p=a.produces;return p&&p.includes('cloth');});
      const bestHide=hides.length?hides[hides.length-1]:null;
      const bestCloth=cloths.length?cloths[cloths.length-1]:null;
      if(bestHide&&bestCloth){
        // Pick whichever type has less in bank
        const hideQty=storage[bestHide.produces]||0;
        const clothQty=storage[bestCloth.produces]||0;
        return hideQty<=clothQty?bestHide:bestCloth;
      }
      return bestHide||bestCloth||available[available.length-1]||acts[0]||null;
    }
    return available.length?available[available.length-1]:acts[0]||null;
  }
  // Plundering: pick highest tier
  if(skillKey==='plundering'){
    const available=acts.filter(a=>playerLvl>=a.lvl);
    return available.length?available[available.length-1]:acts[0]||null;
  }
  // Cooking: find highest tier raw fish in raid bank and cook it
  if(skillKey==='cooking'){
    const cookable=acts.filter(a=>a.recipe&&playerLvl>=a.lvl).reverse();
    for(const a of cookable){
      const ingKey=Object.keys(a.recipe)[0];
      if((storage[ingKey]||0)>0)return a;
    }
    return cookable.length?{...cookable[0],_waiting:true}:acts[0]||null;
  }
  // Herblore: find best potion we can make
  if(skillKey==='herblore'){
    // During raid: only dust recipes, pick randomly among available
    if(_raidActive){
      const dustRecipes=acts.filter(a=>a.recipe&&playerLvl>=a.lvl&&(a.recipe.raid_dust||a.recipe.raid_super_dust));
      // Prefer super dust recipes if super dust available
      const superAvail=dustRecipes.filter(a=>a.recipe.raid_super_dust&&(storage.raid_super_dust||0)>0);
      const dustAvail=dustRecipes.filter(a=>a.recipe.raid_dust&&(storage.raid_dust||0)>0);
      if(superAvail.length){return superAvail[Math.floor(Math.random()*superAvail.length)];}
      if(dustAvail.length){return dustAvail[Math.floor(Math.random()*dustAvail.length)];}
      return dustRecipes.length?{...dustRecipes[0],_waiting:true}:acts[0]||null;
    }
    const brewable=acts.filter(a=>a.recipe&&playerLvl>=a.lvl&&!a.raidOnly).reverse();
    for(const a of brewable){
      let canMake=true;
      for(const[k,v] of Object.entries(a.recipe)){
        if((storage[k]||0)<v){canMake=false;break;}
      }
      if(canMake)return a;
    }
    return brewable.length?{...brewable[0],_waiting:true}:acts[0]||null;
  }
  // Production skills (smithing/fletching/runecraft): craft best gear
  // Priority: Weapons first, then Chest, Helm, Legs, Gloves
  if(['smithing','fletching','runecraft'].includes(skillKey)){
    const groupPriority=['Weapons','Chest','Helms','Legs','Gloves'];
    for(const group of groupPriority){
      const groupActs=acts.filter(a=>a.group===group&&a.recipe&&playerLvl>=a.lvl).reverse();
      for(const a of groupActs){
        let canMake=true;
        for(const[k,v] of Object.entries(a.recipe)){
          if((storage[k]||0)<v){canMake=false;break;}
        }
        if(canMake)return a;
      }
    }
    // Also check Bars group for smithing, Ammo for fletching/runecraft
    const extraGroups=skillKey==='smithing'?['Bars']:['Ammo'];
    for(const group of extraGroups){
      const groupActs=acts.filter(a=>a.group===group&&a.recipe&&playerLvl>=a.lvl).reverse();
      for(const a of groupActs){
        let canMake=true;
        for(const[k,v] of Object.entries(a.recipe)){
          if((storage[k]||0)<v){canMake=false;break;}
        }
        if(canMake)return a;
      }
    }
    // Nothing craftable — show highest possible as waiting
    const best=acts.filter(a=>!a.tier&&playerLvl>=a.lvl&&a.recipe&&a.group==='Weapons').reverse();
    if(best.length)return{...best[0],_waiting:true};
    const any=acts.filter(a=>!a.tier&&playerLvl>=a.lvl&&a.recipe).reverse();
    return any.length?{...any[0],_waiting:true}:acts[0]||null;
  }
  // Fallback
  const available=acts.filter(a=>!a.tier&&playerLvl>=a.lvl);
  return available.length?available[available.length-1]:acts[0]||null;
}

// Roll a raid forage drop: 45% hide, 45% cloth, 10% dust
function rollRaidForage(d){
  const forageLvl=d.skills.foraging||1;
  const tier=getRaidForageTier(forageLvl);
  const roll=Math.random()*100;
  let item;
  if(roll<45){
    // Hide
    item=tier.hides[Math.floor(Math.random()*tier.hides.length)];
  } else if(roll<90){
    // Cloth
    item=tier.cloths[Math.floor(Math.random()*tier.cloths.length)];
  } else {
    // Dust (10%) - only if lvl 75+
    if(forageLvl>=75){
      let dustQty=1;
      if(forageLvl>=95) dustQty=1+Math.floor(Math.random()*3);
      else if(forageLvl>=85) dustQty=1+Math.floor(Math.random()*2);
      storage.raid_dust=(storage.raid_dust||0)+dustQty;bankDirty=true;
      // Super Dust proc
      let superChance=0;
      if(forageLvl>=99) superChance=0.10;
      else if(forageLvl>=95) superChance=0.05;
      else if(forageLvl>=90) superChance=0.02;
      else if(forageLvl>=80) superChance=0.01;
      if(superChance>0){
        let superCount=0;
        for(let di=0;di<dustQty;di++){if(Math.random()<superChance)superCount++;}
        if(superCount>0){
          storage.raid_super_dust=(storage.raid_super_dust||0)+superCount;bankDirty=true;
          addFloat(d.x+(Math.random()-.5)*15,d.y-42,'+'+superCount+' 💫 Super!','#ffcc00',2.5);
        }
      }
      return{id:'raid_dust',qty:dustQty,isDust:true};
    }
    // Below 75: fall back to hide
    item=tier.hides[Math.floor(Math.random()*tier.hides.length)];
  }
  return{id:item,qty:1};
}

// Roll a raid fish drop from available tier
function rollRaidFish(d){
  const fishLvl=d.skills.fishing||1;
  const tier=getRaidFishTier(fishLvl);
  const fish=tier.fish[Math.floor(Math.random()*tier.fish.length)];
  return{id:fish,qty:1};
}

// ═══ SCORING SYSTEM ═══
// Base: skill_level × role_weight
// +5 pts per tool owned matching that role (stacks with duplicates and duplicate role slots)
// +3/5/8/12 pts per zone tier (2/3/4/5) matching that role
// +8 pts per pet owned matching that role
// Combat Leader: 1.5× weight, uses max(melee, ranged, magic)

function calcSlotScore(roleId,dotIdx){
  const map=EXPD_ROLE_MAP[roleId];if(!map)return{pts:0,base:0,tool:0,zone:0,pet:0};
  const d=dotIdx!==null?dots[dotIdx]:null;if(!d)return{pts:0,base:0,tool:0,zone:0,pet:0};
  // Base: skill × weight
  let skillLvl=1;
  if(roleId==='combat_leader'){skillLvl=Math.max(d.skills.melee||1,d.skills.ranged||1,d.skills.magic||1);}
  else{skillLvl=d.skills[map.skills[0]]||1;}
  const base=Math.round(skillLvl*map.weight);
  // Tool bonus: +5 per tool owned (can stack)
  let toolPts=0;
  if(map.tool){const qty=storage[map.tool]||0;toolPts=Math.min(qty,3)*5;} // cap at 3 tools = +15
  // Zone tier bonus
  let zonePts=0;
  if(map.zone&&typeof getRoomTier==='function'){
    const tier=getRoomTier(map.zone);
    if(tier>=2)zonePts=[0,0,3,5,8,12][tier]||0;
  }
  // Pet bonus
  let petPts=0;
  if(map.pet&&ownedPets[map.pet])petPts=8;
  const total=base+toolPts+zonePts+petPts;
  return{pts:total,base,tool:toolPts,zone:zonePts,pet:petPts,skillLvl};
}

function calcFullExpedScore(roles,slotDots){
  let total=0;const slotScores=[],breakdown=[];
  roles.forEach((roleId,i)=>{
    const sc=calcSlotScore(roleId,slotDots[i]);
    slotScores.push(sc.pts);breakdown.push(sc);total+=sc.pts;
  });
  return{total,slotScores,breakdown};
}

function getExpedRewards(roleId,dotIdx){
  const role=EXPD_REWARDS[roleId];if(!role)return[];const d=dots[dotIdx];if(!d)return[];const rewards=[];
  const tierBoost=getRelicTierBoost(); // Crystal Orb: roll tier 1 higher
  role.forEach(r=>{const sl=(d.skills[r.skill]||1)+tierBoost;const el=r.tiers.filter(t=>t.lvl<=sl);if(!el.length)return;
    el.slice(-3).forEach((tier,ti)=>{const w=ti===el.slice(-3).length-1?0.6:ti===el.slice(-3).length-2?0.3:0.1;
      tier.items.forEach(id=>{if(Math.random()<w+0.2){const q=Math.floor(Math.random()*(tier.qty[1]-tier.qty[0]+1))+tier.qty[0];rewards.push({id,qty:Math.max(1,q)});}});});});
  if(roleId==='combat_leader'){const cl=Math.max(d.skills.melee||1,d.skills.ranged||1,d.skills.magic||1);
    const gt=EXPD_FOUND_GEAR.filter(g=>g.lvl<=cl+20);
    const gearChance=0.3*getRelicGearChance(); // Treasure Map doubles to 60%
    if(gt.length>0&&Math.random()<gearChance){const t=gt[Math.floor(Math.random()*gt.length)];const p=t.items[Math.floor(Math.random()*t.items.length)];if(p)rewards.push({id:p,qty:1});}}
  return rewards;
}

// ── Game loop ──
function updateExpedition(dt){
  if(_expedState==='waiting'){
    const s=getSecsUntilNextExpedition();
    // Notification at 10 minutes
    if(s<=600&&!window._expedNotif10){
      window._expedNotif10=true;
      addLog('🗺️ Expedition departs in 10 minutes! Set up your party!','🗺️','levelup');
    }
    // Notification at 1 minute
    if(s<=60&&!window._expedNotif1){
      window._expedNotif1=true;
      addLog('⏰ Expedition departs in 1 MINUTE!','⏰','levelup');
    }
    // Reset notification flags when timer resets
    if(s>600){window._expedNotif10=false;window._expedNotif1=false;}
    if(s<=0){
      // Require all available heroes assigned (pre-unlock you may have <5 heroes)
      const slotsNeeded=Math.min(5,dots.length);
      const filled=_expedSlots.filter(s=>s!==null&&s>=0).length;
      const allAssigned=filled>=slotsNeeded;
      if(allAssigned){
        departExpedition();
        if(document.getElementById('explore-overlay').classList.contains('open'))showExpedProgress();
      } else {
        // Missed it — lock out until next expedition
        _expedState='missed';
        window._expedStartTime=Date.now(); // reset timer for next one
        if(document.getElementById('explore-overlay').classList.contains('open'))showExpedMissed();
      }
    }
    return;
  }
  if(_expedState==='missed'){
    // Wait until new timer resets (60s for testing)
    const s=getSecsUntilNextExpedition();
    if(s>5){_expedState='waiting';_expedSlots=[null,null,null,null,null];window._expedLocked=[false,false,false,false,false];}
    return;
  }
  if(_expedState==='departed'){_expedTimer-=dt;renderExpedHUD();if(_expedTimer<=0){_expedState='results_ready';returnExpedition();}return;}
}

function departExpedition(){
  _expedState='departed';_expedTimer=_expedDepartDuration;_expedLoot=[];_expedResultsSeen=false;
  window._expedKC=(window._expedKC||0)+1;const today=getTodaysExpedition();
  // Roll luck — relic-aware: floor moves from -25 up to relic-modified value
  const luckFloor=getRelicLuckFloor();
  const luckRange=50-luckFloor; // range from luckFloor to +50
  const luckPct=Math.floor(Math.random()*(luckRange+1))+luckFloor;
  window._expedLuck=luckPct;
  _expedStory=generateExpedStory(today.slots,_expedSlots,today.location,luckPct);
  // Roll loot per slot — apply per-role relic loot multipliers
  today.slots.forEach((rid,i)=>{
    if(_expedSlots[i]===null)return;
    const roleMult=getRelicLootMult(rid);
    getExpedRewards(rid,_expedSlots[i]).forEach(r=>{
      _expedLoot.push({id:r.id,qty:Math.max(1,Math.round(r.qty*roleMult))});
    });
  });
  // Apply luck modifier to all loot quantities
  const luckMult=1+(luckPct/100);
  _expedLoot=_expedLoot.map(l=>({id:l.id,qty:Math.max(1,Math.round(l.qty*luckMult))}));
  // Rabbit's Foot etc — chance to double ALL loot
  const jackpot=getRelicJackpotChance();
  if(jackpot>0&&Math.random()<jackpot){
    _expedLoot=_expedLoot.map(l=>({id:l.id,qty:l.qty*2}));
    addLog('🍀 JACKPOT! Loot doubled!','🍀','levelup');
    window._expedJackpot=true;
  } else {window._expedJackpot=false;}
  // Score with relic bonuses (% mult + flat)
  const scoring=calcFullExpedScore(today.slots,_expedSlots);
  const baseScore=scoring.total;
  const {mult:scMult,flat:scFlat}=getRelicScoreMult();
  _expedScore=Math.max(1,Math.round(baseScore*scMult*(1+luckPct/100))+scFlat);
  _expedSlotScores=scoring.slotScores;_expedBreakdown=scoring.breakdown;
  if(_expedScore>window._expedHighScore)window._expedHighScore=_expedScore;
  recordExpedScore(_expedScore,GROUP_NAME);
  // Roll for a relic — high score boosts drop rates
  window._expedFoundRelic=rollExpedRelic(_expedScore);
  if(window._expedFoundRelic){window._expedRelics[window._expedFoundRelic.id]=true;}
  _expedSavedPositions=dots.map(d=>({profession:d.profession,activity:d.activity?JSON.parse(JSON.stringify(d.activity)):null,state:d.state}));
  const ez=zC(ZONES.exploration);
  dots.forEach(d=>{d.profession='exploration';d.activity=null;d.state='walk_to_explore';d.tx=ez.x+(Math.random()-.5)*30;d.ty=ez.y+(Math.random()-.5)*30;});
  addLog(`The party departs on the ${today.name}!`,'🧭','levelup');renderExpedHUD();
}

function returnExpedition(){
  const th=zC(ZONES.townhall);
  dots.forEach((d,i)=>{const saved=_expedSavedPositions[i];d.x=th.x+(Math.random()-.5)*40;d.y=th.y+(Math.random()-.5)*40;
    if(saved&&saved.profession&&saved.profession!=='exploration'&&saved.profession!=='townhall'&&ZONES[saved.profession]){
      d.profession=saved.profession;d.activity=saved.activity||null;sendToZone(d,saved.profession);
    } else {d.profession='townhall';d.activity=null;d.state='idle';d.tx=th.x+(Math.random()-.5)*20;d.ty=th.y+(Math.random()-.5)*20;}});
  _expedLoot.forEach(l=>{storage[l.id]=(storage[l.id]||0)+l.qty;});bankDirty=true;
  // Grant XP per hero based on their individual score contribution
  const xpMult=getRelicXpMult();
  dots.forEach((d,i)=>{
    const slotIdx=_expedSlots.indexOf(i);
    const pts=slotIdx>=0?(_expedSlotScores[slotIdx]||0):0;
    if(pts>0){
      const xpAmt=Math.floor((10+pts*2)*xpMult);
      grantXP(d,'expedition',xpAmt);
      addFloat(d.x,d.y-20,`+${xpAmt} Expedition XP`,'#d4b86a',2);
    }
  });
  // Reset timer for next expedition
  window._expedStartTime=Date.now();
  _expedSlots=[null,null,null,null,null];
  window._expedLocked=[false,false,false,false,false];
  // Quest tracking: completed an expedition
  checkQuestProgress('_exped_complete',1);
  addLog('The party has returned! Click Expedition Camp to collect.','🧭','levelup');renderExpedHUD();
}

function renderExpedHUD(){
  const hud=document.getElementById('explore-hud');
  if(_expedState==='departed'){hud.classList.add('active');const r=Math.max(0,Math.ceil(_expedTimer));
    hud.innerHTML=`<div class="explore-hud-title">EXPEDITION</div><div class="explore-hud-timer">${Math.floor(r/60)}:${String(r%60).padStart(2,'0')}</div><div class="explore-hud-status">Party is exploring...</div>`;
  } else if(_expedState==='results_ready'&&!_expedResultsSeen){hud.classList.add('active');
    hud.innerHTML=`<div class="explore-hud-title">EXPEDITION</div><div class="explore-hud-timer" style="color:#44cc66;font-size:16px;">COMPLETE</div><div class="explore-hud-status" style="cursor:pointer;" onclick="openExplorationModal()">Click to collect</div>`;
  } else {hud.classList.remove('active');hud.innerHTML='';}
}

// ── UI ──
function openExplorationModal(){
  document.getElementById('explore-overlay').classList.add('open');
  if(_expedState==='results_ready'&&!_expedResultsSeen){showExpedResults();}
  else if(_expedState==='departed'){showExpedProgress();}
  else if(_expedState==='missed'){showExpedMissed();}
  else{showExpedSetup();}
}
function closeExpedition(){if(_expedState==='departed')return;document.getElementById('explore-overlay').classList.remove('open');}

const RELIC_DROP_RATES={common:0.20,uncommon:0.05,rare:0.01,legendary:0.001};
// Score-based bonus to drop rates: 1.0x at score≤100, 4.0x at score≥1000.
// Linear in between: bonus = 1 + min(3, max(0,(score-100)/300))
function getRelicScoreBonus(score){return 1+Math.min(3,Math.max(0,(score-100)/300));}

function hasRelic(id){return !!window._expedRelics[id];}

// Relic effect aggregators — read all owned relics and combine
function getRelicLuckFloor(){
  // Most permissive (highest) floor wins. Default floor is -25 (no relic).
  let floor=-25;
  EXPED_RELICS.forEach(r=>{
    if(hasRelic(r.id)&&r.effect.luckFloor!==undefined){
      if(r.effect.luckFloor>floor)floor=r.effect.luckFloor;
    }
  });
  return floor;
}
function getRelicLootMult(roleId){
  // Sum of role-specific bonus + global bonuses
  let mult=1;
  EXPED_RELICS.forEach(r=>{
    if(!hasRelic(r.id))return;
    if(r.effect.lootBonus===roleId)mult+=r.effect.val;
    if(r.effect.lootBonusAll)mult+=r.effect.lootBonusAll;
  });
  return mult;
}
function getRelicScoreMult(){
  let mult=1,flat=0;
  EXPED_RELICS.forEach(r=>{
    if(!hasRelic(r.id))return;
    if(r.effect.scoreBonus)mult+=r.effect.scoreBonus;
    if(r.effect.flatScore)flat+=r.effect.flatScore;
  });
  return {mult,flat};
}

// Roll for a relic after expedition — called in departExpedition
function rollExpedRelic(score){
  const unowned=EXPED_RELICS.filter(r=>!hasRelic(r.id));
  if(unowned.length===0)return null;
  // Score-based bonus: high-scoring expeditions are more likely to find rarer relics
  const bonus=getRelicScoreBonus(score||100);
  // Roll each unowned relic by its (boosted) rarity drop rate
  for(const relic of unowned.sort(()=>Math.random()-0.5)){
    const baseRate=RELIC_DROP_RATES[relic.rarity]||0.05;
    const rate=Math.min(1,baseRate*bonus);
    if(Math.random()<rate)return relic;
  }
  return null;
}

function cycleExpDot(slotIdx){
  // Don't cycle if locked
  if(window._expedLocked[slotIdx])return;
  const cur=_expedSlots[slotIdx];
  const allDots=dots.map((_,i)=>i);
  const curPos=cur!==null?allDots.indexOf(cur):-1;
  const nextDotIdx=allDots[(curPos+1)%allDots.length];
  const otherSlot=_expedSlots.findIndex((s,i)=>i!==slotIdx&&s===nextDotIdx);
  if(otherSlot!==-1&&!window._expedLocked[otherSlot]){_expedSlots[otherSlot]=cur;}
  else if(otherSlot!==-1&&window._expedLocked[otherSlot])return; // can't swap with locked slot
  _expedSlots[slotIdx]=nextDotIdx;
  showExpedSetup();
}

function lockExpDot(slotIdx){
  if(_expedSlots[slotIdx]===null)return; // can't lock empty
  window._expedLocked[slotIdx]=!window._expedLocked[slotIdx];
  showExpedSetup();
}
window.lockExpDot=lockExpDot;

function autoAssignExpedition(){const today=getTodaysExpedition();const used=new Set();
  // Preserve locked slots
  for(let i=0;i<5;i++){if(window._expedLocked[i]&&_expedSlots[i]!==null&&_expedSlots[i]>=0)used.add(_expedSlots[i]);}
  // Combat leader (slot 0) — if not locked
  if(!window._expedLocked[0]){
    let bc=-1,bi=-1;dots.forEach((d,i)=>{if(used.has(i))return;const t=(d.skills.melee||1)+(d.skills.ranged||1)+(d.skills.magic||1)+(d.skills.defence||1);if(t>bc){bc=t;bi=i;}});
    _expedSlots[0]=bi>=0?bi:null;
    if(bi>=0)used.add(bi);
  }
  for(let i=1;i<5;i++){
    if(window._expedLocked[i])continue;
    const rid=today.slots[i];const map=EXPD_ROLE_MAP[rid];const sk=map?.skills[0]||'mining';
    let bl=-1,bd=-1;dots.forEach((d,di)=>{if(used.has(di))return;const l=d.skills[sk]||1;if(l>bl){bl=l;bd=di;}});
    if(bd===-1){
      // No unused hero left — slot stays empty
      _expedSlots[i]=null;
    } else {
      _expedSlots[i]=bd;used.add(bd);
    }
  }
  // Lock all after auto assign
  window._expedLocked=[true,true,true,true,true];
  showExpedSetup();}

// Dropdown-based hero assignment (handles swaps automatically)
function setExpDot(slotIdx,dotIdx){
  if(dotIdx<0){_expedSlots[slotIdx]=null;showExpedSetup();return;}
  // If this hero is in another slot, swap
  const otherSlot=_expedSlots.findIndex((s,i)=>i!==slotIdx&&s===dotIdx);
  if(otherSlot!==-1)_expedSlots[otherSlot]=_expedSlots[slotIdx];
  _expedSlots[slotIdx]=dotIdx;
  showExpedSetup();
}

function recordExpedScore(score,name){
  window._expedScoreHistory.push({score,name:name||GROUP_NAME,time:Date.now()});
  // Keep max 100 entries
  if(window._expedScoreHistory.length>100)window._expedScoreHistory=window._expedScoreHistory.slice(-100);
}

function getExpedLeaderboard(tab){
  const now=Date.now();
  const DAY=86400000,WEEK=DAY*7;
  let entries=window._expedScoreHistory;
  if(tab==='today')entries=entries.filter(e=>now-e.time<DAY);
  else if(tab==='week')entries=entries.filter(e=>now-e.time<WEEK);
  // Sort by score descending
  entries.sort((a,b)=>b.score-a.score);
  return entries;
}
