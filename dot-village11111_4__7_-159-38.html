function updateRaid(dt){
  if(!_raidActive)return;
  if(_raidPhase==='prep'){
    _raidTimer-=dt;
    if(_raidTimer<=0){
      _raidTimer=0;_raidPhase='combat';_raidStage=0;
      addLog('⚔️ Prep time over! Combat begins!','⚔️','levelup');
      // Deposit all inventories to raid bank first
      dots.forEach(d=>{
        d.inv.forEach((s,i)=>{if(s){bankAdd(s.id,s.qty);d.inv[i]=null;}});
        d.currentMob=null;d.monsterHp=0;d.monsterMaxHp=0;d.gatherTimer=0;
      });
      bankDirty=true;
      startRaidCombatStage(1);
    }
  }
}

function startRaidCombatStage(stage){
  _raidStage=stage;
  // Auto-grab best food from raid bank
  dots.forEach(d=>{
    if(d.dead)return;
    d.curHp=d.skills.hitpoints||10; // heal between stages
    const foodTypes=['cooked_giant_meat','shark','swordfish','lobster','salmon','trout','herring','sardine','shrimp','cooked_berries'];
    let foodInInv=0;for(let i=0;i<INV_SIZE;i++){if(d.inv[i]&&FOOD_HEAL[d.inv[i].id])foodInInv++;}
    for(const fid of foodTypes){
      while((storage[fid]||0)>0&&foodInInv<12&&invSlots(d)<INV_SIZE){
        storage[fid]--;invAdd(d,fid,1);foodInInv++;
      }
    }
    // Auto-equip best gear from raid bank
    raidAutoEquip(d);
  });
  // Auto-use dust potions from bank
  raidAutoPotions();
  if(stage<=2){
    let mob;
    if(stage===1){
      // Stage 1: 2 random key bosses from T5-T9 pool, fought sequentially
      const picks=[];
      const pool=[...RAID_STAGE1_POOL];
      for(let i=0;i<2&&pool.length;i++){
        const idx=Math.floor(Math.random()*pool.length);
        picks.push(pool.splice(idx,1)[0]);
      }
      mob=picks[0]; // Start with first boss
      _raidStage1Queue=picks.slice(1); // Queue remaining
    } else {
      // Stage 2: 1 random core boss
      mob=RAID_STAGE2_POOL[Math.floor(Math.random()*RAID_STAGE2_POOL.length)];
      _raidStage1Queue=[];
    }
    const scaledMob={...mob,hp:mob.hp,loot:[]};
    const stagePos=getRaidStagePos('stage'+stage);
    window._bossActive=true;
    window._bossMob=scaledMob;
    window._bossHP=scaledMob.hp;
    window._bossMaxHP=scaledMob.hp;
    window._bossX=stagePos.x;
    window._bossY=stagePos.y-50;
    window._bossStats={};
    _raidMobsRemaining=1+(stage===1?_raidStage1Queue.length:0);
    dots.forEach(d=>{
      if(d.dead)return;
      d.profession='key_arena';
      d.activity={id:'raid_stage_'+stage,label:scaledMob.label,lvl:1,tier:true,mobs:[scaledMob]};
      d.state='gathering';d.gatherTimer=0;
      d.currentMob=null;d.monsterHp=0;d.monsterMaxHp=0;
      window._bossStats[d.id]={dmgDealt:0,dmgTaken:0,hits:0};
      const ci=dots.indexOf(d);
      d.x=stagePos.x-100+ci*50;d.y=stagePos.y+60;
      d.tx=d.x;d.ty=d.y;
    });
    camX=stagePos.x;camY=stagePos.y;
    addLog(`⚔️ Stage ${stage}: ${scaledMob.label} (HP: ${scaledMob.hp})!`,'⚔️','info');
  } else {
    // Stage 3: FINAL BOSS
    startRaidBoss();
  }
  uiDirty=true;buildUI();
}

// Auto-equip best gear from raid bank for each hero
function raidAutoEquip(d){
  // Use correct slot names from EQ_SLOTS — and skip 'ammo' since raids draw from shared bank
  const slots=['weapon','body','head','greaves','hands','shield','cape','neck','ring'];
  for(const slot of slots){
    // Find best gear for this slot in bank
    let bestId=null,bestStat=0;
    Object.keys(storage).forEach(k=>{
      if((storage[k]||0)<=0)return;
      const gs=GEAR_STATS[k];
      if(!gs||gs.slot!==slot)return;
      // Check level req
      if(gs.req){
        let canWear=true;
        for(const[sk,lv] of Object.entries(gs.req)){if((d.skills[sk]||1)<lv){canWear=false;break;}}
        if(!canWear)return;
      }
      let weighted=0;
      if(slot==='weapon'){
        // For weapon: pick the highest-stat weapon overall. Score by max-style.
        const m=(gs.melee_acc||0)+(gs.melee_str||0)*2;
        const r=(gs.range_acc||0)+(gs.range_str||0)*2;
        const mg=(gs.mage_acc||0)+(gs.mage_str||0)*2;
        weighted=Math.max(m,r,mg);
      } else {
        // Other slots: score relative to this hero's CURRENT weapon style
        const wepGS=d.eq&&d.eq.weapon?GEAR_STATS[d.eq.weapon]:null;
        const isRanged=wepGS&&(wepGS.range_acc||wepGS.range_str);
        const isMage=wepGS&&(wepGS.mage_acc||wepGS.mage_str);
        if(isRanged){weighted=(gs.range_acc||0)+(gs.range_str||0)*2+(gs.defence||0)*0.6;}
        else if(isMage){weighted=(gs.mage_acc||0)+(gs.mage_str||0)*2+(gs.defence||0)*0.6;}
        else {weighted=(gs.melee_acc||0)+(gs.melee_str||0)*2+(gs.defence||0)*0.6;}
        // Quivers/tomes also count via ammoSave value (significant for ranged/magic)
        if(gs.ammoSave&&(isRanged||isMage))weighted+=gs.ammoSave*30;
      }
      if(weighted>bestStat){bestStat=weighted;bestId=k;}
    });
    if(bestId){
      // Unequip current — return to bank
      if(d.eq[slot]){storage[d.eq[slot]]=(storage[d.eq[slot]]||0)+1;bankDirty=true;}
      d.eq[slot]=bestId;
      storage[bestId]--;bankDirty=true;
    }
  }
  // Ammo slot: equip a placeholder so the "needsAmmo" check passes,
  // but ammo consumption pulls from shared bank during raids.
  // We just need d.eq.ammo and d.ammoQty truthy for the check.
  if(_raidActive){
    const wepGS=d.eq&&d.eq.weapon?GEAR_STATS[d.eq.weapon]:null;
    const isRanged=wepGS&&(wepGS.range_acc||wepGS.range_str);
    const isMage=wepGS&&(wepGS.mage_acc||wepGS.mage_str);
    if(isRanged||isMage){
      const _arrowList=['infernal_arrow','titanium_arrow','obsidian_arrow','mithril_arrow','steel_arrow','iron_arrow','bronze_arrow'];
      const _runeList=['ethereal_rune','mystic_rune','arcane_rune','cursed_rune','enchanted_rune','magical_rune','infused_rune'];
      const _list=isRanged?_arrowList:_runeList;
      let bestAmmo=null;
      for(const aId of _list){if((storage[aId]||0)>0){bestAmmo=aId;break;}}
      if(bestAmmo){
        d.eq.ammo=bestAmmo;d.ammoQty=1;// flag — actual consumption from bank
      }
    }
  }
}

function onRaidMobKilled(d){
  if(!_raidActive||_raidPhase!=='combat')return;
  if(_raidStage>=1&&_raidStage<=2){
    _raidMobsRemaining--;
    // Persistent collection log: track raid mob kill
    if(window._bossMob)clTrackKill(window._bossMob.label);

    if(_raidStage===1&&_raidStage1Queue.length>0){

      window._bossMaxHP=scaledMob.hp;

function onRaidBossKilled(){
  if(!_raidActive)return;
  window._bossActive=false;
  // Persistent collection log: track raid boss kill
  if(_raidBoss)clTrackKill(_raidBoss.label);
  // Roll 5 loot drops guaranteed
  const allLoot=[];
  const pool=_raidBoss.loot||[];
  for(let i=0;i<5;i++){
    if(pool.length){
      const totalW=pool.reduce((s,l)=>s+l.pct,0);
      let roll=Math.random()*totalW;
      for(const l of pool){
        roll-=l.pct;
        if(roll<=0){
          const qty=l.qty?Math.floor(Math.random()*(l.qty[1]-l.qty[0]+1))+l.qty[0]:1;
          allLoot.push({id:l.id,qty});
          if(_raidBoss)clTrackDrop(_raidBoss.label,l.id,qty);
          break;
        }
      }
    }
  }
  _raidLoot=allLoot;
  _raidKC++;
  endRaid(true);
}

function endRaid(victory){
  _raidPhase='results';
  window._bossActive=false;window._bossMob=null;window._bossHP=0;window._bossMaxHP=0;
  window._bossX=0;window._bossY=0;window._bossStats={};
  // Restore original game state
  const saved=_raidSavedState;
  Object.keys(storage).forEach(k=>storage[k]=0);
  Object.entries(saved.storage).forEach(([k,v])=>storage[k]=v);
  dots.forEach((d,i)=>{
    const s=saved.dots[i];
    d.profession=s.profession;d.activity=s.activity;
    d.x=s.x;d.y=s.y;d.tx=s.tx;d.ty=s.ty;d.wx=s.wx;d.wy=s.wy;
    d.inv=s.inv;d.eq=s.eq;
    d.curHp=s.curHp;d.dead=s.dead;d.deathTimer=s.deathTimer;
    d.ammoQty=s.ammoQty;
    // Restore skills/XP on defeat to prevent XP farming via raid exit
    if(!victory){d.skills=s.skills;d.xp=s.xp;}
    // Clear combat state and let game re-enter naturally
    d.currentMob=null;d.monsterHp=0;d.monsterMaxHp=0;d.gatherTimer=0;
    d.state=s.dead?'dead':'idle';
    // If was assigned somewhere, walk back
    if(!s.dead&&s.profession!=='townhall'){
      sendToZone(d,s.profession);
    }
  });
  // Add raid loot to REAL bank
  if(victory){
    _raidLoot.forEach(l=>{storage[l.id]=(storage[l.id]||0)+l.qty;});
  }
  _raidActive=false;window._raidActive=false;
  _mapMode='main';
  bankDirty=true;uiDirty=true;buildUI();buildBg();
  renderRaidHUD(); // explicitly hide the HUD
  showRaidResults(victory);
  // Process any deferred hero unlocks earned during the raid
  setTimeout(()=>processPendingHeroUnlocks(),1500);
}

let _siegeActive=false,_siegePhase='',_siegeTimer=0,_siegeWave=0,_siegeScore=0;
let _siegeKC=0,_siegeStartTime=0,_siegeDemands=[],_siegeCurrentDemand=null;
let _siegeGathered=0,_siegeTarget=0,_siegeWaveResults=[];
let _siegeSavedState=null,_siegeTotalWaves=8;
let _siegeWaveGatherStart=0; // track what was in storage at wave start

const SIEGE_DEMANDS=[
  {skill:'woodcutting',cmd:'CUT LUMBER — WALLS CRUMBLING!',icon:'🪓'},
  {skill:'mining',cmd:'MINE STONE — GATES WEAKENING!',icon:'⛏️'},

  {skill:'runecraft',cmd:'CRAFT RUNES — MAGES DEPLETED!',icon:'🔶'},
  {skill:'foraging',cmd:'GATHER SUPPLIES — STOCKS EMPTY!',icon:'🧺'},
  {skill:'woodcutting',cmd:'MORE WOOD — FIRE THE DEFENSES!',icon:'🪓'},
  {skill:'mining',cmd:'DIG DEEPER — WE NEED ORE!',icon:'⛏️'},

function startSiege(){
  closeRaid();
  _siegeSavedState={
    storage:JSON.parse(JSON.stringify(storage)),
    dots:dots.map(d=>({
      profession:d.profession,activity:d.activity?JSON.parse(JSON.stringify(d.activity)):null,
      state:d.state,x:d.x,y:d.y,tx:d.tx,ty:d.ty,wx:d.wx,wy:d.wy,
      inv:JSON.parse(JSON.stringify(d.inv)),eq:JSON.parse(JSON.stringify(d.eq)),
      skills:JSON.parse(JSON.stringify(d.skills)),xp:JSON.parse(JSON.stringify(d.xp)),
      curHp:d.curHp,dead:d.dead,deathTimer:d.deathTimer,ammoQty:d.ammoQty
    }))
  };
  // Clear to siege instance — keep skills only
  Object.keys(storage).forEach(k=>storage[k]=0);
  dots.forEach(d=>{
    d.profession='townhall';d.activity=null;d.state='idle';
    d.inv=new Array(INV_SIZE).fill(null);
    const eqKeys=Object.keys(d.eq||{});eqKeys.forEach(k=>d.eq[k]=null);
    d.curHp=d.maxHp;d.dead=false;d.deathTimer=0;
    d.currentMob=null;d.monsterHp=0;d.monsterMaxHp=0;d.gatherTimer=0;
    const t=zC(ZONES.townhall);
    d.x=t.x+(Math.random()-.5)*40;d.y=t.y+(Math.random()-.5)*40;d.tx=d.x;d.ty=d.y;
  });
  const shuffled=[...SIEGE_DEMANDS].sort(()=>Math.random()-0.5);
  _siegeDemands=shuffled.slice(0,_siegeTotalWaves);
  _siegeActive=true;_siegePhase='intro';_siegeTimer=3;_siegeWave=0;_siegeScore=0;
  _siegeStartTime=Date.now();_siegeWaveResults=[];_siegeGathered=0;_siegeTarget=0;
  bankDirty=true;uiDirty=true;buildUI();buildBg();
  showSiegeCinematic();
}
window.startSiege=startSiege;

function showSiegeCinematic(){
  const el=document.createElement('div');
  el.className='raid-cinematic';
  el.innerHTML=`<div class="raid-cinematic-bg"></div>
    <div class="raid-cinematic-text">
      <div class="raid-cinematic-title">🏰 THE SIEGE OF IRONHOLD 🏰</div>
      <div class="raid-cinematic-line"></div>
      <div class="raid-cinematic-sub">THE ENEMY APPROACHES — DEFEND THE VILLAGE</div>
    </div>`;
  document.body.appendChild(el);
  setTimeout(()=>{el.classList.add('fade-out');},2200);
  setTimeout(()=>{el.remove();},3200);
}

function startSiegeWave(){
  _siegeWave++;
  if(_siegeWave>_siegeTotalWaves){endSiege(true);return;}
  _siegeCurrentDemand=_siegeDemands[_siegeWave-1];
  const skill=_siegeCurrentDemand.skill;
  // Target based on wave + average skill level
  const avgLvl=Math.floor(dots.reduce((s,d)=>s+(d.skills[skill]||1),0)/Math.max(1,dots.length));
  _siegeTarget=Math.floor(8+_siegeWave*4+avgLvl*0.3);
  _siegePhase='gather';
  _siegeTimer=30;
  // Snapshot all storage values this skill produces — we only count NEW items gathered
  const acts=ACTIVITIES[skill]||[];
  const possibleItems=new Set();
  acts.forEach(a=>{if(a.produces)possibleItems.add(a.produces);if(a.recipe)Object.keys(a.recipe).forEach(k=>possibleItems.add(k));});
  _siegeWaveGatherStart={};
  possibleItems.forEach(k=>{_siegeWaveGatherStart[k]=storage[k]||0;});
  _siegeGathered=0;
  // Auto-assign all characters
  const zoneKey=Object.keys(ZONES).find(k=>{const z=ZONES[k];return z.skills&&z.skills.includes(skill);});
  if(zoneKey){
    dots.forEach(d=>{
      if(d.dead)return;
      d.profession=zoneKey;
      const skillActs=ACTIVITIES[skill]||[];
      const best=skillActs.filter(a=>!a.tier&&(d.skills[skill]||1)>=a.lvl).sort((a,b)=>b.lvl-a.lvl)[0];
      if(best){d.activity=JSON.parse(JSON.stringify(best));sendToZone(d,zoneKey);}
    });
  }
  addLog(`🏰 Wave ${_siegeWave}: ${_siegeCurrentDemand.cmd}`,'🏰','levelup');
}

function updateSiege(dt){
  if(!_siegeActive)return;
  if(_siegePhase==='intro'){
    _siegeTimer-=dt;
    if(_siegeTimer<=0)startSiegeWave();
    return;
  }
  if(_siegePhase==='gather'){
    _siegeTimer-=dt;
    // Count NEW items gathered since wave start
    let total=0;
    Object.keys(_siegeWaveGatherStart).forEach(k=>{
      const now=storage[k]||0;
      const start=_siegeWaveGatherStart[k]||0;
      if(now>start)total+=now-start;
    });
    // Also count items in character inventories
    dots.forEach(d=>{d.inv.forEach(slot=>{
      if(slot&&_siegeWaveGatherStart.hasOwnProperty(slot.id)){total+=(slot.qty||1);}
    });});
    _siegeGathered=total;
    if(_siegeTimer<=0||_siegeGathered>=_siegeTarget){
      const success=_siegeGathered>=_siegeTarget;
      _siegeWaveResults.push({demand:_siegeCurrentDemand,target:_siegeTarget,gathered:_siegeGathered,success});
      if(success){_siegeScore++;addLog(`✅ Wave ${_siegeWave} — ${_siegeGathered}/${_siegeTarget} delivered!`,'✅','levelup');}
      else{addLog(`❌ Wave ${_siegeWave} — Only ${_siegeGathered}/${_siegeTarget}. The walls crack!`,'❌','error');}
      const failures=_siegeWaveResults.filter(r=>!r.success).length;
      if(failures>=3){endSiege(false);return;}
      _siegePhase='transition';_siegeTimer=2;
    }
    return;
  }
  if(_siegePhase==='transition'){
    _siegeTimer-=dt;
    if(_siegeTimer<=0)startSiegeWave();
  }
}

function endSiege(victory){
  _siegePhase='results';
  const saved=_siegeSavedState;
  Object.keys(storage).forEach(k=>storage[k]=0);
  Object.entries(saved.storage).forEach(([k,v])=>storage[k]=v);
  dots.forEach((d,i)=>{
    const s=saved.dots[i];
    d.profession=s.profession;d.activity=s.activity;d.x=s.x;d.y=s.y;d.tx=s.tx;d.ty=s.ty;d.wx=s.wx;d.wy=s.wy;
    d.inv=s.inv;d.eq=s.eq;d.skills=s.skills;d.xp=s.xp;
    d.curHp=s.curHp;d.dead=s.dead;d.deathTimer=s.deathTimer;
    d.currentMob=null;d.monsterHp=0;d.monsterMaxHp=0;d.gatherTimer=0;
    d.state=s.dead?'dead':'idle';
    if(!s.dead&&s.profession!=='townhall'){sendToZone(d,s.profession);}
  });
  let siegeLoot=[];
  if(victory){
    _siegeKC++;
    siegeLoot.push({id:'coins',qty:Math.floor(5000+_siegeScore*3000)});
    siegeLoot.push({id:'momentum_shard',qty:Math.floor(2+_siegeScore*2)});
    if(_siegeScore>=6)siegeLoot.push({id:'battle_scar',qty:Math.floor(_siegeScore/2)});
    if(_siegeScore>=8)siegeLoot.push({id:'boss_key_t3',qty:1});
    siegeLoot.forEach(l=>{storage[l.id]=(storage[l.id]||0)+l.qty;});
  }
  _siegeActive=false;
  bankDirty=true;uiDirty=true;buildUI();buildBg();
  showSiegeResults(victory,siegeLoot);
}

    h+=`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 10px;font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:rgba(255,255,255,0.7)"><span>${w.demand.cmd.split('—')[0].trim()}</span><span>${w.gathered}/${w.target} ${w.success?'✅':'❌'}</span></div>`;

  });
  h+=`</div>`;
  
  if(victory&&loot.length>0){
    h+=`<div style="font-family:'Cinzel',serif;font-size:12px;color:rgba(80,160,220,0.6);letter-spacing:1.5px;text-align:center;margin:8px 0 10px">REWARDS</div>`;

// ═══ XP GEM SYSTEM ═══
const GEM_XP={xp_gem_small:500,xp_gem_medium:2000,xp_gem_large:10000,xp_gem_xl:25000};
const GEM_SKILLS=['melee','ranged','magic','melee_str','range_str','mage_str','hitpoints','defence','mining','fishing','woodcutting','smithing','cooking','fletching','herblore','farming','runecraft','agility','plundering','foraging'];

window.crushGem=(gemId)=>{
  if((storage[gemId]||0)<=0)return;
  
  const xpAmt=GEM_XP[gemId];
  const gemItem=ITEMS[gemId];
  const gemColor=gemId==='xp_gem_small'?'#44cc88':gemId==='xp_gem_medium'?'#4488dd':gemId==='xp_gem_large'?'#aa44dd':'#ff6644';
  
  // Create overlay
  const ov=document.createElement('div');
  ov.className='gem-overlay';
  ov.id='gem-crush-overlay';
  
  let h=`<div style="text-align:center;">`;
  // Gem icon
  const gemImg=ITEM_IMGS&&ITEM_IMGS[gemId]?`<img src="${ITEM_IMGS[gemId]}" style="width:80px;height:80px;object-fit:contain;animation:gemSpin 0.6s ease,gemPulse 1.5s ease infinite;">`:'💎';
  h+=`<div style="margin-bottom:12px">${gemImg}</div>`;
  h+=`<div style="font-family:'Cinzel',serif;font-size:20px;font-weight:900;color:${gemColor};letter-spacing:2px;text-shadow:0 0 15px ${gemColor}44;margin-bottom:8px">${gemItem.label.toUpperCase()}</div>`;
  h+=`<div style="font-family:'Crimson Text',serif;font-size:14px;color:rgba(200,180,150,0.5);margin-bottom:24px">+${xpAmt.toLocaleString()} XP — Choose a hero to receive it</div>`;
  
  // Hero selection
  h+=`<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">`;
  dots.forEach((d,i)=>{
    h+=`<div onclick="executeGemCrush('${gemId}',${i})" style="cursor:pointer;padding:12px 16px;background:linear-gradient(180deg,rgba(20,18,30,0.9),rgba(12,10,20,0.9));border:1px solid rgba(194,158,62,0.25);border-radius:10px;min-width:80px;transition:all 0.2s" onmouseenter="this.style.borderColor='${gemColor}';this.style.boxShadow='0 0 15px ${gemColor}33'" onmouseleave="this.style.borderColor='rgba(194,158,62,0.25)';this.style.boxShadow='none'">`;
    h+=`<div style="width:28px;height:28px;border-radius:50%;background:${d.color};margin:0 auto 6px;border:2px solid rgba(255,255,255,0.15)"></div>`;
    h+=`<div style="font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:rgba(232,214,165,0.8)">${d.name}</div>`;
    h+=`</div>`;
  });
  h+=`</div>`;
  
  // Cancel
  h+=`<div onclick="document.getElementById('gem-crush-overlay')?.remove()" style="margin-top:20px;font-family:'Cinzel',serif;font-size:11px;color:rgba(200,180,150,0.3);cursor:pointer">Cancel</div>`;
  h+=`</div>`;
  
  ov.innerHTML=h;
  document.body.appendChild(ov);
  setTimeout(()=>ov.classList.add('show'),10);
};

window.executeGemCrush=(gemId,heroIdx)=>{
  if((storage[gemId]||0)<=0)return;
  storage[gemId]--;bankDirty=true;
  
  const d=dots[heroIdx];
  const xpAmt=GEM_XP[gemId];
  const gemColor=gemId==='xp_gem_small'?'#44cc88':gemId==='xp_gem_medium'?'#4488dd':gemId==='xp_gem_large'?'#aa44dd':'#ff6644';
  
  const ov=document.getElementById('gem-crush-overlay');
  if(!ov)return;
  
  const finalSkill=GEM_SKILLS[Math.floor(Math.random()*GEM_SKILLS.length)];
  const finalSkillObj=SKILLS.find(s=>s.id===finalSkill);
  
  // Capture XP state BEFORE granting
  const oldLvl=d.skills[finalSkill]||1;
  const oldXp=d.xp[finalSkill]||0;
  const oldNext=xpNext(oldLvl);
  const oldPct=oldNext===Infinity?100:Math.min(100,Math.floor((oldXp/oldNext)*100));
  
  let h=`<div style="text-align:center;" id="gem-spin-container">`;
  h+=`<div style="font-family:'Cinzel',serif;font-size:14px;color:rgba(200,180,150,0.5);margin-bottom:16px">${d.name} crushes the gem...</div>`;
  h+=`<div style="width:80px;height:80px;margin:0 auto 16px;border:2px solid ${gemColor}44;border-radius:16px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:rgba(10,8,18,0.8);box-shadow:0 0 30px ${gemColor}22;position:relative" id="gem-skill-slot">`;
  h+=`<div style="position:relative;z-index:2;width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:48px;" id="gem-skill-icon">⚔️</div>`;
  h+=`<div id="gem-particles" style="position:absolute;inset:0;pointer-events:none;z-index:1"></div>`;
  h+=`</div>`;
  h+=`<div id="gem-skill-name" style="font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:rgba(200,180,150,0.6);margin-bottom:6px">...</div>`;
  
  // XP bar area (hidden until reveal)
  h+=`<div id="gem-xp-bar-wrap" style="display:none;margin:16px auto;max-width:280px">`;
  h+=`<div style="display:flex;justify-content:space-between;font-family:'Crimson Text',serif;font-size:12px;color:rgba(200,180,150,0.5);margin-bottom:4px">`;
  h+=`<span id="gem-lvl-label">Lv ${oldLvl}</span><span id="gem-xp-label">0%</span>`;
  h+=`</div>`;
  h+=`<div style="width:100%;height:14px;background:rgba(10,8,18,0.8);border:1px solid rgba(194,158,62,0.2);border-radius:7px;overflow:hidden;position:relative">`;
  h+=`<div id="gem-xp-fill" style="height:100%;width:${oldPct}%;background:linear-gradient(90deg,${gemColor}88,${gemColor});border-radius:7px;transition:width 1.5s ease;position:relative">`;
  h+=`<div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.2),transparent);border-radius:7px"></div>`;
  h+=`</div>`;
  h+=`<div id="gem-bar-particles" style="position:absolute;inset:0;pointer-events:none;overflow:hidden"></div>`;
  h+=`</div>`;
  h+=`<div id="gem-xp-gained" style="font-family:'Crimson Text',serif;font-size:18px;font-weight:900;color:${gemColor};text-shadow:0 0 12px ${gemColor}44;margin-top:8px;opacity:0;transition:opacity 0.5s">+${xpAmt.toLocaleString()} XP</div>`;
  h+=`</div>`;
  
  // Buttons
  const remaining=(storage[gemId]||0);
  h+=`<div id="gem-btns" style="opacity:0;transition:opacity 0.5s;margin-top:16px">`;
  h+=`<div onclick="document.getElementById('gem-crush-overlay')?.remove();buildResPanel();buildPanel();" style="display:inline-block;padding:10px 28px;font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:#0a0c14;background:linear-gradient(180deg,${gemColor},${gemColor}cc);border-radius:6px;cursor:pointer">Continue</div>`;
  if(remaining>0){
    h+=`<br><div onclick="document.getElementById('gem-crush-overlay')?.remove();crushGem('${gemId}')" style="display:inline-block;margin-top:8px;padding:8px 24px;font-family:'Cinzel',serif;font-size:11px;color:rgba(200,180,150,0.4);cursor:pointer">Crush Another (${remaining})</div>`;
  }
  h+=`</div></div>`;
  
  ov.querySelector('div').innerHTML=h;
  
  // Spin animation
  const iconEl=document.getElementById('gem-skill-icon');
  const nameEl=document.getElementById('gem-skill-name');
  let spinCount=0;
  const totalSpins=20;
  let spinDelay=50;
  
  function spawnParticles(container,color,count){
    for(let i=0;i<count;i++){
      const p=document.createElement('div');
      const px=(Math.random()-.5)*40;
      p.style.cssText=`position:absolute;width:4px;height:4px;border-radius:50%;background:${color};left:${40+px}px;bottom:10px;opacity:0.8;animation:gemParticle ${0.6+Math.random()*0.6}s ease forwards;--px:${(Math.random()-.5)*30}px;`;
      container.appendChild(p);
      setTimeout(()=>p.remove(),1200);
    }
  }
  
  // Helper: render a skill in the gem slot using image if available, else emoji
  function setGemSkillIcon(el, sk, sizePx){
    if(!el||!sk)return;
    const toolId=SKILL_TOOL_IMG&&SKILL_TOOL_IMG[sk.id];
    if(toolId&&typeof ITEM_IMGS!=='undefined'&&ITEM_IMGS[toolId]){
      el.innerHTML=`<img src="${ITEM_IMGS[toolId]}" alt="${sk.label}" style="width:${sizePx}px;height:${sizePx}px;object-fit:contain;display:block;">`;
    } else {
      el.innerHTML=`<span style="font-size:${sizePx}px;line-height:1;">${sk.icon||'?'}</span>`;
    }
  }

  function spinStep(){
    const randomSkill=GEM_SKILLS[Math.floor(Math.random()*GEM_SKILLS.length)];
    const sk=SKILLS.find(s=>s.id===randomSkill);
    setGemSkillIcon(iconEl,sk,48);
    if(nameEl)nameEl.textContent=sk?sk.label:'?';
    spinCount++;
    
    if(spinCount<totalSpins){
      spinDelay+=15;
      setTimeout(spinStep,spinDelay);
    } else {
      // Land on final
      setGemSkillIcon(iconEl,finalSkillObj,56);
      if(nameEl){nameEl.textContent=finalSkillObj?finalSkillObj.label:'?';nameEl.style.color=gemColor;nameEl.style.fontSize='20px';}
      
      // Show XP bar
      setTimeout(()=>{
        const barWrap=document.getElementById('gem-xp-bar-wrap');
        if(barWrap)barWrap.style.display='block';
        
        // Spawn particles from gem into bar
        const particles=document.getElementById('gem-particles');
        if(particles){
          let pCount=0;
          const pInterval=setInterval(()=>{
            spawnParticles(particles,gemColor,3);
            pCount++;
            if(pCount>8)clearInterval(pInterval);
          },80);
        }
        
        // Animate bar after particles start
        setTimeout(()=>{
          // Grant XP now
          grantXP(d,finalSkill,xpAmt);
          
          // Calculate new state
          const newLvl=d.skills[finalSkill]||1;
          const newXp=d.xp[finalSkill]||0;
          const newNext=xpNext(newLvl);
          const newPct=newNext===Infinity?100:Math.min(100,Math.floor((newXp/newNext)*100));
          const leveledUp=newLvl>oldLvl;
          
          // Animate fill
          const fill=document.getElementById('gem-xp-fill');
          if(fill){
            if(leveledUp){
              // Fill to 100% first, then reset and fill to new pct
              fill.style.width='100%';
              setTimeout(()=>{
                fill.style.transition='none';
                fill.style.width='0%';
                setTimeout(()=>{
                  fill.style.transition='width 1s ease';
                  fill.style.width=newPct+'%';
                },50);
              },1600);
            } else {
              fill.style.width=newPct+'%';
            }
            fill.style.animation='gemBarGlow 1s ease 3';
          }
          
          // Spawn bar particles during fill
          const barParticles=document.getElementById('gem-bar-particles');
          if(barParticles){
            let bpCount=0;
            const bpInterval=setInterval(()=>{
              const curWidth=fill?parseFloat(fill.style.width):50;
              for(let i=0;i<2;i++){
                const bp=document.createElement('div');
                bp.style.cssText=`position:absolute;width:3px;height:3px;border-radius:50%;background:${gemColor};left:${curWidth}%;top:${2+Math.random()*10}px;opacity:0.9;animation:gemParticle ${0.4+Math.random()*0.4}s ease forwards;--px:${(Math.random()-.5)*15}px;`;
                barParticles.appendChild(bp);
                setTimeout(()=>bp.remove(),800);
              }
              bpCount++;
              if(bpCount>15)clearInterval(bpInterval);
            },100);
          }
          
          // Update labels
          const lvlLabel=document.getElementById('gem-lvl-label');
          const xpLabel=document.getElementById('gem-xp-label');
          if(leveledUp&&lvlLabel){
            setTimeout(()=>{
              lvlLabel.textContent='Lv '+newLvl+' ⬆';
              lvlLabel.style.color='#ffdd44';
              lvlLabel.style.fontSize='14px';
              lvlLabel.style.fontWeight='700';
            },1600);
          }
          if(xpLabel){
            // Animate percentage counter
            let curPctDisplay=oldPct;
            const targetPct=leveledUp?100:newPct;
            const pctStep=Math.max(1,Math.floor((targetPct-curPctDisplay)/20));
            const pctInterval=setInterval(()=>{
              curPctDisplay=Math.min(curPctDisplay+pctStep,targetPct);
              xpLabel.textContent=curPctDisplay+'%';
              if(curPctDisplay>=targetPct){
                clearInterval(pctInterval);
                if(leveledUp){
                  setTimeout(()=>{xpLabel.textContent=newPct+'%';},1800);
                }
              }
            },75);
          }
          
          // Show XP gained text
          const xpGained=document.getElementById('gem-xp-gained');
          if(xpGained)xpGained.style.opacity='1';
          
          // Show buttons
          setTimeout(()=>{
            const btns=document.getElementById('gem-btns');
            if(btns)btns.style.opacity='1';
            addLog('💎 '+d.name+' crushed a '+ITEMS[gemId].label+' for +'+xpAmt+' '+finalSkillObj.label+' XP!','💎','levelup');
            addFloat(d.x,d.y-30,'+'+xpAmt+' '+finalSkillObj.icon,gemColor,2.5);
            uiDirty=true;bankDirty=true;
          },leveledUp?3000:2000);
        },600);
      },400);
    }
  }
  
  setTimeout(spinStep,300);
};

// Active clue state managed by early declarations above

function hasClue(tier){return !!activeClues[tier];}
function hasClueScroll(tier){return (storage['clue_'+tier]||0)>0;}

function activateClue(tier){
  if(hasClue(tier))return;
  if(!hasClueScroll(tier))return;
  storage['clue_'+tier]--;bankDirty=true;
  const def=CLUE_TIERS[tier];
  // Pick random steps from the pool
  const shuffled=[...def.stepPool].sort(()=>Math.random()-0.5);
  const picked=shuffled.slice(0,def.steps);
  activeClues[tier]={steps:picked.map(s=>({...s,progress:0})),complete:false};
  addLog(`📜 Activated ${def.label} Clue Scroll! ${def.steps} steps to complete.`,'📜','levelup');
  uiDirty=true;buildResPanel();
}

function checkClueProgress(itemId,qty){
  if(_raidActive)return; // no clue progress during raids
  Object.entries(activeClues).forEach(([tier,clue])=>{
    if(clue.complete)return;
    // Only track the CURRENT step (first incomplete one)
    const currentStep=clue.steps.find(s=>s.progress<s.qty);
    if(!currentStep)return;
    if(currentStep.item===itemId){
      currentStep.progress=Math.min(currentStep.qty,currentStep.progress+qty);
      // Check if current step is now done
      if(currentStep.progress>=currentStep.qty){
        const done=clue.steps.filter(s=>s.progress>=s.qty).length;
        if(done<clue.steps.length){
          addLog(`${CLUE_TIERS[tier].label} Clue: Step ${done}/${clue.steps.length} complete!`,'','info');
          showStepComplete(CLUE_TIERS[tier].label,done,clue.steps.length);
        }
      }
      // Check if ALL steps done
      const allDone=clue.steps.every(s=>s.progress>=s.qty);
      if(allDone&&!clue.complete){
        clue.complete=true;
        const def=CLUE_TIERS[tier];
        storage['casket_'+tier]=(storage['casket_'+tier]||0)+1;bankDirty=true;
        addLog(`${def.label} Clue complete! Received a ${def.label} Casket!`,'','levelup');
        showClueComplete(def.label);
        delete activeClues[tier];
        showClueBadge();
      }
      uiDirty=true;
    }
  });
}

function openCasket(tier){
  const casketId='casket_'+tier;
  if((storage[casketId]||0)<=0)return;
  storage[casketId]--;bankDirty=true;
  const table=CASKET_REWARDS[tier];
  const numSlots=table.slots[0]+Math.floor(Math.random()*(table.slots[1]-table.slots[0]+1));
  const pool=table.pool;
  const totalWeight=pool.reduce((s,r)=>s+r.w,0);
  const loot=[];
  for(let s=0;s<numSlots;s++){
    let roll=Math.random()*totalWeight;
    for(const r of pool){
      roll-=r.w;
      if(roll<=0){
        const qty=r.qty?Math.floor(Math.random()*(r.qty[1]-r.qty[0]+1))+r.qty[0]:1;
        loot.push({id:r.id,qty});
        if(r.id==='coins')storage.coins=(storage.coins||0)+qty;
        else storage[r.id]=(storage[r.id]||0)+qty;
        bankDirty=true;
        break;
      }
    }
  }
  showCasketAnimation(tier,loot);
}

function showCasketAnimation(tier,loot){
  const def=CLUE_TIERS[tier];
  // Close any existing clue modal
  closeClueModal();
  // Create full-screen animated overlay
  const overlay=document.createElement('div');
  overlay.className='casket-open-overlay';
  overlay.onclick=e=>{if(e.target===overlay&&overlay.dataset.canClose==='true'){overlay.remove();uiDirty=true;buildResPanel();}};
  let h=`<div class="casket-open-box">`;
  h+=`<div class="casket-open-title ${tier}">${def.label.toUpperCase()} CASKET</div>`;
  h+=`<div class="casket-chest"><img src="${ITEM_IMGS['casket_'+tier]||''}" style="width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 0 12px rgba(245,216,138,0.3));"></div>`;
  if(loot.length===0){
    h+=`<div style="font-family:'Crimson Text',serif;font-size:16px;color:rgba(200,150,120,0.5);margin:24px 0;">The casket was empty...</div>`;
  } else {
    h+=`<div class="casket-loot-reveal">`;
    loot.forEach((l,i)=>{
      const it=ITEMS[l.id];
      const delay=0.8+i*0.4;
      const hasImg=ITEM_IMGS&&ITEM_IMGS[l.id];
      const imgFilter=ITEM_FILTERS&&ITEM_FILTERS[l.id]?'filter:'+ITEM_FILTERS[l.id]:'';
      h+=`<div class="casket-loot-item" style="animation-delay:${delay}s">`;
      h+=`<div class="casket-loot-item-icon" style="animation-delay:${delay}s">${hasImg?'<img src="'+ITEM_IMGS[l.id]+'" style="width:32px;height:32px;object-fit:contain;'+imgFilter+'">':it?it.icon:'?'}</div>`;
      h+=`<div class="casket-loot-item-qty">x${l.qty}</div>`;
      h+=`<div class="casket-loot-item-name">${it?it.label:l.id}</div>`;
      h+=`</div>`;
    });
    h+=`</div>`;
  }
  // Continue button / open another
  const remaining=storage['casket_'+tier]||0;
  if(remaining>0){
    h+=`<div class="casket-continue" onclick="this.closest('.casket-open-overlay').remove();openCasket('${tier}')">Open Another (${remaining})</div>`;
  } else {
    h+=`<div class="casket-continue" onclick="this.closest('.casket-open-overlay').remove();uiDirty=true;buildResPanel();">Continue</div>`;
  }
  h+=`</div>`;
  overlay.innerHTML=h;
  document.body.appendChild(overlay);
  // Allow closing after all items revealed
  const closeDelay=Math.max(2000,800+loot.length*400+600);
  setTimeout(()=>{overlay.dataset.canClose='true';},closeDelay);
  addLog(`Opened ${def.label} Casket — ${loot.map(l=>`${l.qty}x ${ITEMS[l.id]?.label||l.id}`).join(', ')}`,'','info');
  uiDirty=true;buildResPanel();
}

function openClueModal(tier){
  if(hasClue(tier)){
    showClueProgress(tier);
  } else if(hasClueScroll(tier)){
    activateClue(tier);
    if(hasClue(tier))showClueProgress(tier);
  } else if((storage['casket_'+tier]||0)>0){
    openCasket(tier);
  }
}

function showClueProgress(tier){
  const clue=activeClues[tier];if(!clue)return;
  const def=CLUE_TIERS[tier];
  const modal=document.getElementById('clue-modal');
  const overlay=document.getElementById('clue-overlay');
  let h=`<span class="clue-close" onclick="closeClueModal()">✕</span>`;
  const clueImg=ITEM_IMGS['clue_'+tier]?`<img src="${ITEM_IMGS['clue_'+tier]}" style="width:24px;height:24px;object-fit:contain;vertical-align:middle;${ITEM_FILTERS&&ITEM_FILTERS['clue_'+tier]?'filter:'+ITEM_FILTERS['clue_'+tier]:''}">`:def.icon;
  h+=`<div class="clue-hdr"><div class="clue-title ${tier}">${clueImg} ${def.label} Clue Scroll</div>`;
  const done=clue.steps.filter(s=>s.progress>=s.qty).length;
  h+=`<div class="clue-desc">Step ${Math.min(done+1,clue.steps.length)} of ${clue.steps.length} — any character's progress counts!</div></div>`;
  h+=`<div class="clue-steps">`;
  let foundCurrent=false;
  clue.steps.forEach((step,i)=>{
    const isDone=step.progress>=step.qty;
    const stepIcon=step.item&&ITEM_IMGS[step.item]?`<img src="${ITEM_IMGS[step.item]}" style="width:24px;height:24px;object-fit:contain;${ITEM_FILTERS&&ITEM_FILTERS[step.item]?'filter:'+ITEM_FILTERS[step.item]:''}">`:null;
    if(isDone){
      h+=`<div class="clue-step done"><div class="clue-step-check">${stepIcon||'✅'}</div><div class="clue-step-info"><div class="clue-step-label">${step.label}</div><div class="clue-step-prog">Complete!</div></div></div>`;
    } else if(!foundCurrent){
      foundCurrent=true;
      const pct=Math.min(100,Math.floor(step.progress/step.qty*100));
      h+=`<div class="clue-step"><div class="clue-step-check">${stepIcon||'➡️'}</div><div class="clue-step-info"><div class="clue-step-label">${step.label}</div>`;
      h+=`<div style="position:relative;height:14px;background:rgba(8,6,12,0.8);border-radius:7px;overflow:hidden;margin-top:6px;border:1px solid rgba(194,158,62,0.1)">`;

// Call after any gathering/production/combat action produces an item
function rollClueDrop(d){
  if(_raidActive)return;
  // Easy: 1/200, Medium: 1/500, Hard: 1/1200
  const rolls=[
    {tier:'easy',chance:1/200},
    {tier:'medium',chance:1/500},
    {tier:'hard',chance:1/1200},
  ];
  rolls.forEach(r=>{
    // Only drop if player doesn't already have one in bank AND doesn't have an active clue of this tier
    if((storage['clue_'+r.tier]||0)>=1||hasClue(r.tier))return;
    if(Math.random()<r.chance){

      addFloat(d.x,d.y-30,`📜 ${def.label} Clue!`,def.color,3);

  });
}

const MAX_ROOM_TIER=5;
const ROOM_TIER_DATA=[
  {tier:1,cost:0,speed:0,double:0,xp:0,label:'Basic'},
  {tier:2,cost:1000,speed:0.04,double:0.03,xp:0.04,label:'Improved'},
  {tier:3,cost:5000,speed:0.08,double:0.06,xp:0.08,label:'Advanced'},
  {tier:4,cost:20000,speed:0.13,double:0.10,xp:0.13,label:'Superior'},
  {tier:5,cost:75000,speed:0.20,double:0.15,xp:0.20,label:'Masterwork'},
];
// roomUpgrades managed by early declaration
function getRoomTier(zoneId){return roomUpgrades[zoneId]||1;}
function getRoomData(zoneId){return ROOM_TIER_DATA[(getRoomTier(zoneId))-1];}
function getRoomBuff(zoneId,stat){return getRoomData(zoneId)[stat]||0;}
function getNextTierData(zoneId){
  const cur=getRoomTier(zoneId);
  if(cur>=MAX_ROOM_TIER)return null;
  return ROOM_TIER_DATA[cur]; // next tier
}
function canAffordRoomUpg(zoneId){
  const next=getNextTierData(zoneId);if(!next)return false;
  return(storage.coins||0)>=next.cost;
}
function buyRoomUpgrade(zoneId){
  const next=getNextTierData(zoneId);if(!next||!canAffordRoomUpg(zoneId))return;
  storage.coins-=next.cost;bankDirty=true;uiDirty=true;
  roomUpgrades[zoneId]=(roomUpgrades[zoneId]||1)+1;
  const z=ZONES[zoneId];
  const tierNames=['','SILVER','GOLD','PLATINUM','DIAMOND'];
  const tierFlashColors=['rgba(140,90,40,','rgba(160,160,180,','rgba(220,180,60,','rgba(140,200,240,','rgba(80,200,255,'];
  const fc=tierFlashColors[next.tier-1]||tierFlashColors[0];
  const tn=tierNames[next.tier-1]||'';
  addLog(`${z.label} upgraded to ${next.label} (Tier ${next.tier})!`,'','levelup');
  buildBg();
  const flash=document.createElement('div');
  flash.className='room-upgrade-flash';
  flash.style.background=fc+'0.15)';flash.style.animation='roomFlash .8s ease forwards';
  flash.innerHTML=`<div class="room-upgrade-burst"><div class="room-burst-ring" style="border-color:${fc}0.6)"></div><div class="room-burst-text" style="color:${fc}0.9);text-shadow:0 0 20px ${fc}0.5)">${tn?tn+' — ':''}TIER ${next.tier}</div></div>`;
  document.body.appendChild(flash);
  setTimeout(()=>flash.remove(),1200);
  openRoomModal(zoneId);
}
window.buyRoomUpgrade=buyRoomUpgrade;

function openRoomModal(zoneId){
  const z=ZONES[zoneId];if(!z)return;
  const overlay=document.getElementById('room-overlay');
  const modal=document.getElementById('room-modal');
  const tier=getRoomTier(zoneId);

  const next=getNextTierData(zoneId);
  const canAfford=canAffordRoomUpg(zoneId);
  const maxed=tier>=MAX_ROOM_TIER;
  const tierNames=['BRONZE','SILVER','GOLD','PLATINUM','DIAMOND'];

  let h=`<div class="room-close" onclick="closeRoomModal()">✕</div>`;

  // Header
  h+=`<div class="room-m-header">`;

  h+=`<div class="room-m-sub">${z.icon} ${z.label} — Currently ${tierNames[tier-1]}</div>`;
  h+=`</div>`;

    h+=`<div class="room-m-pip ${i<=tier?'filled':i===tier+1?'next':''}"></div>`;
  }

  if(maxed){

    h+=`<div class="room-m-stat"><div class="room-m-stat-label">XP Bonus</div><div class="room-m-stat-cur">+${Math.round(data.xp*100)}%</div></div>`;
    h+=`</div>`;
    h+=`<div class="room-m-maxed"><div class="room-m-maxed-text">FULLY UPGRADED</div><div class="room-m-maxed-sub">This room has reached Diamond tier</div></div>`;

    // Speed
    const curSpd=Math.round(data.speed*100);const nxtSpd=Math.round(next.speed*100);
    h+=`<div class="room-m-stat"><div class="room-m-stat-label">Speed</div>`;
    h+=`<div class="room-m-stat-cur">${curSpd>0?'+'+curSpd+'%':'0'}</div>`;
    h+=`<div class="room-m-stat-arrow">${nxtSpd>curSpd?'➜':'='}</div>`;
    h+=`<div class="${nxtSpd>curSpd?'room-m-stat-next':'room-m-stat-same'}">+${nxtSpd}%</div></div>`;
    // Double
    const curDbl=Math.round(data.double*100);const nxtDbl=Math.round(next.double*100);
    h+=`<div class="room-m-stat"><div class="room-m-stat-label">Double</div>`;
    h+=`<div class="room-m-stat-cur">${curDbl>0?'+'+curDbl+'%':'0'}</div>`;
    h+=`<div class="room-m-stat-arrow">${nxtDbl>curDbl?'➜':'='}</div>`;
    h+=`<div class="${nxtDbl>curDbl?'room-m-stat-next':'room-m-stat-same'}">+${nxtDbl}%</div></div>`;
    // XP
    const curXp=Math.round(data.xp*100);const nxtXp=Math.round(next.xp*100);
    h+=`<div class="room-m-stat"><div class="room-m-stat-label">XP Bonus</div>`;
    h+=`<div class="room-m-stat-cur">${curXp>0?'+'+curXp+'%':'0'}</div>`;
    h+=`<div class="room-m-stat-arrow">${nxtXp>curXp?'➜':'='}</div>`;
    h+=`<div class="${nxtXp>curXp?'room-m-stat-next':'room-m-stat-same'}">+${nxtXp}%</div></div>`;
    h+=`</div>`;

    // Cost
    const costStr=next.cost>=1000?Math.floor(next.cost/1000)+'K':next.cost;
    h+=`<div class="room-m-cost"><div class="room-m-cost-amount">${costStr}</div><div class="room-m-cost-label">Gold to upgrade to ${tierNames[next.tier-1]}</div></div>`;

    // Buttons
    h+=`<div class="room-m-buttons">`;
    h+=`<div class="room-m-btn close" onclick="closeRoomModal()">CLOSE</div>`;
    h+=`<div class="room-m-btn buy ${canAfford?'':'disabled'}" ${canAfford?`onclick="buyRoomUpgrade('${zoneId}')"`:''}>${canAfford?'BUY':'NOT ENOUGH'}</div>`;
    h+=`</div>`;
  }

  modal.innerHTML=h;
  overlay.classList.add('open');
}

    h+=`<div style="text-align:center;padding:14px 24px 6px"><div style="font-family:'Cinzel',serif;font-size:16px;font-weight:900;color:rgba(232,200,94,0.8);letter-spacing:1.5px;text-transform:uppercase">${selCat.label}</div></div>`;

    // Rankings table header
    h+=`<div class="lb-table-hdr"><span style="width:50px;font-family:'Cinzel',serif;font-size:11px;font-weight:800;color:rgba(255,255,255,0.5)">Rank</span><span class="lb-col-skill" style="font-family:'Cinzel',serif;font-size:11px;font-weight:800;color:rgba(255,255,255,0.5);letter-spacing:1px">Name</span><span class="lb-col-val" style="font-family:'Cinzel',serif;font-size:11px;font-weight:800;color:rgba(255,255,255,0.5);letter-spacing:1px;width:140px">${selCat.label}</span></div>`;

    fakeEntries.forEach((entry,i)=>{
      const rank=i+1;
      const isMe=entry.isMe;
      const trophyIcon=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'';
      const valStr=selCat.id==='total_xp'?fmtXP(entry.val):entry.val.toLocaleString();
      h+=`<div class="lb-table-row${isMe?' highlight':''}" style="${isMe?'border-left:3px solid #e8c85e;':''}">`;
      h+=`<span style="width:50px;display:flex;align-items:center;gap:4px;font-family:'Cinzel',serif;font-size:14px;font-weight:800;color:${isMe?'#e8c85e':'rgba(255,255,255,0.5)'}">${trophyIcon||''}<span>${rank}</span></span>`;
      h+=`<span class="lb-col-skill" style="font-family:'Cinzel',serif;font-weight:${isMe?'900':'600'};color:${isMe?'#e8c85e':'rgba(255,255,255,0.6)'}">${entry.name}</span>`;
      h+=`<span class="lb-col-val" style="width:140px;color:${isMe?'#e8c85e':'rgba(255,255,255,0.75)'}">${valStr}</span>`;
      h+=`</div>`;
    });
  }

  h+=`</div>`;
  modal.innerHTML=h;
}

function fmtXP(xp){
  if(xp>=1e9)return Math.floor(xp/1e8)/10+'B';
  if(xp>=1e6)return Math.floor(xp/1e5)/10+'M';
  if(xp>=1e3)return Math.floor(xp/100)/10+'K';
  return xp.toLocaleString();
}
// ═══ CHARACTER CUSTOMIZATION ═══
window.openCustomize=(dotId)=>{
  const ov=document.getElementById('customize-overlay');
  ov.style.display='flex';
  renderCustomize(dotId);
};
window.closeCustomize=()=>{document.getElementById('customize-overlay').style.display='none';buildPanel();buildGroupBar();};
window.setLook=(dotId,prop,val)=>{
  const d=dots[dotId];if(!d)return;
  if(!d.look)d.look=Object.assign({},APPEARANCES[dotId]||APPEARANCES[0]);
  d.look[prop]=val;
  APPEARANCES[dotId]=d.look;
  renderCustomize(dotId);
};
window.setCharName=(dotId,name)=>{
  if(!name||!name.trim())return;
  const n=name.trim().substring(0,12);
  dots[dotId].name=n;NAMES[dotId]=n;
  renderCustomize(dotId);
};

function renderCustomize(dotId){
  const d=dots[dotId];if(!d)return;
  const look=d.look||APPEARANCES[dotId]||APPEARANCES[0];
  const m=document.getElementById('customize-modal');
  let h=`<div style="padding:16px 20px 10px;border-bottom:1px solid rgba(194,158,62,0.1);display:flex;align-items:center;justify-content:space-between">`;
  h+=`<span style="font-family:'Cinzel',serif;font-size:15px;font-weight:800;color:rgba(232,214,165,0.85);letter-spacing:1px">Customize</span>`;
  h+=`<span onclick="closeCustomize()" style="font-size:18px;cursor:pointer;color:rgba(200,180,150,0.3)">✕</span></div>`;
  // Preview canvas
  h+=`<div style="text-align:center;padding:12px 0 8px"><canvas id="cust-preview" width="80" height="100" style="image-rendering:pixelated"></canvas></div>`;
  // Name
  h+=`<div style="padding:4px 20px 8px"><div style="font-family:'Cinzel',serif;font-size:8px;font-weight:700;color:rgba(194,158,62,0.35);letter-spacing:1.5px;margin-bottom:5px">NAME</div>`;
  h+=`<input id="cust-name" type="text" value="${d.name}" maxlength="12" onchange="setCharName(${dotId},this.value)" style="width:100%;padding:6px 10px;background:rgba(20,22,30,0.8);border:1px solid rgba(194,158,62,0.15);border-radius:6px;color:rgba(232,214,165,0.85);font-family:'Crimson Text',serif;font-size:14px;outline:none"></div>`;
  // Skin tone
  h+=`<div style="padding:4px 20px 8px"><div style="font-family:'Cinzel',serif;font-size:8px;font-weight:700;color:rgba(194,158,62,0.35);letter-spacing:1.5px;margin-bottom:5px">SKIN TONE</div><div style="display:flex;gap:4px;flex-wrap:wrap">`;
  SKIN_TONES.forEach((c,ci)=>{
    h+=`<div onclick="setLook(${dotId},'skin',${ci})" style="width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${look.skin===ci?'#e8c85e':'rgba(255,255,255,0.08)'};transition:border .1s"></div>`;
  });
  h+=`</div></div>`;
  // Hair color
  h+=`<div style="padding:4px 20px 8px"><div style="font-family:'Cinzel',serif;font-size:8px;font-weight:700;color:rgba(194,158,62,0.35);letter-spacing:1.5px;margin-bottom:5px">HAIR COLOR</div><div style="display:flex;gap:4px;flex-wrap:wrap">`;
  HAIR_COLORS.forEach((c,ci)=>{
    h+=`<div onclick="setLook(${dotId},'hair',${ci})" style="width:24px;height:24px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${look.hair===ci?'#e8c85e':'rgba(255,255,255,0.08)'};transition:border .1s"></div>`;
  });
  h+=`</div></div>`;
  // Hair style
  h+=`<div style="padding:4px 20px 8px"><div style="font-family:'Cinzel',serif;font-size:8px;font-weight:700;color:rgba(194,158,62,0.35);letter-spacing:1.5px;margin-bottom:5px">HAIR STYLE</div><div style="display:flex;gap:4px;flex-wrap:wrap">`;
  HAIR_STYLES.forEach((s,si)=>{
    h+=`<div onclick="setLook(${dotId},'hairStyle',${si})" style="padding:5px 10px;border-radius:5px;font-family:'Crimson Text',serif;font-size:11px;cursor:pointer;background:${look.hairStyle===si?'rgba(194,158,62,0.15)':'rgba(20,22,30,0.6)'};border:1px solid ${look.hairStyle===si?'rgba(194,158,62,0.4)':'rgba(255,255,255,0.06)'};color:${look.hairStyle===si?'rgba(232,214,165,0.9)':'rgba(200,180,150,0.45)'};transition:all .1s;text-transform:capitalize">${s}</div>`;
  });
  h+=`</div></div>`;
  // Beard
  h+=`<div style="padding:4px 20px 8px"><div style="font-family:'Cinzel',serif;font-size:8px;font-weight:700;color:rgba(194,158,62,0.35);letter-spacing:1.5px;margin-bottom:5px">BEARD</div><div style="display:flex;gap:4px;flex-wrap:wrap">`;
  BEARD_STYLES.forEach((s,si)=>{
    h+=`<div onclick="setLook(${dotId},'beard',${si})" style="padding:5px 10px;border-radius:5px;font-family:'Crimson Text',serif;font-size:11px;cursor:pointer;background:${look.beard===si?'rgba(194,158,62,0.15)':'rgba(20,22,30,0.6)'};border:1px solid ${look.beard===si?'rgba(194,158,62,0.4)':'rgba(255,255,255,0.06)'};color:${look.beard===si?'rgba(232,214,165,0.9)':'rgba(200,180,150,0.45)'};transition:all .1s;text-transform:capitalize">${s}</div>`;
  });
  h+=`</div></div>`;
  // Shirt color
  h+=`<div style="padding:4px 20px 14px"><div style="font-family:'Cinzel',serif;font-size:8px;font-weight:700;color:rgba(194,158,62,0.35);letter-spacing:1.5px;margin-bottom:5px">SHIRT COLOR</div><div style="display:flex;gap:4px;flex-wrap:wrap">`;
  SHIRT_COLORS.forEach((c,ci)=>{
    h+=`<div onclick="setLook(${dotId},'shirt',${ci})" style="width:28px;height:28px;border-radius:4px;background:${c};cursor:pointer;border:2px solid ${look.shirt===ci?'#e8c85e':'rgba(255,255,255,0.08)'};transition:border .1s"></div>`;
  });
  h+=`</div></div>`;
  m.innerHTML=h;
  // Render preview
  setTimeout(()=>{
    const cv=document.getElementById('cust-preview');if(!cv)return;
    const cx=cv.getContext('2d');
    cx.clearRect(0,0,80,100);
    drawCharPreview(cx,40,55,d,16);
  },50);
}

function drawCharPreview(cx,sx,sy,d,R){
  const look=d.look||APPEARANCES[d.id]||APPEARANCES[0];
  const skin=SKIN_TONES[look.skin]||SKIN_TONES[2];
  const hairCol=HAIR_COLORS[look.hair]||HAIR_COLORS[0];
  const hStyle=HAIR_STYLES[look.hairStyle]||'short';
  const bStyle=BEARD_STYLES[look.beard]||'none';
  const hexRgb=(h)=>{const v=parseInt(h.replace('#',''),16);return[(v>>16)&255,(v>>8)&255,v&255];};
  const shade=(c,f)=>{const[r,g,b]=hexRgb(c);return`rgb(${Math.min(255,r*f|0)},${Math.min(255,g*f|0)},${Math.min(255,b*f|0)})`};
  const r=R;
  // Shadow
  cx.beginPath();cx.ellipse(sx,sy+r+4,r*0.7,r*0.2,0,0,Math.PI*2);cx.fillStyle='rgba(0,0,0,0.3)';cx.fill();
  // Team color ring
  cx.beginPath();cx.arc(sx,sy,r+2,0,Math.PI*2);cx.strokeStyle=d.color;cx.lineWidth=2;cx.stroke();
  // Main ball
  cx.beginPath();cx.arc(sx,sy,r,0,Math.PI*2);
  const sg=cx.createRadialGradient(sx-r*0.25,sy-r*0.3,0,sx,sy,r);
  sg.addColorStop(0,shade(skin,1.2));sg.addColorStop(0.6,skin);sg.addColorStop(1,shade(skin,0.65));
  cx.fillStyle=sg;cx.fill();
  // Hair
  if(hStyle!=='bald'){
    cx.fillStyle=hairCol;
    if(hStyle==='short'){cx.beginPath();cx.arc(sx,sy,r*0.92,-Math.PI,-0.15);cx.fill();}
    else if(hStyle==='medium'){cx.beginPath();cx.arc(sx,sy,r*0.95,-Math.PI,0.05);cx.fill();cx.fillRect(sx-r*0.95,sy-r*0.05,r*0.2,r*0.5);cx.fillRect(sx+r*0.75,sy-r*0.05,r*0.2,r*0.5);}
    else if(hStyle==='long'){cx.beginPath();cx.arc(sx,sy,r*0.95,-Math.PI,0.15);cx.fill();cx.fillRect(sx-r*1.0,sy-r*0.05,r*0.22,r*1.0);cx.fillRect(sx+r*0.78,sy-r*0.05,r*0.22,r*1.0);}
    else if(hStyle==='mohawk'){cx.fillRect(sx-r*0.15,sy-r*1.4,r*0.3,r*0.6);cx.beginPath();cx.arc(sx,sy-r*0.85,r*0.18,0,Math.PI*2);cx.fill();}
    else if(hStyle==='ponytail'){cx.beginPath();cx.arc(sx,sy,r*0.92,-Math.PI,-0.15);cx.fill();cx.fillRect(sx-r*0.1,sy+r*0.4,r*0.2,r*0.7);cx.beginPath();cx.arc(sx,sy+r*1.1,r*0.14,0,Math.PI*2);cx.fill();}
  }
  // Eyes
  cx.fillStyle='#fff';
  cx.beginPath();cx.arc(sx-r*0.25,sy+r*0.05,r*0.14,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(sx+r*0.25,sy+r*0.05,r*0.14,0,Math.PI*2);cx.fill();
  cx.fillStyle='#111';
  cx.beginPath();cx.arc(sx-r*0.25,sy+r*0.05,r*0.07,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(sx+r*0.25,sy+r*0.05,r*0.07,0,Math.PI*2);cx.fill();
  // Mouth
  cx.strokeStyle=shade(skin,0.55);cx.lineWidth=1;
  cx.beginPath();cx.arc(sx,sy+r*0.45,r*0.15,0.1*Math.PI,0.9*Math.PI);cx.stroke();
  // Beard
  if(bStyle!=='none'){
    cx.fillStyle=shade(hairCol,0.85);
    if(bStyle==='stubble'){cx.globalAlpha=0.35;cx.beginPath();cx.arc(sx,sy+r*0.35,r*0.35,0,Math.PI*2);cx.fill();cx.globalAlpha=1;}
    else if(bStyle==='short'){cx.beginPath();cx.arc(sx,sy+r*0.4,r*0.3,-0.2*Math.PI,1.2*Math.PI);cx.fill();}
    else if(bStyle==='full'){cx.beginPath();cx.arc(sx,sy+r*0.35,r*0.38,-0.15*Math.PI,1.15*Math.PI);cx.fill();}
    else if(bStyle==='long'){cx.beginPath();cx.arc(sx,sy+r*0.35,r*0.38,-0.15*Math.PI,1.15*Math.PI);cx.fill();cx.beginPath();cx.moveTo(sx-r*0.2,sy+r*0.6);cx.lineTo(sx,sy+r*1.2);cx.lineTo(sx+r*0.2,sy+r*0.6);cx.fill();}
    else if(bStyle==='goatee'){cx.beginPath();cx.arc(sx,sy+r*0.5,r*0.15,0,Math.PI*2);cx.fill();cx.fillRect(sx-r*0.06,sy+r*0.5,r*0.12,r*0.3);}
  }
  // Highlight
  cx.beginPath();cx.arc(sx-r*0.3,sy-r*0.3,r*.2,0,Math.PI*2);cx.fillStyle='#ffffff25';cx.fill();
}

</script>
